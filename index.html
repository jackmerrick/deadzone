<!DOCTYPE html>
<html>
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- Firebase (compat builds so they work in this plain inline script, no bundler) -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>
<canvas id="game"></canvas>

<!-- ── Cloud account UI (Firebase) ─────────────────────────────────────────── -->

<script>
let W=window.innerWidth,H=window.innerHeight;
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
canvas.width=W;canvas.height=H;
// warm up the menu webfont so glyphs are ready (menu repaints every frame, so it self-corrects regardless)
if(document.fonts&&document.fonts.load){document.fonts.load("700 60px 'JetBrains Mono'");document.fonts.load("400 14px 'JetBrains Mono'");}
const fogCanvas=document.createElement('canvas');
fogCanvas.width=W;fogCanvas.height=H;
const fogCtx=fogCanvas.getContext('2d');
const MOBILE=('ontouchstart' in window)||navigator.maxTouchPoints>0;
const UI_MIN_H=660; // mobile: render at >=this logical height so menus/HUD fit, then CSS scales it to the real screen
function resizeCanvas(){
  const vw=window.innerWidth,vh=window.innerHeight;
  if(MOBILE&&vh<UI_MIN_H){
    W=Math.round(vw*UI_MIN_H/vh);H=UI_MIN_H;          // scale logical resolution up (aspect ratio preserved)
    canvas.style.width=vw+'px';canvas.style.height=vh+'px'; // ...but display it at the real screen size
  }else{
    W=vw;H=vh;canvas.style.width='';canvas.style.height='';
  }
  canvas.width=W;canvas.height=H;fogCanvas.width=W;fogCanvas.height=H;
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas(); // apply once on load (sets the mobile virtual resolution if needed)

const STATE={MENU:'menu',PLAYING:'playing',GAME_OVER:'gameOver',WIN:'win',PAUSED:'paused',BRIEFING:'briefing'};
const MAPS=[
  {id:'city',      name:'City Streets',      bg:'#111',    floorA:'#1e1e1e',floorB:'#222',    wallA:'#3d3d3d',wallB:'#454545',accentColor:'#e63946',fog:'rgba(0,0,0,0.87)'},
  {id:'bunker',    name:'Underground Bunker', bg:'#070d12', floorA:'#0d1a26',floorB:'#101e2c', wallA:'#1e3040',wallB:'#243850',accentColor:'#00b4d8',fog:'rgba(0,5,15,0.9)'},
  {id:'wasteland', name:'Wasteland',          bg:'#100a04', floorA:'#2a1e12',floorB:'#321f10', wallA:'#6b4a30',wallB:'#7a5535',accentColor:'#f77f00',fog:'rgba(10,5,0,0.88)'},
  {id:'graveyard', name:'Graveyard',          bg:'#060806', floorA:'#121610',floorB:'#141a12', wallA:'#2a3020',wallB:'#323828',accentColor:'#7bc67e',fog:'rgba(0,5,0,0.9)'},
  {id:'arctic',    name:'Frozen Outpost',     bg:'#070d12', floorA:'#16242e',floorB:'#1a2a35', wallA:'#3d5d70',wallB:'#496c80',accentColor:'#7fd4ff',fog:'rgba(8,18,28,0.85)'},
];
// Campaign chains MAPS[0..3]; the arctic map (index 4) is single-map only.

// ── Stealth Campaign: hand-authored infiltration missions ───────────────────
// Each mission reuses a MAPS theme as an enemy base; guards/cameras/objective/
// extraction are placed procedurally on clear tiles (see setupStealth).
const CAMPAIGN=[
  {title:'CHAPTER 1 — INFILTRATION', missions:[
    {id:'c1m1', name:'The Documents', mapIdx:0, target:'plans',   guards:9,  patrols:3, cameras:2,
     intro:'Steal the classified plans and slip out unseen.'},
    {id:'c1m2', name:'Hostage',       mapIdx:1, target:'hostage', guards:12, patrols:5, cameras:3,

    {id:'c1m3', name:'Deep Cover',    mapIdx:2, target:'plans',   guards:16, patrols:6, cameras:4,
     intro:'Heavily guarded. Grab the intel. Get out alive.'},
  ]},

    {id:'c2m1', name:'No Witnesses',  mapIdx:3, target:'plans',       guards:18, patrols:7, cameras:7, loadout:'silent', noAlarm:true,
     intro:'GHOST: knife & silenced pistol only. If the alarm is EVER raised, you fail. Steal the intel.'},
    {id:'c2m2', name:'Decapitation',  mapIdx:0, target:'assassinate', guards:20, patrols:8, cameras:4,
     intro:'ASSASSINATION: a marked HVT is inside. Eliminate the target, then extract.'},
    {id:'c2m3', name:'Hot Property',  mapIdx:1, target:'vault',       guards:18, patrols:7, cameras:3, forceAlarm:true,
     intro:'ALARMED VAULT: the prize is wired. The instant you grab it, the base lights up. Fight your way out.'},
    {id:'c2m4', name:'Scorched Earth',mapIdx:2, target:'sabotage',    guards:18, patrols:7, cameras:3, forceAlarm:true, escapeTime:45,
     intro:'SABOTAGE: plant charges on the reactor (trips the alarm) then reach extraction within 45 seconds.'},
    {id:'c2m5', name:'Double Cross',  mapIdx:1, target:'heist',       guards:20, patrols:8, cameras:5,
     intro:'HEIST: grab BOTH the intel and the hostage from separate rooms, then extract together.'},
    {id:'c2m6', name:'Cleaners',      mapIdx:2, target:'exterminate', guards:14, patrols:6, cameras:3, loadout:'heavy',

let state=STATE.MENU;
let globalLevel=1;
let campaignMode=true;   // true = chain MAPS[0..3]; false = stay on one map for 20 levels
let fixedMapIdx=0;       // map used in single-map mode
let gameMode='zombies';  // 'zombies' = wave survival, 'campaign' = stealth extraction
let mission=null;        // active stealth mission def (campaign mode)
let startCountdown=0;     // >0 freezes play and shows a "get ready" countdown (zombies + multiplayer)
let score=0,currency=0;
let highScore=parseInt(localStorage.getItem('dz_hs')||'0');

// ── Persistent save (coins, all-time stats, cosmetics) ───────────────────────
const RANKS=[
  {name:'Rookie',   kills:0,    color:'#9aa0a6'},
  {name:'Survivor', kills:50,   color:'#2ecc71'},
  {name:'Fighter',  kills:150,  color:'#3498db'},
  {name:'Veteran',  kills:400,  color:'#9b59b6'},
  {name:'Elite',    kills:900,  color:'#f39c12'},
  {name:'Legend',   kills:2000, color:'#e63946'},
  {name:'God',      kills:5000, color:'#ffd700'},
];
function rankFor(kills){let r=RANKS[0];for(const x of RANKS)if(kills>=x.kills)r=x;return r;}
function nextRank(kills){for(const x of RANKS)if(kills<x.kills)return x;return null;}

// ── Account level / XP (drives weapon unlocks; earned in every mode) ──────────
const MAX_LEVEL=30;
function xpForLevel(l){l=Math.max(1,l);return Math.round(150*(l-1)+25*(l-1)*(l-2));} // cumulative XP to reach level l
function levelFromXp(xp){let l=1;while(l<MAX_LEVEL&&xp>=xpForLevel(l+1))l++;return l;}
function xpProgress(xp){const l=levelFromXp(xp);if(l>=MAX_LEVEL)return{level:l,into:1,need:1,frac:1,max:true};
  const base=xpForLevel(l),next=xpForLevel(l+1);return{level:l,into:xp-base,need:next-base,frac:(xp-base)/(next-base),max:false};}
// Add XP and announce any level-ups / weapon unlocks. Caller is responsible for writeSave().
function addXp(n){
  if(!n||n<0)return;
  const before=levelFromXp(saveData.xp);
  saveData.xp+=Math.round(n);
  const after=levelFromXp(saveData.xp);
  if(after>before){
    addNotif(`⭐ LEVEL ${after}!`,'#ffd24a',4);
    for(let lv=before+1;lv<=after;lv++){
      for(const wid of ALL_WEAPONS)if((WEAPONS[wid].unlock||1)===lv)addNotif(`🔓 UNLOCKED: ${wid.toUpperCase()}`,WEAPONS[wid].color||'#fff',4.5);
    }
  }
}

const SAVE_DEFAULT={
  coins:0, kills:0, deaths:0, highestLevel:1, gamesPlayed:0, bestScore:0,
  xp:0,             // account XP (earned in every mode) — drives the level/unlock system
  loadout:{primary:'rifle',secondary:'pistol',lethal:'frag',tactical:'flashbang'}, // MP loadout
  ownedHats:['none'], ownedOutfits:['default'], equippedHat:'none', equippedOutfit:'default',
  campaignDone:[],  // ids of completed stealth missions
  username:'',      // chosen public name for the leaderboard
  // daily/weekly challenge tracking (see CHALLENGE section below)
  challenges:{ dailyKey:0, weeklyKey:0, progress:{}, claimed:{} },
  // multiplayer career stats (kept separate from zombies)
  mp:{ kills:0, deaths:0, points:0, matches:0, wins:0, best:{kills:0,deaths:0,points:0} }
};
let saveData=loadSave();
function loadSave(){
  let s;
  try{const raw=localStorage.getItem('dz_save');if(raw)s=Object.assign({},SAVE_DEFAULT,JSON.parse(raw));}catch(e){}
  if(!s)s=Object.assign({},SAVE_DEFAULT);
  // challenges is a nested object — make sure it's a fresh, fully-shaped copy
  const c=s.challenges||{};
  s.challenges={dailyKey:c.dailyKey||0, weeklyKey:c.weeklyKey||0, progress:Object.assign({},c.progress), claimed:Object.assign({},c.claimed)};
  if(typeof s.username!=='string')s.username='';
  const mp=s.mp||{},mb=mp.best||{};
  s.mp={kills:mp.kills||0,deaths:mp.deaths||0,points:mp.points||0,matches:mp.matches||0,wins:mp.wins||0,best:{kills:mb.kills||0,deaths:mb.deaths||0,points:mb.points||0}};
  // XP / level: seed veterans from existing stats the first time (so unlocks aren't all relocked)
  if(typeof s.xp!=='number')s.xp=(s.kills||0)*5+(s.mp.kills||0)*10+((s.highestLevel||1)-1)*20+Math.floor((s.bestScore||0)/200);
  // Loadout: keep a fully-shaped object, defaulting any missing/invalid slot
  const lo=s.loadout||{},def=SAVE_DEFAULT.loadout;
  s.loadout={primary:lo.primary||def.primary,secondary:lo.secondary||def.secondary,lethal:lo.lethal||def.lethal,tactical:lo.tactical||def.tactical};
  return s;
}
function writeSave(){try{localStorage.setItem('dz_save',JSON.stringify(saveData));}catch(e){}}

// Per-session counters (folded into saveData when a run ends)
let sessionCoins=0,sessionKills=0;

// ── Kill combo / streak (zombie survival only) ───────────────────────────────
// Chain kills within COMBO_WINDOW seconds to ramp a cash multiplier.
const COMBO_WINDOW=3.2;
let comboCount=0,comboTimer=0,comboBest=0,comboPop=0;
function comboMult(n){return n>=30?4:n>=20?3:n>=12?2.5:n>=7?2:n>=3?1.5:1;}
function resetCombo(){comboCount=0;comboTimer=0;comboBest=0;comboPop=0;}
function updateCombo(dt){
  if(comboCount<=0)return;
  comboPop=Math.max(0,comboPop-dt*4);
  comboTimer-=dt;
  if(comboTimer<=0){comboCount=0;comboTimer=0;}
}

// ── Cosmetics (bought with persistent coins, equipped in the Locker) ─────────
const HATS=[
  {id:'none',   name:'No Hat',  cost:0,    color:null},
  {id:'cap',    name:'Cap',     cost:150,  color:'#3498db'},
  {id:'beanie', name:'Beanie',  cost:200,  color:'#9b59b6'},
  {id:'cowboy', name:'Cowboy',  cost:400,  color:'#8b5a2b'},
  {id:'helmet', name:'Helmet',  cost:600,  color:'#6a7560'},
  {id:'crown',  name:'Crown',   cost:1500, color:'#ffd700'},
];
const OUTFITS=[
  {id:'default',name:'Default', cost:0,    body:'#3a80d0',trim:'#2a60a0'},
  {id:'camo',   name:'Camo',    cost:250,  body:'#4b5320',trim:'#36401a'},
  {id:'red',    name:'Crimson', cost:300,  body:'#b03030',trim:'#7a1a1a'},
  {id:'shadow', name:'Shadow',  cost:500,  body:'#2c2c34',trim:'#15151a'},
  {id:'gold',   name:'Golden',  cost:1200, body:'#d4af37',trim:'#9a7d1f'},
  {id:'phantom',name:'Phantom', cost:2000, body:'#1a3a4a',trim:'#0a8aaa'},
];
function getHat(){return HATS.find(h=>h.id===saveData.equippedHat)||HATS[0];}
function getOutfit(){return OUTFITS.find(o=>o.id===saveData.equippedOutfit)||OUTFITS[0];}

// Draw a hat in the player's local frame (origin = head centre, +x = facing dir)
function drawHat(h,r){
  if(!h||h.id==='none')return;
  ctx.save();
  if(h.id==='cap'){
    ctx.fillStyle=h.color;ctx.beginPath();ctx.arc(0,0,r*0.72,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(r*0.45,-r*0.42,r*0.75,r*0.84);
  } else if(h.id==='beanie'){
    ctx.fillStyle=h.color;ctx.beginPath();ctx.arc(0,0,r*0.78,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,r*0.2,0,Math.PI*2);ctx.fill();
  } else if(h.id==='cowboy'){
    ctx.fillStyle=h.color;ctx.beginPath();ctx.ellipse(0,0,r*1.15,r*0.95,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6b4423';ctx.beginPath();ctx.arc(0,0,r*0.55,0,Math.PI*2);ctx.fill();
  } else if(h.id==='helmet'){
    ctx.fillStyle=h.color;ctx.beginPath();ctx.arc(0,0,r*0.82,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(-r*0.09,-r*0.8,r*0.18,r*1.6);
  } else if(h.id==='crown'){
    ctx.fillStyle=h.color;ctx.shadowColor='#ffd700';ctx.shadowBlur=8;ctx.beginPath();
    const pts=5,or_=r*0.85,ir=r*0.45;
    for(let i=0;i<pts*2;i++){const a=(i/(pts*2))*Math.PI*2-Math.PI/2,rr=i%2===0?or_:ir;ctx[i===0?'moveTo':'lineTo'](Math.cos(a)*rr,Math.sin(a)*rr);}
    ctx.closePath();ctx.fill();ctx.shadowBlur=0;
  }
  ctx.restore();
}
// Static character render for menu previews (faces upward)
function drawCharacterPreview(x,y,r,outfit,hat){
  ctx.save();ctx.translate(x,y);ctx.rotate(-Math.PI/2);
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.beginPath();ctx.ellipse(3,6,r*0.85,r*0.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=outfit.body;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=outfit.trim;ctx.beginPath();ctx.arc(0,0,r*0.65,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#555';ctx.fillRect(r*0.5,-r*0.27,r*1.5,r*0.54);ctx.fillStyle='#333';ctx.fillRect(r*1.9,-r*0.2,r*0.6,r*0.4);
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(r*0.33,-r*0.4,r*0.27,0,Math.PI*2);ctx.arc(r*0.33,r*0.4,r*0.27,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a80';ctx.beginPath();ctx.arc(r*0.48,-r*0.4,r*0.13,0,Math.PI*2);ctx.arc(r*0.48,r*0.4,r*0.13,0,Math.PI*2);ctx.fill();
  drawHat(hat,r);
  ctx.restore();
}
let waveActive=false,levelComplete=false,levelTimer=0,levelStartTimer=0;

// UI state
let bigMapOpen=false,buyStationOpen=false,inventoryOpen=false,workshopOpen=false;
let inventoryAnim=0,inventorySelected=0;
let workshopSelectedWeapon='pistol';
let weaponUpgrades={};
let activeTab='weapons';
const SHOP_TABS=['weapons','grenades','deployables','killstreaks','armour','ammo'];

// Upgrade definitions
const UPGRADE_DEFS=[
  {id:'damage',    label:'Damage',    icon:'💥',desc:'+35% damage per tier',   color:'#ff4444',maxLv:3,costs:[500,1000,2000]},
  {id:'fireSpeed', label:'Fire Speed',icon:'⚡',desc:'+30% fire rate per tier', color:'#ffaa00',maxLv:3,costs:[600,1200,2200]},

  {id:'ammoBoost', label:'Ammo Cap',  icon:'📦',desc:'+50% ammo per purchase', color:'#44ff88',maxLv:3,costs:[300,700,1300]},
];
const UPGR_MULT={pistol:0.5,smg:1.0,shotgun:1.0,aa12:1.3,rifle:1.4,sniper:1.8,crossbow:1.6,machinegun:1.6,flamethrower:1.5,tesla:1.8,rocket:1.6};

function getWeaponStats(wid){
  const base=WEAPONS[wid],u=weaponUpgrades[wid]||{};
  return{...base,
    dmg:base.dmg*(1+(u.damage||0)*0.35),

// ── Daily / Weekly challenges ────────────────────────────────────────────────
// Challenges are randomly generated but DETERMINISTIC per period: the day/week
// integer is both the RNG seed and the stored period key, so everyone sees the
// same set and it auto-resets when the period rolls over.
function dayNumber(){return Math.floor(Date.now()/86400000);}            // UTC day index
function weekNumber(){return Math.floor((Date.now()/86400000+4)/7);}     // +4 → week starts Monday
function seededRng(seed){let s=seed>>>0;return function(){s=(s+0x6D2B79F5)|0;let t=Math.imul(s^(s>>>15),1|s);t=(t+Math.imul(t^(t>>>7),61|t))^t;return ((t^(t>>>14))>>>0)/4294967296;};}

// objective `type` strings MUST match the bumpChallenge() call sites
const CHALLENGE_TYPES=[
  {type:'kills',   verb:'Kill {n} zombies',               daily:[20,60],  weekly:[200,500]},
  {type:'coins',   verb:'Earn {n} coins in runs',          daily:[40,120], weekly:[400,1000]},
  {type:'level',   verb:'Reach level {n} in a run',        daily:[3,7],    weekly:[8,15],  single:true},
  {type:'boss',    verb:'Kill {n} bosses',                 daily:[1,2],    weekly:[5,10]},
  {type:'stealth', verb:'Complete {n} stealth missions',   daily:[1,2],    weekly:[3,6]},
  {type:'games',   verb:'Play {n} games',                  daily:[2,4],    weekly:[10,20]},
  {type:'survive', verb:'Reach level {n} without dying',   daily:[3,6],    weekly:[8,14],  single:true},
];
const CHALLENGE_REWARD={easy:100,medium:300,hard:700};
const CHALLENGE_DIFFS=['easy','medium','hard'];
const DIFF_MULT={easy:1,medium:2,hard:4};

function generateChallenges(seed, periodLabel){
  const rng=seededRng((seed^(periodLabel==='weekly'?0x9E3779B9:0))>>>0);
  return CHALLENGE_DIFFS.map(diff=>{
    const tmpl=CHALLENGE_TYPES[Math.floor(rng()*CHALLENGE_TYPES.length)];
    const range=tmpl[periodLabel];
    let target=Math.round(range[0]+rng()*(range[1]-range[0]));
    if(!tmpl.single)target=Math.max(1,Math.round(target*DIFF_MULT[diff]));
    return {id:periodLabel+'_'+diff, type:tmpl.type, diff, target, reward:CHALLENGE_REWARD[diff], single:!!tmpl.single, label:tmpl.verb.replace('{n}',target)};
  });
}
function activeChallenges(){
  return {
    daily:{key:dayNumber(),  list:generateChallenges(dayNumber(),'daily')},
    weekly:{key:weekNumber(),list:generateChallenges(weekNumber(),'weekly')},
  };
}
// drop a tier's progress/claims when its period rolls over (coins already earned are untouched)
function syncChallengePeriods(){
  const c=saveData.challenges;if(!c)return;
  if(c.dailyKey!==dayNumber()){c.dailyKey=dayNumber();['daily_easy','daily_medium','daily_hard'].forEach(id=>{delete c.progress[id];delete c.claimed[id];});}
  if(c.weeklyKey!==weekNumber()){c.weeklyKey=weekNumber();['weekly_easy','weekly_medium','weekly_hard'].forEach(id=>{delete c.progress[id];delete c.claimed[id];});}
}
// single tracking + payout choke-point. type matches a CHALLENGE_TYPES.type; amount is the delta (or new value for single types)
function bumpChallenge(type, amount){
  syncChallengePeriods();
  const ac=activeChallenges(),c=saveData.challenges;let changed=false;
  [ac.daily,ac.weekly].forEach(period=>period.list.forEach(ch=>{
    if(ch.type!==type)return;
    const cur=c.progress[ch.id]||0;
    const next=ch.single?Math.max(cur,amount):cur+amount;
    if(next===cur)return;
    c.progress[ch.id]=next;changed=true;
    if(next>=ch.target&&!c.claimed[ch.id]){
      c.claimed[ch.id]=true;saveData.coins+=ch.reward;challengeFlash[ch.id]=2.5;
      addNotif(`✓ ${ch.diff.toUpperCase()} CHALLENGE DONE — +${ch.reward} 🪙`,'#2ecc71',5);
    }
  }));
  if(changed)writeSave();
}
syncChallengePeriods(); // clear any stale tier from a previous day/week on launch

// Normalise single-character keys to lower case so a key pressed while Shift is
// held ('S') and released after Shift ('s') map to the same slot — otherwise the
// keyup misses the stored 'S' and the key sticks (character won't stop moving).
function normKey(k){return k.length===1?k.toLowerCase():k;}

document.addEventListener('keydown',e=>{
  // Inventory arrow navigation — consume before anything else
  if(inventoryOpen&&(e.key==='ArrowUp'||e.key==='ArrowDown')){
    e.preventDefault();
    if(e.key==='ArrowUp')inventorySelected=Math.max(0,inventorySelected-1);
    if(e.key==='ArrowDown')inventorySelected=Math.min(ALL_WEAPONS.length-1,inventorySelected+1);
    return;
  }
  // Workshop arrow navigation
  if(workshopOpen&&(e.key==='ArrowLeft'||e.key==='ArrowRight')){
    e.preventDefault();
    if(e.key==='ArrowLeft')prevWorkshopWeapon();
    if(e.key==='ArrowRight')nextWorkshopWeapon();
    return;
  }
  keys[normKey(e.key)]=true;
  const camp=(gameMode==='campaign');

  if(e.key==='Tab'){e.preventDefault();if(!camp&&state===STATE.PLAYING){inventoryOpen=!inventoryOpen;if(inventoryOpen){inventorySelected=Math.max(0,ALL_WEAPONS.indexOf(player.weapon));bigMapOpen=false;buyStationOpen=false;workshopOpen=false;}}return;}
  if(e.key==='m'||e.key==='M'){if(!camp&&(state===STATE.PLAYING||state===STATE.PAUSED)){bigMapOpen=!bigMapOpen;if(bigMapOpen){inventoryOpen=false;buyStationOpen=false;workshopOpen=false;}}return;}
  if(e.key==='Escape'){
    if(bigMapOpen){bigMapOpen=false;return;}
    if(inventoryOpen){inventoryOpen=false;return;}
    if(buyStationOpen){buyStationOpen=false;return;}
    if(workshopOpen){workshopOpen=false;return;}
    if(state===STATE.PLAYING)state=STATE.PAUSED;
    else if(state===STATE.PAUSED)state=STATE.PLAYING;
    return;
  }
  if(e.key==='Enter'){
    if(inventoryOpen){
      const w=ALL_WEAPONS[inventorySelected];
      if(w&&player.weapons.includes(w))player.weapon=w;
      inventoryOpen=false;return;
    }
    if(workshopOpen){workshopOpen=false;return;}
    if(buyStationOpen){buyStationOpen=false;return;}
    if(state===STATE.PLAYING)handleInteract();
    return;
  }
  if((e.key==='r'||e.key==='R')&&state===STATE.GAME_OVER){restartGame();return;}

  // Workshop number keys
  if(workshopOpen){
    const n=parseInt(e.key);if(n>=1&&n<=4)buyUpgrade(UPGRADE_DEFS[n-1]);
    return;
  }

  // Campaign mode ignores the zombie-only action keys (grenades, build, killstreaks, shop).
  if(camp){if(state===STATE.PLAYING&&(e.key==='y'||e.key==='Y'))cycleWeapon();return;}
  // Multiplayer: grenade (G), cycle nade (Q), reload (R), swap weapon (Y)
  if(gameMode==='mp'){if(state===STATE.PLAYING){
    if(e.key==='g'||e.key==='G')throwGrenade();
    if(e.key==='q'||e.key==='Q')player.selectedGrenade=player.selectedGrenade==='frag'?'flashbang':'frag';
    if(e.key==='r'||e.key==='R')mpStartReload();
    if(e.key==='y'||e.key==='Y')cycleWeapon();
    if(e.key==='5'&&playerDownT<=0){player.hp=0;mpPlayerDown();} // suicide → respawn
  }return;}

  if(state===STATE.PLAYING){
    if(e.key==='g'||e.key==='G')throwGrenade();
    if(e.key==='y'||e.key==='Y')cycleWeapon();
    if(e.key==='f'||e.key==='F')placeDeployable();
    if(e.key==='c'||e.key==='C')cycleDeployable();
    if(e.key==='e'||e.key==='E')triggerKillstreak();
    if(e.key==='v'||e.key==='V')cycleKillstreak();
    if(e.key==='b'||e.key==='B')toggleBuildMode();
    if(e.key==='q'||e.key==='Q'){if(buyStationOpen){const i=SHOP_TABS.indexOf(activeTab);activeTab=SHOP_TABS[(i+1)%SHOP_TABS.length];}else cycleGrenade();}
    if(buyStationOpen){
      if(e.key==='ArrowLeft'){const i=SHOP_TABS.indexOf(activeTab);activeTab=SHOP_TABS[(i-1+SHOP_TABS.length)%SHOP_TABS.length];}
      if(e.key==='ArrowRight'){const i=SHOP_TABS.indexOf(activeTab);activeTab=SHOP_TABS[(i+1)%SHOP_TABS.length];}
      const n=parseInt(e.key);if(n>=1&&n<=9){const items=getTabItems();if(items[n-1])buyItem(items[n-1]);}
    }
  }
});

function drawArcs(camX,camY){

    const segs=6,dx=(x2-x1)/segs,dy=(y2-y1)/segs;

  }

function drawDebris(camX,camY){

    const tx=randInt(2,MAP_W-3),ty=randInt(2,MAP_H-3);
    if(isWall(tx*TILE+TILE/2,ty*TILE+TILE/2))continue;
    if(Math.hypot(tx-cx,ty-cy)<7)continue;      // keep away from the central spawn
    if(Math.hypot(tx-27,ty-27)<3)continue;      // not on the shop
    if(Math.hypot(tx-7,ty-11)<3)continue;       // not on the workshop
    return{tx,ty};
  }
  return SWITCH_POS[mapCfg.id]||{tx:15,ty:8};
}
function newLightsBlock(){
  // Turns the lights off and hides a fresh switch — called once per 5-level block
  lightsOn=false;
  const sp=randomSwitchTile();lightsSwitch={x:sp.tx*TILE+TILE/2,y:sp.ty*TILE+TILE/2};

  buyStationPos={x:27*TILE+TILE/2,y:27*TILE+TILE/2};
  workshopPos={x:7*TILE+TILE/2,y:11*TILE+TILE/2}; // tx=7,ty=11 — clear in all maps
  perkMachines=PERKS_DEF.map((pd,i)=>({...pd,x:PERK_POS[i].tx*TILE+TILE/2,y:PERK_POS[i].ty*TILE+TILE/2,bought:!!perks[pd.id]}));

// ── Safe spawn ─────────────────────────────────────────────────────────────
function findSafeSpawn(){
  const cx=Math.floor(MAP_W/2)*TILE+TILE/2,cy=Math.floor(MAP_H/2)*TILE+TILE/2;
  const clear=(x,y)=>!isWall(x,y)&&!isWall(x+16,y)&&!isWall(x-16,y)&&!isWall(x,y+16)&&!isWall(x,y-16);
  if(clear(cx,cy))return{x:cx,y:cy};
  for(let attempt=0;attempt<500;attempt++){
    const x=randInt(3,MAP_W-4)*TILE+TILE/2,y=randInt(3,MAP_H-4)*TILE+TILE/2;
    if(clear(x,y))return{x,y};
  }
  return{x:cx,y:cy};
}

function buyItem(item){
  if(item.id==='pistolAmmo')return;
  if(item.type==='weapon'&&!weaponUnlocked(item.id)){addNotif(`🔒 ${item.name} unlocks at Level ${WEAPONS[item.id].unlock}`,'#ff8800',3);return;}
  if(currency<item.cost){addNotif(`Need £${item.cost-currency} more`,'#ff8800',2);return;}
  currency-=item.cost;
  if(item.type==='weapon'){
    if(!player.weapons.includes(item.id))player.weapons.push(item.id);
    const base=WEAPON_BUY_AMMO[item.id]||0;
    addAmmo(item.id,getAmmoBonus(item.id,base));
    player.weapon=item.id;

  } else if(item.type==='grenade'){

    addNotif(`+2 ${item.name} — G to throw, Q to cycle`,'#ffdd00',3);

    player.deployables[item.id]=(player.deployables[item.id]||0)+(item.qty||2);
    player.selectedDeployable=item.id;
    addNotif(`+${item.qty||2} ${item.name} — [F] place, [C] cycle`,'#ffaa00',3);
  } else if(item.type==='killstreak'){
    player.killstreaks[item.id]=(player.killstreaks[item.id]||0)+1;
    player.selectedKillstreak=item.id;
    addNotif(`${item.name} ready — [E] use, [V] cycle`,'#ff8800',3);
  } else if(item.type==='armour'){
    const add=item.id==='lightArmour'?50:100;
    player.armourHp=Math.min(player.armourHp+add,200);
    player.maxArmourHp=Math.max(player.maxArmourHp,player.armourHp);
    addNotif(`Armour equipped!`,'#4488ff',2);
  } else if(item.type==='ammo'){
    const map={ammoSmg:['smg',90],ammoShotgun:['shotgun',24],ammoAa12:['aa12',32],ammoRifle:['rifle',40],ammoSniper:['sniper',15],ammoCrossbow:['crossbow',12],ammoFlamethrower:['flamethrower',200],ammoTesla:['tesla',30],ammoRocket:['rocket',5]};

    if(w){
      if((player.ammo[w]||0)>=AMMO_CAP){currency+=item.cost;addNotif(`${w} ammo full (cap ${AMMO_CAP})`,'#ff8800',2);return;}
      const added=addAmmo(w,getAmmoBonus(w,n));addNotif(`+${added} ${w} ammo`,'#aaa',2);
    }
  }
}

const ALL_WEAPONS=['knife','pistol','smg','shotgun','aa12','rifle','sniper','crossbow','machinegun','flamethrower','tesla','rocket'];
// A weapon counts as unlocked once the account level reaches its unlock requirement.
function weaponUnlocked(wid){return levelFromXp(saveData.xp)>=(WEAPONS[wid].unlock||1);}
// MP magazine size per primary (pistol is infinite, knife is melee).
const MAG_SIZE={rifle:30,smg:40,aa12:8,shotgun:8,sniper:5,crossbow:1,machinegun:60,flamethrower:200,tesla:12,rocket:4};
// Resolve the saved MP loadout, falling back if a slot is empty/invalid or no longer unlocked.
function resolveLoadout(){
  const lo=Object.assign({},SAVE_DEFAULT.loadout,saveData.loadout||{});
  if(!WEAPONS[lo.primary]||WEAPONS[lo.primary].melee||lo.primary==='pistol'||!weaponUnlocked(lo.primary))lo.primary='rifle';
  lo.secondary='pistol';
  if(lo.lethal!=='frag'&&lo.lethal!=='molotov')lo.lethal='frag';
  lo.tactical='flashbang';
  return lo;
}
let bullets=[],lastShot=0,arcs=[]; // arcs = transient tesla lightning segments
// A weapon that draws from a reloadable magazine in MP (everything except pistol/melee).
function usesMag(wid){return wid!=='pistol'&&!WEAPONS[wid].melee;}
// Valid targets for area/chain weapons, unified across modes (zombies vs MP red bots).
function hostiles(){return gameMode==='mp'?bots.filter(o=>o.alive&&o.team==='red'):enemies.filter(o=>o.alive);}
function damageHostile(o,dmg){
  o.hp-=dmg;spawnBlood(o.x,o.y,4);
  if(gameMode==='mp'){o.dmgT=0;if(o.hp<=0)mpKill('me',o);}
  else if(o.hp<=0)killEnemy(o);
}
function bteamOf(b){return b.team||(b.fromPlayer?'blue':'red');}
// MP explosive splash (rocket etc.) — mirrors explodeGrenade's RED-bot loop.
function mpExplode(x,y,radius,dmg){
  spawnExplosion(x,y,Math.max(12,Math.round(radius/5)));addShake(10,0.35);
  for(const o of bots){if(!o.alive||o.team!=='red')continue;const d=Math.hypot(o.x-x,o.y-y);if(d<radius){o.hp-=dmg*(1-d/radius);o.dmgT=0;if(o.hp<=0)mpKill('me',o);}}
}
// Flamethrower: drop a brief fire patch just ahead of the player (firePatches update applies the DoT).
function fireFlame(w){
  const px=player.x+Math.cos(player.angle)*50,py=player.y+Math.sin(player.angle)*50;
  firePatches.push({x:px,y:py,radius:46,timer:0.45,dps:w.dmg});
}
// Tesla: zap the nearest hostile, then chain to nearby ones, damage decaying per jump.
function fireTesla(w){
  const list=hostiles();if(!list.length)return;
  const hit=new Set();let fx=player.x,fy=player.y,dmg=w.dmg;
  for(let jump=0;jump<(w.maxChain||4);jump++){
    let best=null,bestD=jump===0?(w.range||360):(w.chainRange||150);
    for(const o of list){if(hit.has(o))continue;const d=Math.hypot(o.x-fx,o.y-fy);if(d<bestD){bestD=d;best=o;}}
    if(!best)break;
    hit.add(best);arcs.push({x1:fx,y1:fy,x2:best.x,y2:best.y,life:0.12});
    damageHostile(best,dmg);
    fx=best.x;fy=best.y;dmg*=0.8;
  }
  addShake(3,0.08);
}
function shoot(){
  if(player.lastStand&&player.weapon!=='pistol')return;
  const uiOpen=inventoryOpen||buyStationOpen||bigMapOpen||workshopOpen;
  if(uiOpen)return;
  const now=performance.now()/1000;
  const w=getWeaponStats(player.weapon);
  const cd=w.cd/(perks.doubleTap?2:1);
  if(now-lastShot<cd)return;
  if(gameMode==='mp'){
    if(w.melee){lastShot=now;mpMelee(w);return;}
    const mag=usesMag(player.weapon); // any primary uses a reloadable magazine; pistol is infinite
    if(mag){
      if(player.reloadT>0)return;
      if(player.mag<=0){mpStartReload();return;}
    }
    lastShot=now;
    if(mag)player.mag--;
    if(w.flame)fireFlame(w);
    else if(w.chain)fireTesla(w);
    else for(let i=0;i<w.pellets;i++){const a=player.angle+rand(-w.spread,w.spread);bullets.push({x:player.x,y:player.y,vx:Math.cos(a)*w.spd,vy:Math.sin(a)*w.spd,dmg:w.dmg,life:w.life||1.6,color:w.color,fromPlayer:true,team:'blue',owner:'me',explosive:w.explosive,blast:w.blast,pierce:w.pierce,br:w.br});}
    spawnMuzzle(player.x+Math.cos(player.angle)*22,player.y+Math.sin(player.angle)*22,player.angle);addShake(3.5,0.1);
    if(mag&&player.mag<=0)mpStartReload();
    return;
  }
  if(w.melee){lastShot=now;meleeAttack(w);return;}
  if(player.ammo[player.weapon]<=0)return;
  lastShot=now;
  if(player.weapon!=='pistol')player.ammo[player.weapon]--;
  if(w.flame)fireFlame(w);
  else if(w.chain)fireTesla(w);
  else for(let i=0;i<w.pellets;i++){const a=player.angle+rand(-w.spread,w.spread);bullets.push({x:player.x,y:player.y,vx:Math.cos(a)*w.spd,vy:Math.sin(a)*w.spd,dmg:w.dmg,life:w.life||1.6,color:w.color,fromPlayer:true,explosive:w.explosive,blast:w.blast,pierce:w.pierce,br:w.br});}
  spawnMuzzle(player.x+Math.cos(player.angle)*22,player.y+Math.sin(player.angle)*22,player.angle);
  addShake(3.5,0.1);
  // Campaign stealth: silenced weapons (pistol, crossbow) stay quiet; loud guns raise the alarm.
  if(gameMode==='campaign'&&player.weapon!=='pistol'&&!w.silent)raiseNoise(player.x,player.y);
}
function meleeAttack(w){
  const range=w.range||50,arc=w.arc||0.8;let hit=false;
  for(const e of enemies){if(!e.alive)continue;
    if(dist(player,e)>range+e.r)continue;
    const ang=Math.atan2(e.y-player.y,e.x-player.x);
    const diff=Math.abs(((ang-player.angle+Math.PI)%(Math.PI*2)+Math.PI*2)%(Math.PI*2)-Math.PI);
    if(diff>arc)continue;
    hit=true;
    if(e.type==='boss'){e.hp-=w.dmg;spawnBlood(e.x,e.y,8);if(e.hp<=0)killEnemy(e);}
    else{spawnBlood(e.x,e.y,12);killEnemy(e);}
  }
  // slash arc effect
  for(let i=0;i<7;i++){const a=player.angle+rand(-arc,arc),s=rand(3,7);particles.push({x:player.x+Math.cos(a)*range*0.6,y:player.y+Math.sin(a)*range*0.6,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.18,maxLife:0.18,r:rand(2,4),color:'#e8e8f0'});}
  addShake(hit?4:1.5,0.08);
}
function cycleWeapon(){
  if(player.lastStand)return;
  const owned=ALL_WEAPONS.filter(w=>player.weapons.includes(w));
  if(owned.length<2)return;
  const i=owned.indexOf(player.weapon);
  player.weapon=owned[(i+1)%owned.length];
}
function cycleGrenade(){const types=['frag','molotov','flashbang'];const i=types.indexOf(player.selectedGrenade);player.selectedGrenade=types[(i+1)%types.length];}

// ── Grenades ───────────────────────────────────────────────────────────────
let grenadeObjects=[],firePatches=[];
function throwGrenade(){
  if(player.lastStand)return;
  const t=player.selectedGrenade;
  if(player.grenades[t]<=0){
    const types=['frag','molotov','flashbang'];
    const next=types.find(tp=>player.grenades[tp]>0);
    if(!next){addNotif('No grenades! Buy from 🧺 Shop — [Enter] near it','#ff4444',3);return;}
    player.selectedGrenade=next;
  }
  player.grenades[player.selectedGrenade]--;
  grenadeObjects.push({x:player.x,y:player.y,vx:Math.cos(player.angle)*300,vy:Math.sin(player.angle)*300,type:player.selectedGrenade,timer:player.selectedGrenade==='flashbang'?0.6:2.0,exploded:false});
}
function updateGrenades(dt){
  grenadeObjects=grenadeObjects.filter(g=>{g.x+=g.vx*dt;g.y+=g.vy*dt;g.vx*=0.9;g.vy*=0.9;if(isWall(g.x,g.y)){g.vx*=-0.5;g.vy*=-0.5;}g.timer-=dt;if(g.timer<=0&&!g.exploded){g.exploded=true;explodeGrenade(g);return false;}return !g.exploded;});
  firePatches=firePatches.filter(f=>{f.timer-=dt;const dps=f.dps||45,mp=gameMode==='mp',tgts=mp?bots:enemies;tgts.forEach(e=>{if(!e.alive||(mp&&e.team!=='red'))return;if(Math.hypot(e.x-f.x,e.y-f.y)<f.radius+(e.r||15)){e.hp-=dps*dt;if(mp){e.dmgT=0;if(e.hp<=0)mpKill('me',e);}else if(e.hp<=0)killEnemy(e);}});return f.timer>0;});
}
function explodeAt(x,y,radius,dmg,shake){
  spawnExplosion(x,y,Math.max(12,Math.round(radius/5)));addShake(shake||10,0.35);
  enemies.forEach(e=>{if(!e.alive)return;const d=Math.hypot(e.x-x,e.y-y);if(d<radius+e.r){e.hp-=dmg*(1-d/(radius+e.r));if(e.hp<=0)killEnemy(e);}});
}
function explodeGrenade(g){
  if(gameMode==='mp'){ // grenades only thrown by the player (BLUE) → affect RED bots
    if(g.type==='flashbang'){spawnExplosion(g.x,g.y,8);for(const o of bots){if(o.alive&&o.team==='red'&&Math.hypot(o.x-g.x,o.y-g.y)<240)o.stun=Math.max(o.stun||0,3.5);}return;}
    spawnExplosion(g.x,g.y,16);addShake(11,0.35);

    return;

  if(g.type==='frag'){explodeAt(g.x,g.y,155,300,13);}

function drawGrenades(camX,camY){

// ── Deployables (mines / claymores / sentry) ─────────────────────────────────
let deployables=[];
const DEPLOY_DEF={
  mine:    {arm:1.0,radius:95, dmg:220},
  claymore:{arm:1.0,range:175,arc:0.95,dmg:300},
  sentry:  {arm:0.4,hp:320,maxHp:320,range:340,fireCd:0,fireRate:0.16,dmg:32,bulletSpd:780},
};
const SENTRY_CAP=1;
function cycleDeployable(){
  const order=['mine','claymore','sentry'];
  const owned=order.filter(t=>player.deployables[t]>0);
  if(owned.length===0)return;
  const i=owned.indexOf(player.selectedDeployable);
  player.selectedDeployable=owned[(i+1)%owned.length];
}
function placeDeployable(){
  if(player.lastStand)return;
  let t=player.selectedDeployable;
  if(!player.deployables[t]||player.deployables[t]<=0){
    const next=['mine','claymore','sentry'].find(tp=>player.deployables[tp]>0);
    if(!next){addNotif('No deployables! Buy from 🧺 Shop','#ff4444',2.5);return;}
    t=player.selectedDeployable=next;
  }
  if(isWall(player.x,player.y)){addNotif('Cannot place here','#ff8800',1.5);return;}
  if(t==='sentry'&&deployables.filter(d=>d.type==='sentry').length>=SENTRY_CAP){addNotif(`Max ${SENTRY_CAP} sentries deployed`,'#ff8800',2);return;}
  player.deployables[t]--;
  const def=DEPLOY_DEF[t];
  deployables.push({type:t,x:player.x,y:player.y,angle:player.angle,arm:def.arm,...def});
  addNotif(`${t.toUpperCase()} placed`,'#ffaa00',1.5);
}
function updateDeployables(dt){
  deployables=deployables.filter(d=>{
    if(d.arm>0){d.arm-=dt;return true;}
    if(d.type==='mine'){
      for(const e of enemies){if(e.alive&&Math.hypot(e.x-d.x,e.y-d.y)<d.radius+e.r){explodeAt(d.x,d.y,d.radius,d.dmg,12);return false;}}
    } else if(d.type==='claymore'){
      for(const e of enemies){if(!e.alive)continue;const dd=Math.hypot(e.x-d.x,e.y-d.y);if(dd>d.range+e.r)continue;
        const ang=Math.atan2(e.y-d.y,e.x-d.x);const diff=Math.abs(((ang-d.angle+Math.PI)%(Math.PI*2)+Math.PI*2)%(Math.PI*2)-Math.PI);
        if(diff<d.arc){explodeAt(d.x+Math.cos(d.angle)*d.range*0.4,d.y+Math.sin(d.angle)*d.range*0.4,d.range*0.6,d.dmg,14);return false;}}
    } else if(d.type==='sentry'){
      return updateSentry(d,dt);
    }
    return true;
  });
}
function updateSentry(d,dt){
  d.fireCd-=dt;
  // zombies in melee range attack the sentry
  for(const e of enemies){if(!e.alive)continue;if(Math.hypot(e.x-d.x,e.y-d.y)<20+e.r&&e.atkCd<=0){d.hp-=e.dmg;e.atkCd=e.atkRate;spawnBlood(d.x,d.y,4,'#ffaa00');}}
  if(d.hp<=0){explodeAt(d.x,d.y,75,50,9);addNotif('Sentry destroyed','#ff6600',2);return false;}
  // target nearest live enemy in range and fire
  let tgt=null,best=d.range;
  for(const e of enemies){if(!e.alive)continue;const dd=Math.hypot(e.x-d.x,e.y-d.y);if(dd<best){best=dd;tgt=e;}}
  if(tgt){
    d.angle=Math.atan2(tgt.y-d.y,tgt.x-d.x);
    if(d.fireCd<=0){
      d.fireCd=d.fireRate;
      const a=d.angle+rand(-0.04,0.04);
      bullets.push({x:d.x+Math.cos(d.angle)*16,y:d.y+Math.sin(d.angle)*16,vx:Math.cos(a)*d.bulletSpd,vy:Math.sin(a)*d.bulletSpd,dmg:d.dmg,life:1.4,color:'#ffdd66',fromPlayer:true});
      spawnMuzzle(d.x+Math.cos(d.angle)*18,d.y+Math.sin(d.angle)*18,d.angle);
    }
  }
  return true;
}
function drawDeployables(camX,camY){
  const t=performance.now();
  deployables.forEach(d=>{const sx=d.x-camX,sy=d.y-camY,armed=d.arm<=0,blink=Math.sin(t/(armed?160:420))>0;
    if(d.type==='mine'){
      ctx.fillStyle=armed?'#7a2a2a':'#444';ctx.beginPath();ctx.arc(sx,sy,7,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#222';ctx.lineWidth=1;ctx.stroke();
      if(blink){ctx.fillStyle='#ff3300';ctx.beginPath();ctx.arc(sx,sy,2.5,0,Math.PI*2);ctx.fill();}
    } else if(d.type==='claymore'){
      ctx.save();ctx.translate(sx,sy);ctx.rotate(d.angle);
      ctx.fillStyle=armed?'#2f6b32':'#444';ctx.fillRect(-3,-9,6,18);
      ctx.fillStyle='#1b4d1f';ctx.fillRect(1,-9,3,18);
      ctx.restore();
      if(blink){ctx.fillStyle='#ff3300';ctx.beginPath();ctx.arc(sx,sy,2,0,Math.PI*2);ctx.fill();}
    } else if(d.type==='sentry'){
      ctx.save();ctx.translate(sx,sy);
      ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=armed?'#ffaa00':'#666';ctx.lineWidth=2;ctx.stroke();
      ctx.rotate(d.angle);ctx.fillStyle='#999';ctx.fillRect(0,-3,22,6);ctx.fillStyle='#555';ctx.fillRect(18,-4,4,8);
      ctx.restore();
      const ratio=Math.max(0,d.hp/d.maxHp);
      ctx.fillStyle='#300';ctx.fillRect(sx-16,sy-21,32,4);
      ctx.fillStyle=ratio>0.4?'#ffaa00':'#ff4400';ctx.fillRect(sx-16,sy-21,32*ratio,4);
    }
  });
}

// ── Killstreaks (nuke / airstrike / mortar) ──────────────────────────────────
let airBombs=[],airstrikePending=false;
let flashUntil=0,flashDur=0,flashColor='255,255,255';
function triggerFlash(rgb,dur){flashColor=rgb;flashDur=dur;flashUntil=performance.now()/1000+dur;}
function drawScreenFlash(){const now=performance.now()/1000;if(now<flashUntil){const a=(flashUntil-now)/flashDur;ctx.fillStyle=`rgba(${flashColor},${a*0.85})`;ctx.fillRect(0,0,W,H);}}
function cycleKillstreak(){
  const owned=KILLSTREAKS_DEF.map(k=>k.id).filter(t=>player.killstreaks[t]>0);
  if(!owned.length)return;
  const i=owned.indexOf(player.selectedKillstreak);
  player.selectedKillstreak=owned[(i+1)%owned.length];
}
function triggerKillstreak(){
  if(player.lastStand)return;
  let id=player.selectedKillstreak;
  if(!player.killstreaks[id]||player.killstreaks[id]<=0){
    const next=KILLSTREAKS_DEF.map(k=>k.id).find(t=>player.killstreaks[t]>0);
    if(!next){addNotif('No killstreaks! Buy from 🧺 Shop','#ff4444',2.5);return;}
    id=player.selectedKillstreak=next;
  }
  if(id==='airstrike'){airstrikePending=true;addNotif('🛩 Airstrike armed — click a target location','#ff8800',4);return;}
  player.killstreaks[id]--;
  if(id==='nuke'){triggerFlash('255,255,255',0.7);addShake(26,0.8);enemies.forEach(e=>{if(e.alive)killEnemy(e);});addNotif('☢ NUKE — area cleared!','#ffffff',3.5);}
  else if(id==='mortar')callMortar();
}
function callAirstrike(wx,wy){
  if((player.killstreaks.airstrike||0)<=0)return;
  player.killstreaks.airstrike--;
  const dir=rand(0,Math.PI*2),n=10,spacing=72;
  for(let i=0;i<n;i++){const off=(i-n/2)*spacing;airBombs.push({x:wx+Math.cos(dir)*off,y:wy+Math.sin(dir)*off,delay:0.8+i*0.11});}
  addNotif('🛩 Airstrike inbound!','#ff8800',3);
}
function callMortar(){
  for(let i=0;i<16;i++){airBombs.push({x:rand(TILE*2,(MAP_W-2)*TILE),y:rand(TILE*2,(MAP_H-2)*TILE),delay:0.3+i*0.17});}
  addNotif('💥 Mortar barrage incoming!','#ffaa33',3);
}
function updateAirBombs(dt){
  airBombs=airBombs.filter(b=>{b.delay-=dt;if(b.delay<=0){explodeAt(b.x,b.y,110,180,9);addShake(7,0.2);return false;}return true;});
}
function drawAirBombs(camX,camY){
  airBombs.forEach(b=>{const sx=b.x-camX,sy=b.y-camY,p=1-Math.min(1,b.delay/1.5);
    ctx.strokeStyle='rgba(255,90,0,0.55)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,120,0,0.22)';ctx.beginPath();ctx.arc(sx,sy,14*p,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,140,0,0.6)';ctx.beginPath();ctx.moveTo(sx-18,sy);ctx.lineTo(sx+18,sy);ctx.moveTo(sx,sy-18);ctx.lineTo(sx,sy+18);ctx.stroke();
  });
}

// ── Buildable shelter ────────────────────────────────────────────────────────
let buildMode=false,builtWalls=[];
const WALL_COST=150,WALL_HP=400;
function toggleBuildMode(){
  if(player.lastStand)return;
  buildMode=!buildMode;
  if(buildMode){inventoryOpen=buyStationOpen=bigMapOpen=workshopOpen=false;addNotif(`BUILD MODE — click to place a wall (£${WALL_COST}).  [B] exit`,'#88ccff',3);}
}
function placeWall(mx,my){
  const camX=Math.round(player.x-W/2),camY=Math.round(player.y-H/2),tx=Math.floor((mx+camX)/TILE),ty=Math.floor((my+camY)/TILE);
  if(tx<1||tx>=MAP_W-1||ty<1||ty>=MAP_H-1){addNotif('Out of bounds','#ff8800',1.2);return;}
  if(worldMap[ty][tx]!==0){addNotif('Already blocked there','#ff8800',1.2);return;}
  if(Math.floor(player.x/TILE)===tx&&Math.floor(player.y/TILE)===ty){addNotif('Move off the tile first','#ff8800',1.2);return;}
  if(currency<WALL_COST){addNotif(`Need £${WALL_COST-currency} more`,'#ff8800',1.5);return;}
  currency-=WALL_COST;worldMap[ty][tx]=1;
  builtWalls.push({tx,ty,x:tx*TILE+TILE/2,y:ty*TILE+TILE/2,hp:WALL_HP,maxHp:WALL_HP});
}
function clearBuiltWalls(){builtWalls.forEach(w=>{if(worldMap[w.ty])worldMap[w.ty][w.tx]=0;});builtWalls=[];}
function updateBuiltWalls(dt){
  enemies.forEach(e=>{if(!e.alive)return;builtWalls.forEach(w=>{if(Math.hypot(e.x-w.x,e.y-w.y)<TILE*0.55+e.r&&e.atkCd<=0){w.hp-=e.dmg;e.atkCd=e.atkRate;spawnBlood(w.x,w.y,3,'#9aa');}});});
  builtWalls=builtWalls.filter(w=>{if(w.hp<=0){if(worldMap[w.ty])worldMap[w.ty][w.tx]=0;spawnExplosion(w.x,w.y,10);addShake(4,0.12);return false;}return true;});
}
function drawBuiltWalls(camX,camY){
  builtWalls.forEach(w=>{const sx=w.x-camX-TILE/2,sy=w.y-camY-TILE/2,ratio=w.hp/w.maxHp;
    ctx.fillStyle='#4a5560';ctx.fillRect(sx+3,sy+3,TILE-6,TILE-6);
    ctx.fillStyle='#5f6e7a';ctx.fillRect(sx+3,sy+3,TILE-6,4);
    ctx.strokeStyle='#2a323a';ctx.lineWidth=2;ctx.strokeRect(sx+3,sy+3,TILE-6,TILE-6);
    if(ratio<1){ctx.fillStyle='#300';ctx.fillRect(sx+8,sy+6,TILE-16,5);ctx.fillStyle=ratio>0.4?'#8fce4f':'#cc4422';ctx.fillRect(sx+8,sy+6,(TILE-16)*ratio,5);}
  });

// ── Interact ───────────────────────────────────────────────────────────────
function handleInteract(){
  if(player.lastStand)return;
  // Campaign: Enter performs a silent takedown when positioned behind a guard.
  if(gameMode==='campaign'){
    if(takedownTarget&&takedownTarget.alive){
      takedownTarget.alive=false;spawnBlood(takedownTarget.x,takedownTarget.y,16);
      addNotif('Silent takedown','#9aa0a6',1.5);addShake(3,0.1);takedownTarget=null;
    }
    return;
  }
  if(lightsSwitch&&!lightsOn&&dist(player,lightsSwitch)<60){activateLights();return;}
  if(workshopPos&&dist(player,workshopPos)<70){workshopOpen=true;if(!player.weapons.includes(workshopSelectedWeapon))workshopSelectedWeapon=player.weapon;inventoryOpen=false;bigMapOpen=false;buyStationOpen=false;return;}
  if(buyStationPos&&dist(player,buyStationPos)<70){buyStationOpen=true;inventoryOpen=false;bigMapOpen=false;workshopOpen=false;return;}
  for(const pm of perkMachines){if(!pm.bought&&dist(player,pm)<55){if(currency>=pm.cost){currency-=pm.cost;pm.bought=true;applyPerk(pm.id);}else addNotif(`Need £${pm.cost-currency} more for ${pm.name}`,'#ff8800',2);return;}}
  for(const b of barricades){if(Math.hypot(player.x-b.x,player.y-b.y)<60&&b.hp<b.maxHp){if(currency>=100){currency-=100;b.hp=Math.min(b.maxHp,b.hp+50);addNotif('Barricade repaired!','#8b4513',2);}else addNotif('Need £100 to repair barricade','#ff8800',2);return;}}
}
function activateLights(){
  lightsOn=true;player.flashLen=9999;player.flashAngle=Math.PI;
  enemies.forEach(e=>{if(e.alive){e.hp-=50;if(e.hp<=0)killEnemy(e);}});
  spawnExplosion(lightsSwitch.x,lightsSwitch.y,20);addShake(14,0.4);
  addNotif('⚡ LIGHTS ON — Power surge hit all enemies!','#ffdd00',4);
  addNotif('🧺 Buy station unlocked — [Enter] near it to shop','#2ecc71',4);
}
function applyPerk(id){
  perks[id]=true;
  if(id==='juggernog'){player.maxHp*=2;player.hp=Math.min(player.hp*2,player.maxHp);}
  if(id==='speed')player.speed=Math.round(player.speed*1.3);
  const pd=PERKS_DEF.find(p=>p.id===id);
  if(pd)addNotif(`${pd.symbol} ${pd.name} active — ${pd.desc}`,pd.color,3);
}

// ── Damage / Last Stand ────────────────────────────────────────────────────
function takeDamage(dmg){
  if(player.invincible>0)return;
  if(player.armourHp>0){const abs=Math.min(player.armourHp,dmg*0.7);player.armourHp-=abs;dmg-=abs;}
  player.hp-=dmg;
  if(gameMode==='mp'){player.dmgT=0;if(player.hp<=0)mpPlayerDown();return;} // MP: death = respawn, handled separately
  if(player.hp<=0&&!player.lastStand){
    if(perks.quickRevive&&!quickReviveUsed){quickReviveUsed=true;player.hp=30;player.invincible=1.5;addNotif('❤️ Quick Revive — back in action!','#00aaff',3);}
    else enterLastStand();
  }
}
function enterLastStand(){
  player.lastStand=true;player.lastStandTimer=10;player.hp=1;player.weapon='pistol';
  addShake(15,0.5);addNotif('YOU ARE DOWN — 10 seconds to survive! Pistol only','#e63946',4);
}

function updateBarricades(dt){

// ── Enemies ────────────────────────────────────────────────────────────────
let enemies=[];
const ET={
  walker: {hp:60,  spd:52,  dmg:10,r:16,color:'#2f6a1f',val:100, atkRate:1.2},
  runner: {hp:30,  spd:115, dmg:7, r:11,color:'#3a9a2a',val:200, atkRate:0.85},
  brute:  {hp:220, spd:32,  dmg:28,r:28,color:'#143a0a',val:500, atkRate:1.8},
  spitter:{hp:45,  spd:42,  dmg:15,r:13,color:'#5a1a5a',val:350, atkRate:2.0},
  gunner: {hp:70,  spd:60,  dmg:14,r:14,color:'#2f6a1f',val:400, atkRate:1.6,ranged:true},
  boss:   {hp:900, spd:52,  dmg:32,r:42,color:'#0d0000',val:6000,atkRate:1.4},
};
function isBossLevel(){return globalLevel%5===0;}
function diffMult(){return 1+(globalLevel-1)*0.18;}
function getLevelConfig(){
  if(isBossLevel())return[{t:'boss',n:1},{t:'walker',n:globalLevel+3}];
  const lvl=globalLevel;
  const config=[{t:'walker',n:clamp(2+lvl*2,4,30)}];
  if(lvl>=4)config.push({t:'runner',n:clamp(Math.floor(lvl/3),1,10)});
  if(lvl>=8)config.push({t:'brute',n:clamp(Math.floor(lvl/7),1,5)});
  if(lvl>=6)config.push({t:'spitter',n:clamp(Math.floor(lvl/5),1,6)});
  if(lvl>=6)config.push({t:'gunner',n:clamp(Math.floor(lvl/6),1,6)});
  return config;
}
function startWave(){
  enemies=[];waveActive=true;
  getLevelConfig().forEach(({t,n})=>{for(let i=0;i<n;i++)spawnEnemy(t);});
  if(isBossLevel())addNotif(`⚠ BOSS WAVE — Level ${globalLevel}!`,'#ff3300',4);
  else addNotif(`Level ${globalLevel} — ${enemies.length} enemies`,'#e63946',2);
}
function spawnEnemy(type){
  const tmpl=ET[type];
  let ex,ey,tries=0;
  do{const s=randInt(0,3);if(s===0){ex=rand(TILE*2,(MAP_W-2)*TILE);ey=TILE*2;}else if(s===1){ex=(MAP_W-2)*TILE;ey=rand(TILE*2,(MAP_H-2)*TILE);}else if(s===2){ex=rand(TILE*2,(MAP_W-2)*TILE);ey=(MAP_H-2)*TILE;}else{ex=TILE*2;ey=rand(TILE*2,(MAP_H-2)*TILE);}tries++;}while(isWall(ex,ey)&&tries<20);
  const mult=diffMult();
  let hp=tmpl.hp*mult,r=tmpl.r;
  if(type==='boss'){const g=Math.min(Math.ceil(globalLevel/5)-1,3);hp=[900,1800,3200,5500][g];r=[42,54,66,82][g];}
  enemies.push({x:ex,y:ey,type,hp,maxHp:hp,spd:tmpl.spd*(1+(globalLevel-1)*0.03),dmg:tmpl.dmg*(1+(globalLevel-1)*0.08),r,color:tmpl.color,val:tmpl.val,atkCd:0,atkRate:tmpl.atkRate,angle:0,wobble:rand(0,Math.PI*2),alive:true,stunned:0});
}
function killEnemy(e){
  if(!e.alive)return;
  e.alive=false;score+=e.val;
  // Kill combo: ramp a cash multiplier while kills keep landing inside the window
  comboCount++;comboTimer=COMBO_WINDOW;comboPop=1;if(comboCount>comboBest)comboBest=comboCount;
  if(comboCount===3||comboCount===7||comboCount===12||comboCount===20||comboCount===30)
    addNotif(`${comboCount} COMBO!  x${comboMult(comboCount)} cash`,'#ffcc44',1.6);
  currency+=Math.round((80+Math.floor(e.val/100)*20)*comboMult(comboCount));
  // Persistent progression: coins + all-time kills
  sessionKills++;
  const coinGain=e.type==='boss'?100:(1+Math.floor(e.val/100));
  sessionCoins+=coinGain;
  bumpChallenge('kills',1);bumpChallenge('coins',coinGain);if(e.type==='boss')bumpChallenge('boss',1);
  spawnBlood(e.x,e.y,14);addShake(4.5,0.15);
  // Random loot drop (drop rate itself is randomised per kill)
  if(e.type!=='boss'&&Math.random()<rand(0.10,0.25))dropRandomLoot(e.x,e.y);
  if(e.type==='gunner')dropAmmoPickup(e.x,e.y);
  // Boss rewards: a machine gun, plus a big cash drop on levels 5/10/15
  if(e.type==='boss'){
    spawnExplosion(e.x,e.y,30);addShake(12,0.5);
    if(!player.weapons.includes('machinegun'))spawnPickup('machinegun',e.x,e.y);
    const cash={5:2000,10:4000,15:8000}[globalLevel];
    if(cash)spawnPickup('cash',e.x+44,e.y,cash);
  }
}
function updateEnemies(dt){
  enemies.forEach(e=>{
    if(!e.alive)return;e.wobble+=dt*3.5;
    if(e.stunned>0){e.stunned-=dt;return;}
    const dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy);
    let mx=dx/d,my=dy/d;
    if(isWall(e.x+mx*40,e.y))mx=0;if(isWall(e.x,e.y+my*40))my=0;
    if(mx===0&&my===0){mx=dy/d;my=-dx/d;}
    const nx=e.x+mx*e.spd*dt,ny=e.y+my*e.spd*dt;
    if(!isWall(nx,e.y))e.x=nx;if(!isWall(e.x,ny))e.y=ny;
    e.angle=Math.atan2(dy,dx);e.atkCd-=dt;
    if(d<player.radius+e.r+5&&e.atkCd<=0){if(player.invincible<=0){takeDamage(e.dmg);player.invincible=0.5;addShake(8,0.28);}e.atkCd=e.atkRate;}
    if(e.type==='spitter'&&d>90&&d<320&&e.atkCd<=0){const a=Math.atan2(player.y-e.y,player.x-e.x);bullets.push({x:e.x,y:e.y,vx:Math.cos(a)*200,vy:Math.sin(a)*200,dmg:e.dmg,life:2.2,color:'#cc00ff',fromPlayer:false,br:7});e.atkCd=e.atkRate;}
    if(e.ranged&&d>70&&d<430&&e.atkCd<=0){const a=Math.atan2(player.y-e.y,player.x-e.x)+rand(-0.05,0.05);bullets.push({x:e.x,y:e.y,vx:Math.cos(a)*430,vy:Math.sin(a)*430,dmg:e.dmg,life:1.6,color:'#ffdd66',fromPlayer:false,br:4});spawnMuzzle(e.x+Math.cos(a)*16,e.y+Math.sin(a)*16,a);e.atkCd=e.atkRate;}
  });
  enemies=enemies.filter(e=>e.alive);
}

// ── Player update ──────────────────────────────────────────────────────────
function updatePlayer(dt){
  if(player.lastStand){player.lastStandTimer-=dt;if(player.lastStandTimer<=0){gameOver();return;}player.weapon='pistol';}
  // Flashlight battery: drains while the map lights are off; dead battery = near-total darkness
  if(lightsOn){player.flashLen=9999;player.flashAngle=Math.PI;}
  else{
    const was=player.battery;
    player.battery=Math.max(0,player.battery-dt);
    if(was>0&&player.battery<=0)addNotif('🔦 Flashlight dead — find the light switch!','#ff5533',4);
    player.flashAngle=Math.PI/3.8;player.flashLen=player.battery>0?290:46;
  }
  const uiOpen=inventoryOpen||buyStationOpen||bigMapOpen||workshopOpen;
  let dx=0,dy=0;
  if(!uiOpen){
    if(keys['w']||keys['W']||keys['ArrowUp'])dy-=1;
    if(keys['s']||keys['S']||keys['ArrowDown'])dy+=1;
    if(keys['a']||keys['A']||keys['ArrowLeft'])dx-=1;
    if(keys['d']||keys['D']||keys['ArrowRight'])dx+=1;
    if(touchMove.active){dx=touchMove.dx;dy=touchMove.dy;} // mobile joystick overrides (never set on desktop)
  }
  const len=Math.hypot(dx,dy);if(len>0){dx/=len;dy/=len;}
  const spd=player.lastStand?80:player.speed;
  const nx=player.x+dx*spd*dt,ny=player.y+dy*spd*dt,r=player.radius-2;
  if(!isWall(nx+r,player.y)&&!isWall(nx-r,player.y)&&!isWall(nx,player.y+r)&&!isWall(nx,player.y-r))player.x=nx;
  if(!isWall(player.x+r,ny)&&!isWall(player.x-r,ny)&&!isWall(player.x,ny+r)&&!isWall(player.x,ny-r))player.y=ny;
  const camX=player.x-W/2,camY=player.y-H/2;
  player.angle=Math.atan2(mouse.y+camY-player.y,mouse.x+camX-player.x);
  if((mouse.down||keys[' '])&&!uiOpen&&!airstrikePending&&!buildMode)shoot();
  if(player.invincible>0)player.invincible-=dt;
  if(!player.lastStand&&!uiOpen){
    for(let wi=0;wi<ALL_WEAPONS.length;wi++){if(keys[String(wi+1)]&&player.weapons.includes(ALL_WEAPONS[wi]))player.weapon=ALL_WEAPONS[wi];}
  }
}
function drawPlayer(camX,camY){
  const sx=player.x-camX,sy=player.y-camY;

  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.beginPath();ctx.ellipse(3,6,13,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=flash?'#fff':(ls?'#662200':ot.body);ctx.beginPath();ctx.arc(0,0,player.radius*(ls?0.8:1),0,Math.PI*2);ctx.fill();
  ctx.fillStyle=flash?'#ccc':(ls?'#441100':ot.trim);ctx.beginPath();ctx.arc(0,0,player.radius*(ls?0.5:0.65),0,Math.PI*2);ctx.fill();
  if(!ls){ctx.fillStyle='#555';ctx.fillRect(8,-4,22,8);ctx.fillStyle='#333';ctx.fillRect(22,-3,10,6);}
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(5,-6,4,0,Math.PI*2);ctx.arc(5,6,4,0,Math.PI*2);ctx.fill();

// ── Bullets ────────────────────────────────────────────────────────────────
function updateBullets(dt){
  bullets=bullets.filter(b=>{
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||isWall(b.x,b.y)){if(b.explosive)explodeAt(b.x,b.y,b.blast,b.dmg);else if(isWall(b.x,b.y))spawnBlood(b.x,b.y,3,'#888');return false;}
    if(b.fromPlayer){for(const e of enemies){if(!e.alive)continue;if(dist(b,e)<e.r+(b.br||4)){
      if(b.explosive){explodeAt(b.x,b.y,b.blast,b.dmg);return false;}
      if(b.pierce){if(!b.hit)b.hit=new Set();if(b.hit.has(e))continue;b.hit.add(e);spawnBlood(b.x,b.y,6);e.hp-=b.dmg;if(e.hp<=0)killEnemy(e);continue;} // bolt passes through
      spawnBlood(b.x,b.y,6);e.hp-=b.dmg;if(e.hp<=0)killEnemy(e);return false;}}}

// ── Pickups ────────────────────────────────────────────────────────────────
let pickups=[];
function spawnPickup(type,x,y,amount,extra){
  let px=x,py=y;if(isWall(px,py)){px=player.x+rand(-80,80);py=player.y+rand(-80,80);}

function dropRandomLoot(x,y){

  if(e.hp<e.maxHp){const bw=e.r*2.8,bx=sx-bw/2,by=sy-e.r-13;ctx.fillStyle='#300';ctx.fillRect(bx,by,bw,7);ctx.fillStyle=e.type==='boss'?'#ff3300':'#cc2222';ctx.fillRect(bx,by,bw*(e.hp/e.maxHp),7);ctx.strokeStyle='#111';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,7);}
  if(e.stunned>0){ctx.fillStyle='rgba(150,150,255,0.8)';ctx.font='14px Courier New';ctx.textAlign='center';ctx.fillText('*',sx,sy-e.r-18);}
}

// ── Flashlight ─────────────────────────────────────────────────────────────
function drawFlashlight(camX,camY){
  const sx=player.x-camX,sy=player.y-camY;
  fogCtx.clearRect(0,0,W,H);fogCtx.fillStyle=mapCfg.fog;fogCtx.fillRect(0,0,W,H);
  fogCtx.save();fogCtx.globalCompositeOperation='destination-out';
  const g=fogCtx.createRadialGradient(sx,sy,0,sx,sy,player.flashLen);
  g.addColorStop(0,'rgba(0,0,0,1)');g.addColorStop(0.75,'rgba(0,0,0,0.95)');g.addColorStop(1,'rgba(0,0,0,0)');
  fogCtx.fillStyle=g;fogCtx.beginPath();fogCtx.moveTo(sx,sy);fogCtx.arc(sx,sy,player.flashLen,player.angle-player.flashAngle,player.angle+player.flashAngle);fogCtx.closePath();fogCtx.fill();
  const ag=fogCtx.createRadialGradient(sx,sy,0,sx,sy,55);ag.addColorStop(0,'rgba(0,0,0,0.75)');ag.addColorStop(1,'rgba(0,0,0,0)');
  fogCtx.fillStyle=ag;fogCtx.beginPath();fogCtx.arc(sx,sy,55,0,Math.PI*2);fogCtx.fill();
  fogCtx.restore();ctx.drawImage(fogCanvas,0,0);

}

// ── Objective arrow ────────────────────────────────────────────────────────
function drawObjectiveArrow(camX,camY){
  if(!lightsSwitch||lightsOn)return;
  const ssx=lightsSwitch.x-camX,ssy=lightsSwitch.y-camY;
  if(ssx>40&&ssx<W-40&&ssy>40&&ssy<H-40)return;
  const angle=Math.atan2(lightsSwitch.y-player.y,lightsSwitch.x-player.x);
  const margin=50,ax=clamp(W/2+Math.cos(angle)*(W/2),margin,W-margin),ay=clamp(H/2+Math.sin(angle)*(H/2),margin,H-margin);
  const pulse=Math.sin(performance.now()/280)*0.35+0.65;
  ctx.save();ctx.translate(ax,ay);ctx.rotate(angle);ctx.globalAlpha=pulse;
  ctx.fillStyle='#ffdd00';ctx.shadowColor='#ffdd00';ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(-10,-10);ctx.lineTo(-6,0);ctx.lineTo(-10,10);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.restore();
  ctx.fillStyle='#ffdd00';ctx.font='bold 9px Courier New';ctx.textAlign='center';
  ctx.fillText('⚡ LIGHTS',ax,ay+22);
}

function drawMinimap(){
  const mW=260,mH=260,mX=W-mW-14,mY=74;
  const scX=mW/(MAP_W*TILE),scY=mH/(MAP_H*TILE);
  // Background + border
  ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(mX-3,mY-3,mW+6,mH+6);
  ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(mX-3,mY-3,mW+6,mH+6);
  // Walls
  for(let ty=0;ty<MAP_H;ty++)for(let tx=0;tx<MAP_W;tx++)if(worldMap[ty][tx]===1){ctx.fillStyle='#3a3a3a';ctx.fillRect(mX+tx*TILE*scX,mY+ty*TILE*scY,Math.ceil(TILE*scX)+1,Math.ceil(TILE*scY)+1);}
  // Helper: draw emoji centred on a world-space position
  function icon(wx,wy,emoji,size=13){
    const sx=mX+wx*scX,sy=mY+wy*scY;
    ctx.font=`${size}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(emoji,sx,sy);
  }
  // Enemies (dots — too many for emoji)
  enemies.forEach(e=>{
    if(e.type==='boss'){
      ctx.font='13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('💀',mX+e.x*scX,mY+e.y*scY);
    } else {
      ctx.fillStyle='#dd2222';ctx.fillRect(mX+e.x*scX-2,mY+e.y*scY-2,4,4);
    }
  });
  // Perk machines
  perkMachines.forEach(pm=>{if(!pm.bought)icon(pm.x,pm.y,pm.symbol,12);});
  // Buy station
  if(buyStationPos)icon(buyStationPos.x,buyStationPos.y,'🧺',14);
  // Workshop
  if(workshopPos)icon(workshopPos.x,workshopPos.y,'🔧',14);
  // (lights switch is hidden — no marker)
  // Player — glowing blue dot + direction arrow
  const px=mX+player.x*scX,py=mY+player.y*scY;
  ctx.strokeStyle='#88ccff';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+Math.cos(player.angle)*9,py+Math.sin(player.angle)*9);ctx.stroke();
  ctx.fillStyle='#4a9eff';ctx.shadowColor='#4a9eff';ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  // Border + label
  ctx.textBaseline='alphabetic';
  ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(mX,mY,mW,mH);
  ctx.fillStyle='#555';ctx.font='10px Courier New';ctx.textAlign='left';ctx.fillText('[M] full map',mX,mY+mH+14);
}

// ── Big map ────────────────────────────────────────────────────────────────
function drawBigMap(){
  if(!bigMapOpen)return;
  ctx.fillStyle='rgba(0,0,0,0.94)';ctx.fillRect(0,0,W,H);
  const mW=W-100,mH=H-120,mX=50,mY=58;
  const scX=mW/(MAP_W*TILE),scY=mH/(MAP_H*TILE);
  for(let ty=0;ty<MAP_H;ty++)for(let tx=0;tx<MAP_W;tx++){
    const sx=mX+tx*TILE*scX,sy=mY+ty*TILE*scY,sw=Math.ceil(TILE*scX)+1,sh=Math.ceil(TILE*scY)+1;
    ctx.fillStyle=worldMap[ty][tx]===1?((tx+ty)%2===0?mapCfg.wallA:mapCfg.wallB):((tx+ty)%2===0?mapCfg.floorA:mapCfg.floorB);
    ctx.fillRect(sx,sy,sw,sh);
  }
  function mark(x,y,col,label,emoji){
    const sx=mX+x*scX,sy=mY+y*scY;
    ctx.shadowColor=col;ctx.shadowBlur=8;ctx.fillStyle=col;ctx.beginPath();ctx.arc(sx,sy,6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    if(emoji){ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText(emoji,sx,sy+4);}
    ctx.fillStyle=col;ctx.font='bold 8px Courier New';ctx.textAlign='center';ctx.fillText(label,sx,sy+18);
  }
  if(buyStationPos)mark(buyStationPos.x,buyStationPos.y,'#2ecc71','SHOP','🧺');
  if(workshopPos)mark(workshopPos.x,workshopPos.y,'#ff8800','WORKSHOP','🔧');
  perkMachines.forEach(pm=>{if(!pm.bought)mark(pm.x,pm.y,pm.color,pm.name,pm.symbol);});
  barricades.forEach(b=>mark(b.x,b.y,'#8b4513','BARRICADE',null));
  enemies.forEach(e=>{const sx=mX+e.x*scX,sy=mY+e.y*scY;ctx.fillStyle=e.type==='boss'?'#ff6600':'#dd2222';ctx.beginPath();ctx.arc(sx,sy,e.type==='boss'?5:2.5,0,Math.PI*2);ctx.fill();});
  const px=mX+player.x*scX,py=mY+player.y*scY;
  ctx.fillStyle='#4a9eff';ctx.shadowColor='#4a9eff';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 8px Courier New';ctx.textAlign='center';ctx.fillText('YOU',px,py+18);
  ctx.fillStyle=mapCfg.accentColor;ctx.font='bold 15px Courier New';ctx.textAlign='center';ctx.fillText(`${mapCfg.name.toUpperCase()} — LEVEL ${globalLevel}/20`,W/2,36);
  const leg=[['#4a9eff','You'],['#dd2222','Enemies'],['#ff6600','Boss'],['#ffdd00','⚡ Lights'],['#2ecc71','🧺 Shop'],['#ff8800','🔧 Workshop'],['#ff6b00','🛡 Jugger'],['#00ff88','💨 Speed'],['#ff3300','🔫 D.Tap'],['#00aaff','❤️ Q.Rev']];
  leg.forEach((l,i)=>{const lx=mX+(i*(mW/leg.length))+(mW/leg.length/2),ly=mY+mH+22;ctx.fillStyle=l[0];ctx.beginPath();ctx.arc(lx,ly-5,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#888';ctx.font='7px Courier New';ctx.textAlign='center';ctx.fillText(l[1],lx,ly+6);});
  ctx.fillStyle='#444';ctx.font='11px Courier New';ctx.textAlign='center';ctx.fillText('[M] or [ESC] to close',W/2,H-10);
}

// ── Buy station UI ─────────────────────────────────────────────────────────
function drawBuyStation(){
  if(!buyStationOpen)return;
  const items=getTabItems();
  // Row height shrinks so even a long tab (e.g. all weapons) fits on screen.

function startGame(mapIdx){
  syncChallengePeriods();
  gameMode='zombies';mission=null;
  campaignMode=(mapIdx===undefined||mapIdx===null);
  fixedMapIdx=campaignMode?0:Math.max(0,Math.min(mapIdx,MAPS.length-1));
  globalLevel=1;score=0;currency=0;
  sessionCoins=0;sessionKills=0;resetCombo();
  waveActive=false;levelComplete=false;levelStartTimer=2.5;levelTimer=0;
  bullets=[];particles=[];pickups=[];enemies=[];grenadeObjects=[];firePatches=[];notifs=[];deployables=[];airBombs=[];airstrikePending=false;flashUntil=0;builtWalls=[];buildMode=false;
  lightsOn=false;buyStationOpen=false;inventoryOpen=false;bigMapOpen=false;workshopOpen=false;
  inventoryAnim=0;inventorySelected=0;workshopSelectedWeapon='pistol';
  resetUpgrades();
  generateMap(MAPS[fixedMapIdx]);
  newLightsBlock();
  initPlayer();
  gameStartTime=performance.now()/1000;
  startCountdown=5;
  state=STATE.PLAYING;
  addNotif(`DEAD ZONE — Level 1/20${campaignMode?'':' · '+MAPS[fixedMapIdx].name}`,'#e63946',3);
  addNotif('Buy weapons from 🧺 shop  ·  Upgrade at 🔧 workshop','#2ecc71',5);
}
function restartGame(){if(gameMode==='mp'){startMultiplayer(mpMode);return;}if(gameMode==='campaign'&&mission){startMission(mission.id);return;}startGame(campaignMode?null:fixedMapIdx);}

// Fold the current run's earnings/stats into the persistent save
function commitRun(died){
  saveData.coins+=sessionCoins;
  saveData.kills+=sessionKills;
  if(died)saveData.deaths++;
  saveData.gamesPlayed++;
  if(globalLevel>saveData.highestLevel)saveData.highestLevel=globalLevel;
  if(score>saveData.bestScore)saveData.bestScore=score;
  bumpChallenge('games',1);
  addXp(sessionKills*5+globalLevel*20+Math.floor(score/200));
  writeSave();
  sessionCoins=0;sessionKills=0;
}
function gameOver(){
  state=STATE.GAME_OVER;
  if(gameMode==='campaign'&&!failReason)failReason='You were killed';
  if(score>highScore){highScore=score;localStorage.setItem('dz_hs',highScore);}
  commitRun(true);
}
// Campaign mission failed without dying (spotted on a ghost run, timer expired, etc.)
function missionFailed(reason){
  if(state!==STATE.PLAYING)return;
  failReason=reason||'Mission failed';
  commitRun(true);
  state=STATE.GAME_OVER; // reuses the GAME_OVER → RETRY/MENU plumbing
}

function advanceLevel(){
  // Safety net: auto-collect any boss loot the player didn't physically reach
  pickups.forEach(p=>{
    if(p.type==='cash'){currency+=p.amount;addNotif(`💰 +£${p.amount} collected`,'#ffd700',3);}
    else if(p.type==='machinegun'&&!player.weapons.includes('machinegun')){player.weapons.push('machinegun');addAmmo('machinegun',getAmmoBonus('machinegun',120));addNotif('🔫 Machine gun collected!','#ffcc44',3);}
  });
  pickups=[];
  clearBuiltWalls();buildMode=false;
  globalLevel++;
  bumpChallenge('level',globalLevel);bumpChallenge('survive',globalLevel);
  if(globalLevel>20){state=STATE.WIN;if(score>highScore){highScore=score;localStorage.setItem('dz_hs',highScore);}commitRun(false);return;}
  const mapIdx=Math.floor((globalLevel-1)/5);
  const newMap=campaignMode&&(globalLevel-1)%5===0;
  if(newMap){
    generateMap(MAPS[Math.min(mapIdx,3)]);
    // Move player to a safe spawn on the new map
    const sp=findSafeSpawn();
    player.x=sp.x;player.y=sp.y;
    addNotif(`NEW AREA: ${MAPS[Math.min(mapIdx,3)].name}`,MAPS[Math.min(mapIdx,3)].accentColor,4);
  } else {
    setupMapObjects();
  }
  // Lights only go out at the start of each 5-level block; otherwise they (and the switch) persist.
  // The flashlight battery is never refilled — it keeps draining across the run whenever lights are off.
  const newBlock=(globalLevel-1)%5===0;
  if(newBlock)newLightsBlock();
  player.lastStand=false;player.invincible=0;
  player.hp=Math.min(player.hp+20,player.maxHp);
  bullets=[];grenadeObjects=[];firePatches=[];particles=[];
  levelStartTimer=3.0;
  if(newBlock&&!lightsOn)addNotif('Power is OUT in this area — flashlight running down. Find the switch!','#ffdd00',4);
  if(isBossLevel())addNotif('⚠ WARNING: Boss level! Use workshop to upgrade first','#ff3300',4);
  else addNotif(`Level ${globalLevel}/20 — defeat all enemies`,'#e63946',3);
}
