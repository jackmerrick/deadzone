function findMission(id){for(const ch of CAMPAIGN)for(const m of ch.missions)if(m.id===id)return m;return null;}
function nextMission(id){const all=CAMPAIGN.flatMap(c=>c.missions);const i=all.findIndex(m=>m.id===id);return i>=0&&i<all.length-1?all[i+1]:null;}
function missionUnlocked(chMissions,i){return i===0||saveData.campaignDone.includes(chMissions[i-1].id);}

// Smallest signed angle between two headings
function angDiff(a,b){let d=(a-b)%(Math.PI*2);if(d>Math.PI)d-=Math.PI*2;if(d<-Math.PI)d+=Math.PI*2;return d;}
// Line-of-sight: sample the segment for walls
function losClear(x0,y0,x1,y1){const steps=Math.ceil(Math.hypot(x1-x0,y1-y0)/16);for(let i=1;i<steps;i++){const t=i/steps;if(isWall(x0+(x1-x0)*t,y0+(y1-y0)*t))return false;}return true;}
// Does a cone at (x,y) facing ang see the player?
function coneSees(x,y,ang,range,half,target){target=target||player;const dx=target.x-x,dy=target.y-y,d=Math.hypot(dx,dy);if(d>range)return false;if(Math.abs(angDiff(Math.atan2(dy,dx),ang))>half)return false;return losClear(x,y,target.x,target.y);}

// ── Map geometry helpers ────────────────────────────────────────────────────
function blankMap(){return Array.from({length:MAP_H},(_,y)=>Array.from({length:MAP_W},(_,x)=>(x===0||y===0||x===MAP_W-1||y===MAP_H-1)?1:0));}
function tcx(t){return t*TILE+TILE/2;}                    // tile index → world centre
function inRect(tx,ty,r,pad=0){return !!r&&tx>=r.x-pad&&tx<r.x+r.w+pad&&ty>=r.y-pad&&ty<r.y+r.h+pad;}
// Flood-fill: every floor tile reachable from a start tile (4-way)
function reachable(stx,sty){
  if(stx<1||sty<1||stx>=MAP_W-1||sty>=MAP_H-1||worldMap[sty][stx]===1)return[];
  const seen=Array.from({length:MAP_H},()=>Array(MAP_W).fill(false)),q=[[stx,sty]],out=[];
  seen[sty][stx]=true;
  while(q.length){const [x,y]=q.pop();out.push([x,y]);
    for(const[dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){const nx=x+dx,ny=y+dy;
      if(nx<1||ny<1||nx>=MAP_W-1||ny>=MAP_H-1||seen[ny][nx]||worldMap[ny][nx]===1)continue;
      seen[ny][nx]=true;q.push([nx,ny]);}}
  return out;
}

// ── Map layouts ─────────────────────────────────────────────────────────────
// Exterior: a walled compound with a solid target building (single door) + yard cover.
function layoutExterior(){
  worldMap=blankMap();
  const bw=randInt(9,11),bh=randInt(8,10),bx=randInt(4,MAP_W-bw-4),by=randInt(3,5);
  buildingRect={x:bx,y:by,w:bw,h:bh};coverTiles=new Set();
  for(let y=by;y<by+bh;y++)for(let x=bx;x<bx+bw;x++)worldMap[y][x]=1; // solid house facade
  const dgx=bx+Math.floor(bw/2);
  worldMap[by+bh-1][dgx]=0;                                          // carve a visible doorway
  doorIn={x:tcx(dgx),y:tcx(by+bh),tx:dgx,ty:by+bh,kind:'enter'};doorOut=null;
  // Player inserts (and extracts) from a corner of the compound
  const corners=[[3,3],[MAP_W-4,3],[3,MAP_H-4],[MAP_W-4,MAP_H-4]];
  const valid=corners.filter(([x,y])=>!inRect(x,y,buildingRect,2));
  const corner=valid.length?valid[randInt(0,valid.length-1)]:[Math.floor(MAP_W/2),MAP_H-3];
  const insTx=corner[0],insTy=corner[1];
  for(let i=0;i<18;i++){const x=randInt(2,MAP_W-3),y=randInt(2,MAP_H-3);
    if(inRect(x,y,buildingRect,1)||Math.abs(x-dgx)<2||(Math.abs(x-insTx)<3&&Math.abs(y-insTy)<3))continue;
    if(Math.random()<0.4){worldMap[y][x]=1;coverTiles.add(y*MAP_W+x);}}
  // Guarantee the door is reachable from the corner; else strip the yard cover.
  if(!reachable(insTx,insTy).some(([x,y])=>x===dgx&&y===by+bh)){
    worldMap=blankMap();coverTiles=new Set();for(let y=by;y<by+bh;y++)for(let x=bx;x<bx+bw;x++)worldMap[y][x]=1;worldMap[by+bh-1][dgx]=0;}
  extractionZone={x:tcx(insTx),y:tcx(insTy)};
  return {x:tcx(insTx),y:tcx(insTy)};
}
// Interior: a grid of rooms joined by doorways; objective in the farthest reachable room.
function layoutInterior(){
  worldMap=blankMap();coverTiles=new Set();
  const vl=[Math.floor(MAP_W/3),Math.floor(2*MAP_W/3)],hl=[Math.floor(MAP_H/3),Math.floor(2*MAP_H/3)];
  vl.forEach(cx=>{for(let y=1;y<MAP_H-1;y++)worldMap[y][cx]=1;});
  hl.forEach(cy=>{for(let x=1;x<MAP_W-1;x++)worldMap[cy][x]=1;});
  const cV=(cx,y)=>{worldMap[y][cx]=0;if(y+1<MAP_H-1)worldMap[y+1][cx]=0;};
  const cH=(cy,x)=>{worldMap[cy][x]=0;if(x+1<MAP_W-1)worldMap[cy][x+1]=0;};
  vl.forEach(cx=>{[randInt(2,hl[0]-1),randInt(hl[0]+1,hl[1]-1),randInt(hl[1]+1,MAP_H-3)].forEach(y=>cV(cx,y));});
  hl.forEach(cy=>{[randInt(2,vl[0]-1),randInt(vl[0]+1,vl[1]-1),randInt(vl[1]+1,MAP_W-3)].forEach(x=>cH(cy,x));});
  const exTx=Math.floor(MAP_W/2),exTy=MAP_H-2;worldMap[exTy][exTx]=0;worldMap[exTy-1][exTx]=0;
  doorOut={x:tcx(exTx),y:tcx(exTy),tx:exTx,ty:exTy,kind:'exit'};doorIn=null;
  const insTx=exTx,insTy=MAP_H-4;
  let reach=reachable(insTx,insTy);
  for(let i=0;i<8;i++){const c=reach[randInt(0,reach.length-1)];if(c[0]===insTx&&c[1]>=insTy-1)continue;if(Math.random()<0.5){worldMap[c[1]][c[0]]=1;coverTiles.add(c[1]*MAP_W+c[0]);}}
  reach=reachable(insTx,insTy);
  let far=[insTx,insTy],fd=-1;reach.forEach(([x,y])=>{const d=Math.hypot(x-insTx,y-insTy);if(d>fd){fd=d;far=[x,y];}});
  objectiveItem={x:tcx(far[0]),y:tcx(far[1])};
  if(mission.target==='hostage')hostage={x:objectiveItem.x,y:objectiveItem.y};
  if(mission.target==='heist'){
    // two objectives: intel at the far room, hostage in the room maximising distance from BOTH spawn and intel
    intelItem={x:objectiveItem.x,y:objectiveItem.y};
    let h=[insTx,insTy],hd=-1;reach.forEach(([x,y])=>{const d=Math.min(Math.hypot(x-insTx,y-insTy),Math.hypot(x-far[0],y-far[1]));if(d>hd){hd=d;h=[x,y];}});
    hostage={x:tcx(h[0]),y:tcx(h[1])};
  }
  return {x:tcx(insTx),y:tcx(insTy),reach};
}

// ── Entity placement (on reachable tiles only) ──────────────────────────────
function makePatrolReach(reach,tx,ty){
  const pts=[{x:tcx(tx),y:tcx(ty)}];let cx=tx,cy=ty;
  for(let k=0;k<3;k++){let nxt=null;
    for(let t=0;t<30;t++){const c=reach[randInt(0,reach.length-1)],dd=Math.hypot(c[0]-cx,c[1]-cy);
      if(dd>2&&dd<7&&losClear(tcx(cx),tcx(cy),tcx(c[0]),tcx(c[1]))){nxt=c;break;}}
    if(nxt){pts.push({x:tcx(nxt[0]),y:tcx(nxt[1])});cx=nxt[0];cy=nxt[1];}}
  return pts.length>1?pts:[{x:tcx(tx),y:tcx(ty)},{x:tcx(tx)+60,y:tcx(ty)}];
}
function placeGuards(count,patrols,reach,ax,ay,minD){
  const pool=reach.filter(([x,y])=>Math.hypot(tcx(x)-ax,tcx(y)-ay)>minD),src=pool.length>count?pool:reach,list=[];
  for(let i=0;i<count;i++){const c=src[randInt(0,src.length-1)],patrol=i<patrols;
    const g={x:tcx(c[0]),y:tcx(c[1]),angle:rand(0,Math.PI*2),base:rand(0,Math.PI*2),scanT:rand(0,Math.PI*2),
             alive:true,fireCd:rand(0,1),state:patrol?'patrol':'post',wps:[],wpIdx:0,pauseT:rand(0,1.2),stuckT:0};
    if(patrol)g.wps=makePatrolReach(reach,c[0],c[1]);
    list.push(g);}
  return list;
}
function placeCameras(count,reach,ax,ay){
  const pool=reach.filter(([x,y])=>Math.hypot(tcx(x)-ax,tcx(y)-ay)>180),src=pool.length>count?pool:reach,list=[];
  for(let i=0;i<count;i++){const c=src[randInt(0,src.length-1)];list.push({x:tcx(c[0]),y:tcx(c[1]),base:rand(0,Math.PI*2),angle:0,sweep:0.9,spd:0.45,destroyed:false});}
  return list;
}

// ── Scene building & exterior↔interior transitions ──────────────────────────
function buildExterior(m){
  mapCfg=MAPS[m.mapIdx];
  const ins=layoutExterior();generateDebris();
  const reach=reachable(Math.floor(ins.x/TILE),Math.floor(ins.y/TILE));
  guards=placeGuards(m.guards,m.patrols,reach,ins.x,ins.y,260);
  cameras=placeCameras(m.cameras,reach,ins.x,ins.y);
  return ins;
}
function buildInterior(m){
  mapCfg=INT_CFG;
  const r=layoutInterior();generateDebris();
  const ig=Math.max(3,Math.round(m.guards*0.7)),ip=Math.max(1,Math.round(m.patrols*0.6));
  guards=placeGuards(ig,ip,r.reach,r.x,r.y,200);
  cameras=placeCameras(Math.max(1,m.cameras-1),r.reach,r.x,r.y);
  // Assassination: mark the guard farthest from the entrance as the HVT (until killed)
  if(m.target==='assassinate'&&!hvtDead){
    let best=null,bd=-1;guards.forEach(g=>{const d=Math.hypot(g.x-r.x,g.y-r.y);if(d>bd){bd=d;best=g;}});
    if(best){best.isHVT=true;hvt=best;}
  }
  return r;
}
function snapshotScene(){return {worldMap,mapCfg,debris,guards,cameras,doorIn,doorOut,buildingRect,extractionZone,alarm,alarmCalmTimer,coverTiles};}
function applyScene(s){worldMap=s.worldMap;mapCfg=s.mapCfg;debris=s.debris;guards=s.guards;cameras=s.cameras;doorIn=s.doorIn;doorOut=s.doorOut;buildingRect=s.buildingRect;extractionZone=s.extractionZone;alarm=s.alarm;alarmCalmTimer=s.alarmCalmTimer;coverTiles=s.coverTiles;}
function enterInterior(){
  extSnapshot=snapshotScene();
  const wasAlarm=alarm;
  stealthScene='interior';noiseEscalateT=0;doorCd=0.6;enteredOnce=true;
  if(mission.target==='exterminate'&&intSnapshot){ // re-enter: keep the interior we already fought through
    applyScene(intSnapshot);player.x=doorOut.x;player.y=doorOut.y-TILE;
  } else {
    const r=buildInterior(mission);player.x=r.x;player.y=r.y;
  }
  alarm=wasAlarm;alarmCalmTimer=wasAlarm?ALARM_CALM_TIME:0;bullets=[];
  const goal=mission.target==='heist'?'the intel & the hostage':mission.target==='assassinate'?'the HVT':mission.target==='sabotage'?'the reactor':mission.target==='exterminate'?'and clear the guards':mission.target==='vault'?'the vault':mission.target==='hostage'?'the hostage':'the intel';
  addNotif('Inside the building — find '+goal,'#ffd24a',4);
}
function exitToExterior(){
  const wasAlarm=alarm;
  if(mission.target==='exterminate')intSnapshot=snapshotScene(); // preserve interior kills for re-entry
  applyScene(extSnapshot);stealthScene='exterior';noiseEscalateT=0;doorCd=0.6;
  player.x=doorIn.x;player.y=doorIn.y+TILE;bullets=[];
  if(wasAlarm){alarm=true;alarmCalmTimer=ALARM_CALM_TIME;} // a tripped alarm follows you outside
  const carryH=(mission.target==='hostage'&&hasObjective)||(mission.target==='heist'&&hasHostage);
  if(carryH&&hostage){hostage.x=player.x;hostage.y=player.y+30;}
  addNotif(hasObjective?'Back outside — reach the extraction point':'Back in the yard','#2ecc71',4);
}

function triggerAlarm(){
  if(mission&&mission.noAlarm&&!alarm){alarm=true;missionFailed('Spotted — no witnesses allowed');return;} // ghost run: detection = instant fail
  alarmCalmTimer=ALARM_CALM_TIME;if(!alarm){alarm=true;noiseEscalateT=0;guards.forEach(g=>g.investigate=false);addNotif('⚠ DETECTED — the base is on alert!','#ff4444',3);addShake(8,0.3);}}
// Objective bookkeeping for the new mission types
function allGuardsDead(){
  if(mission.target!=='exterminate'||!enteredOnce)return false;
  const ext=stealthScene==='exterior'?guards:(extSnapshot?extSnapshot.guards:[]);
  const intr=stealthScene==='interior'?guards:(intSnapshot?intSnapshot.guards:[]);
  return ext.every(g=>!g.alive)&&intr.every(g=>!g.alive);
}
function guardsLeft(){
  const ext=stealthScene==='exterior'?guards:(extSnapshot?extSnapshot.guards:[]);
  const intr=stealthScene==='interior'?guards:(intSnapshot?intSnapshot.guards:[]);
  return ext.filter(g=>g.alive).length+intr.filter(g=>g.alive).length;
}
function objectiveCollected(){
  switch(mission.target){
    case 'heist': return hasIntel&&hasHostage;
    case 'assassinate': return hvtDead;
    case 'exterminate': return allGuardsDead();
    default: return hasObjective; // plans/hostage/vault/sabotage use hasObjective directly
  }
}
// Side-effects the instant a grabbed objective is taken (vault breach / charge plant)
function onObjectiveTaken(){
  if(mission.forceAlarm)triggerAlarm();
  if(mission.target==='sabotage'){charges=true;missionTimer=mission.escapeTime||45;addNotif('💣 Charges planted — RUN! Escape before the timer hits 0','#ff5533',5);}
  else if(mission.target==='vault'){addNotif('🔓 Vault breached — ALARM! Get out hot','#ff5533',5);}
}
// A loud (missed) shot: the nearest guard investigates; if unresolved, the base fully alerts after 5s.
function raiseNoise(x,y){
  if(alarm)return;
  let best=null,bd=1e9;
  for(const g of guards){if(!g.alive)continue;const d=Math.hypot(g.x-x,g.y-y);if(d<bd){bd=d;best=g;}}
  if(best){best.investigate=true;best.invX=x;best.invY=y;}
  if(noiseEscalateT<=0){noiseEscalateT=5;addNotif('🔊 Gunshot heard — a guard is investigating! Base alerts in 5s','#ffaa33',3);}
}

// Wall-aware movement: try the full step, then slide along whichever axis is clear.
function moveToward(g,tx,ty,spd,dt){const dx=tx-g.x,dy=ty-g.y,d=Math.hypot(dx,dy)||1,mx=dx/d,my=dy/d,s=spd*dt;
  if(!isWall(g.x+mx*s,g.y+my*s)){g.x+=mx*s;g.y+=my*s;return true;}
  if(!isWall(g.x+mx*s,g.y)){g.x+=mx*s;return true;}
  if(!isWall(g.x,g.y+my*s)){g.y+=my*s;return true;}
  return false;}
// Patrol: walk to waypoint, pause & scan on arrival, skip the waypoint if wedged.
function patrolGuard(g,dt){
  if(g.pauseT>0){g.pauseT-=dt;g.angle=g.base+Math.sin(performance.now()/700+g.scanT)*0.9;return;}
  const wp=g.wps[g.wpIdx];
  if(Math.hypot(wp.x-g.x,wp.y-g.y)<16){g.wpIdx=(g.wpIdx+1)%g.wps.length;g.pauseT=rand(0.5,1.6);g.base=g.angle;return;}
  g.angle=Math.atan2(wp.y-g.y,wp.x-g.x);
  if(!moveToward(g,wp.x,wp.y,62,dt)){g.stuckT+=dt;if(g.stuckT>0.7){g.wpIdx=(g.wpIdx+1)%g.wps.length;g.stuckT=0;}}else g.stuckT=0;
}

function updateStealth(dt){
  const t=performance.now()/1000;
  if(doorCd>0)doorCd-=dt;
  seenNow=false;
  // Cameras sweep their cones (destroyed ones are blind)
  cameras.forEach(c=>{if(c.destroyed)return;c.angle=c.base+Math.sin(t*c.spd*(alarm?2:1))*c.sweep;if(coneSees(c.x,c.y,c.angle,CAM_RANGE,CAM_HALF)){seenNow=true;triggerAlarm();}});
  // Guards
  guards.forEach(g=>{
    if(!g.alive)return;
    if(alarm){
      // Combat: hunt and fire (reuses the gunner bullet pattern)
      moveToward(g,player.x,player.y,98,dt);
      g.angle=Math.atan2(player.y-g.y,player.x-g.x);
      const d=dist(g,player);g.fireCd-=dt;
      if(d<560&&d>40&&g.fireCd<=0&&losClear(g.x,g.y,player.x,player.y)){
        const a=g.angle+rand(-0.06,0.06);
        bullets.push({x:g.x,y:g.y,vx:Math.cos(a)*430,vy:Math.sin(a)*430,dmg:11,life:1.7,color:'#ffdd66',fromPlayer:false,br:4});
        spawnMuzzle(g.x+Math.cos(a)*16,g.y+Math.sin(a)*16,a);g.fireCd=rand(0.7,1.3);
      }
      if(d<player.radius+18&&player.invincible<=0){takeDamage(8);player.invincible=0.5;addShake(6,0.2);}
      if(coneSees(g.x,g.y,g.angle,VIEW_RANGE+80,1.1))seenNow=true;
    } else {
      if(g.investigate){
        const dn=Math.hypot(g.invX-g.x,g.invY-g.y);
        if(dn>28){g.angle=Math.atan2(g.invY-g.y,g.invX-g.x);moveToward(g,g.invX,g.invY,82,dt);}
        else g.angle+=dt*2.2;                            // reached the noise — scan around
      } else if(g.state==='patrol')patrolGuard(g,dt);
      else g.angle=g.base+Math.sin(t*0.7+g.scanT)*1.2;   // post: slow scan
      if(coneSees(g.x,g.y,g.angle,VIEW_RANGE,VIEW_HALF)){seenNow=true;triggerAlarm();}
    }
  });
  // Loud-shot escalation: one guard investigates, then the whole base goes loud after 5s
  if(!alarm&&noiseEscalateT>0){noiseEscalateT-=dt;if(noiseEscalateT<=0)triggerAlarm();}
  // Alarm de-escalation: calm down after staying out of sight
  if(seenNow)alarmCalmTimer=ALARM_CALM_TIME;
  else if(alarm){alarmCalmTimer-=dt;if(alarmCalmTimer<=0){alarm=false;noiseEscalateT=0;guards.forEach(g=>{g.fireCd=rand(0,1);g.stuckT=0;g.investigate=false;});addNotif('Alarm cleared — you slipped away','#7bc67e',3);}}
  // Takedown eligibility: close behind a living guard
  takedownTarget=null;
  for(const g of guards){if(!g.alive)continue;if(dist(g,player)<46){const gp=Math.atan2(player.y-g.y,player.x-g.x);if(Math.abs(angDiff(g.angle,gp))>1.7){takedownTarget=g;break;}}}
  // Player bullets: one-shot guards, and destroy cameras (silenced = quiet, handled in shoot())
  for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];if(!b.fromPlayer)continue;let hit=false;
    for(const g of guards){if(!g.alive)continue;if(Math.hypot(b.x-g.x,b.y-g.y)<15+(b.br||4)){g.alive=false;spawnBlood(g.x,g.y,16);hit=true;break;}}
    if(!hit)for(const c of cameras){if(c.destroyed)continue;if(Math.hypot(b.x-c.x,b.y-c.y)<16+(b.br||4)){c.destroyed=true;spawnExplosion(c.x,c.y,10);addShake(3,0.1);addNotif('📷 Camera destroyed','#9aa0a6',1.5);hit=true;break;}}
    if(hit)bullets.splice(i,1);}
  // Building entry / exit
  if(doorCd<=0){
    if(stealthScene==='exterior'&&doorIn&&dist(player,doorIn)<34){enterInterior();return;}
    if(stealthScene==='interior'&&doorOut&&dist(player,doorOut)<34){exitToExterior();return;}
  }
  // ── Objective handling (per mission type) ───────────────────────────────────
  if(stealthScene==='interior'){
    if(mission.target==='heist'){
      if(!hasIntel&&intelItem&&dist(player,intelItem)<34){hasIntel=true;addNotif('📁 Intel secured — now grab the hostage','#ffd700',4);}
      if(!hasHostage&&hostage&&dist(player,hostage)<34){hasHostage=true;addNotif('🧍 Hostage freed — escort them out!','#ffd700',4);}
    } else if(!hasObjective&&objectiveItem&&mission.target!=='assassinate'&&mission.target!=='exterminate'&&dist(player,objectiveItem)<34){
      hasObjective=true;
      addNotif(mission.target==='hostage'?'🧍 Hostage freed — escort them out!':mission.target==='vault'?'💰 Vault grabbed!':mission.target==='sabotage'?'💣 Charges placed!':'📁 Intel secured — get out!','#ffd700',4);
      onObjectiveTaken();
    }
  }
  // Assassinate / heist / exterminate flip the canonical "ready to extract" flag when their condition is met
  if(mission.target==='assassinate'&&hvt&&!hvt.alive&&!hvtDead)hvtDead=true;
  if(!hasObjective&&objectiveCollected()){hasObjective=true;addNotif(mission.target==='assassinate'?'🎯 Target eliminated — extract now!':mission.target==='exterminate'?'☠ Compound cleared — extract now!':'✓ Objectives complete — extract!','#ffd700',4);}
  // Sabotage escape countdown
  if(missionTimer>0){missionTimer-=dt;if(missionTimer<=0){missionTimer=0;missionFailed('Out of time — the charges blew with you inside');return;}}
  // Hostage / heist escort follows once freed
  const escort=(mission.target==='hostage'&&hasObjective)||(mission.target==='heist'&&hasHostage);
  if(escort&&hostage){const dx=player.x-hostage.x,dy=player.y-hostage.y,d=Math.hypot(dx,dy);if(d>58){const mx=dx/d,my=dy/d,s=175*dt;if(!isWall(hostage.x+mx*s,hostage.y))hostage.x+=mx*s;if(!isWall(hostage.x,hostage.y+my*s))hostage.y+=my*s;}}
  // Extraction outside, with the objective = mission complete
  if(hasObjective&&stealthScene==='exterior'&&extractionZone&&dist(player,extractionZone)<44)missionComplete();
}

function missionComplete(){
  if(mission&&!saveData.campaignDone.includes(mission.id)){saveData.campaignDone.push(mission.id);writeSave();}
  bumpChallenge('stealth',1);
  addXp(300); // flat mission-clear bonus on top of commitRun's base XP
  commitRun(false);
  state=STATE.WIN; // drawn as mission-complete because gameMode==='campaign'
}

function startMission(id){
  const m=findMission(id);if(!m)return;
  syncChallengePeriods();
  mission=m;gameMode='campaign';
  globalLevel=1;score=0;currency=0;sessionCoins=0;sessionKills=0;
  waveActive=false;levelComplete=false;levelStartTimer=0;levelTimer=0;
  bullets=[];particles=[];pickups=[];enemies=[];grenadeObjects=[];firePatches=[];notifs=[];deployables=[];airBombs=[];airstrikePending=false;flashUntil=0;builtWalls=[];buildMode=false;
  buyStationOpen=false;inventoryOpen=false;bigMapOpen=false;workshopOpen=false;
  resetUpgrades();
  // Reset stealth state
  hasObjective=false;alarm=false;alarmCalmTimer=0;seenNow=false;takedownTarget=null;hostage=null;objectiveItem=null;extSnapshot=null;stealthScene='exterior';doorCd=0;noiseEscalateT=0;
  // Reset Chapter-2 objective/fail state
  hvt=null;hvtDead=false;hasIntel=false;hasHostage=false;intelItem=null;charges=false;missionTimer=0;intSnapshot=null;enteredOnce=false;failReason='';
  // Base has power: full vision, no flashlight battery / no zombie map objects.
  lightsOn=true;lightsSwitch=null;buyStationPos=null;workshopPos=null;perkMachines=[];barricades=[];
  // Build the compound FIRST so the map exists before the player safe-spawns on it.
  const ins=buildExterior(m);
  initPlayer();
  // Stealth loadout: knife + silenced pistol; rifle added unless the mission is silent-only.
  player.weapons=['knife','pistol'];player.weapon='pistol';
  if(m.loadout!=='silent'){player.weapons.push('rifle');player.ammo.rifle=(m.loadout==='heavy')?260:120;}
  player.x=ins.x;player.y=ins.y;
  // Show the mission briefing (tactical preview + countdown) before play begins.
  briefT=0;briefPhase='video';countdownT=5;briefRegion=null;
  state=STATE.BRIEFING;
}
function beginMissionPlay(){
  state=STATE.PLAYING;gameStartTime=performance.now()/1000;
  addNotif('MISSION: '+mission.name,'#7fd4ff',3);
  addNotif(mission.intro,'#cfe6ff',5);
  const tip=mission.target==='exterminate'?'Go loud — rifle stocked · clear every guard inside & out':
            mission.loadout==='silent'?'SILENT: knife & silenced pistol only · [Enter] behind a guard = takedown':
            'Pistol silenced · [Enter] behind a guard = takedown · rifle = loud panic';
  addNotif(tip,'#9aa0a6',6);
}

// ── Stealth drawing ─────────────────────────────────────────────────────────
function drawCone(sx,sy,ang,range,half,color,alpha){ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(sx,sy);ctx.arc(sx,sy,range,ang-half,ang+half);ctx.closePath();ctx.fill();ctx.restore();}

function drawStealth(camX,camY){
  const t=performance.now()/1000;
  // Target building tint + label (exterior only)
  if(stealthScene==='exterior'&&buildingRect){const sx=buildingRect.x*TILE-camX,sy=buildingRect.y*TILE-camY,bw=buildingRect.w*TILE,bh=buildingRect.h*TILE;
    ctx.fillStyle='rgba(60,70,90,0.22)';ctx.fillRect(sx,sy,bw,bh);
    ctx.strokeStyle='rgba(130,150,180,0.45)';ctx.lineWidth=2;ctx.strokeRect(sx,sy,bw,bh);
    ctx.fillStyle='rgba(170,190,210,0.85)';ctx.font='bold 12px Courier New';ctx.textAlign='center';ctx.fillText('TARGET BUILDING',sx+bw/2,sy+bh/2);}
  // Doors
  const drawDoor=(d,label,color)=>{const sx=d.x-camX,sy=d.y-camY,p=Math.sin(t*4)*0.3+0.7;
    ctx.fillStyle=color+'2e';ctx.fillRect(sx-22,sy-22,44,44);ctx.globalAlpha=p;ctx.strokeStyle=color;ctx.lineWidth=2;ctx.strokeRect(sx-22,sy-22,44,44);ctx.globalAlpha=1;
    ctx.fillStyle=color;ctx.font='bold 10px Courier New';ctx.textAlign='center';ctx.fillText(label,sx,sy-28);};
  if(stealthScene==='exterior'&&doorIn)drawDoor(doorIn,'▲ ENTER','#7fd4ff');
  if(stealthScene==='interior'&&doorOut)drawDoor(doorOut,hasObjective?'▼ EXIT':'▼ OUT','#2ecc71');
  // Extraction marker (exterior only)
  if(stealthScene==='exterior'&&extractionZone){const sx=extractionZone.x-camX,sy=extractionZone.y-camY,p=Math.sin(t*3)*0.3+0.7;
    ctx.strokeStyle=hasObjective?`rgba(46,204,113,${p})`:'rgba(46,204,113,0.3)';ctx.lineWidth=3;ctx.strokeRect(sx-26,sy-26,52,52);
    ctx.beginPath();ctx.moveTo(sx,sy-10);ctx.lineTo(sx,sy+10);ctx.moveTo(sx-10,sy);ctx.lineTo(sx+10,sy);ctx.stroke();
    ctx.fillStyle=hasObjective?'#2ecc71':'#1f6e3a';ctx.font='bold 11px Courier New';ctx.textAlign='center';ctx.fillText('EXTRACT',sx,sy-34);}

  if(stealthScene==='interior'){

  }
  // Hostage escort token (hostage + heist, once freed)
  if(((mission.target==='hostage'&&hasObjective)||(mission.target==='heist'&&hasHostage))&&hostage){const sx=hostage.x-camX,sy=hostage.y-camY;ctx.fillStyle='rgba(0,0,0,0.35)';ctx.beginPath();ctx.ellipse(sx+2,sy+4,9,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffcc88';ctx.beginPath();ctx.arc(sx,sy,11,0,Math.PI*2);ctx.fill();}
  // Cameras (destroyable)
  cameras.forEach(c=>{const sx=c.x-camX,sy=c.y-camY;
    if(!c.destroyed)drawCone(sx,sy,c.angle,CAM_RANGE,CAM_HALF,alarm?'#ff4444':'#3fa9ff',0.10);

    ctx.restore();
    if(g.isHVT){const pr=18+Math.sin(t*5)*3;ctx.save();ctx.globalAlpha=0.85;ctx.strokeStyle='#ff4444';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx,sy,pr,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;ctx.fillStyle='#ff4444';ctx.font='bold 10px Courier New';ctx.textAlign='center';ctx.fillText('◆ HVT',sx,sy-26);ctx.restore();}
    if(takedownTarget===g){ctx.fillStyle='#fff';ctx.font='bold 11px Courier New';ctx.textAlign='center';ctx.fillText('[Enter] Takedown',sx,sy-20);}});
}

}

      ctx.fillStyle='#5a3f22';ctx.fillRect(cx-21,cy-14,42,26);ctx.fillStyle='#6e4f2c';ctx.fillRect(cx-18,cy-11,36,20);

function drawStealthWorld(camX,camY){
  const ext=stealthScene==='exterior',B=buildingRect;
  const sx0=Math.max(0,Math.floor(camX/TILE)),sy0=Math.max(0,Math.floor(camY/TILE));
  const sx1=Math.min(MAP_W,sx0+Math.ceil(W/TILE)+2),sy1=Math.min(MAP_H,sy0+Math.ceil(H/TILE)+2);
  for(let ty=sy0;ty<sy1;ty++)for(let tx=sx0;tx<sx1;tx++){
    const sx=tx*TILE-camX,sy=ty*TILE-camY,wall=worldMap[ty][tx]===1;
    const border=(tx===0||ty===0||tx===MAP_W-1||ty===MAP_H-1);
    if(!wall){
      if(ext){ // grass yard
        ctx.fillStyle=(tx+ty)%2===0?'#243a1c':'#21351a';ctx.fillRect(sx,sy,TILE,TILE);
        const h=(tx*53+ty*97);ctx.fillStyle='rgba(120,160,80,0.10)';
        ctx.fillRect(sx+(h%48)+4,sy+((h*7)%48)+4,3,3);ctx.fillRect(sx+((h*3)%44)+8,sy+((h*11)%44)+8,2,2);
      } else { // interior wood floor
        ctx.fillStyle=ty%2===0?'#3a2c1c':'#34281a';ctx.fillRect(sx,sy,TILE,TILE);
        ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fillRect(sx,sy,TILE,2);
        ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx,sy+TILE);ctx.lineTo(sx+TILE,sy+TILE);ctx.stroke();
      }
      // doorway threshold inside the house footprint
      if(ext&&B&&inRect(tx,ty,B)){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(sx+6,sy,TILE-12,TILE);}
      continue;
    }
    if(border){ // perimeter fence (ext) / outer wall (int)
      if(ext){ctx.fillStyle='#2a2418';ctx.fillRect(sx,sy,TILE,TILE);ctx.strokeStyle='#564a33';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(sx,sy+14);ctx.lineTo(sx+TILE,sy+14);ctx.moveTo(sx,sy+TILE-14);ctx.lineTo(sx+TILE,sy+TILE-14);ctx.stroke();for(let i=8;i<TILE;i+=16){ctx.fillStyle='#4a4030';ctx.fillRect(sx+i-2,sy+4,4,TILE-8);}}
      else{ctx.fillStyle=(tx+ty)%2===0?'#2c2e36':'#26282f';ctx.fillRect(sx,sy,TILE,TILE);ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(sx,sy,TILE,4);ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(sx,sy+TILE-6,TILE,6);}
      continue;
    }
    if(ext&&B&&inRect(tx,ty,B)){ // house roof
      ctx.fillStyle=(tx+ty)%2===0?'#4a2f24':'#43291f';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=1;for(let r=12;r<TILE;r+=14){ctx.beginPath();ctx.moveTo(sx,sy+r);ctx.lineTo(sx+TILE,sy+r);ctx.stroke();}
      ctx.fillStyle='rgba(15,9,6,0.92)';
      if(tx===B.x)ctx.fillRect(sx,sy,4,TILE);
      if(tx===B.x+B.w-1)ctx.fillRect(sx+TILE-4,sy,4,TILE);
      if(ty===B.y)ctx.fillRect(sx,sy,TILE,4);
      if(ty===B.y+B.h-1)ctx.fillRect(sx,sy+TILE-4,TILE,4);
      continue;
    }

      ctx.fillStyle=ext?'#243a1c':'#34281a';ctx.fillRect(sx,sy,TILE,TILE);

    }

    if(ext){ctx.fillStyle=(tx+ty)%2===0?'#3a3a42':'#34343c';ctx.fillRect(sx,sy,TILE,TILE);ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(sx,sy,TILE,3);ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(sx,sy+TILE-5,TILE,5);}

  }
}

let briefT=0,briefPhase='video',countdownT=5,briefRegion=null;
const BRIEF_VIDEO_DUR=5.0;
function drawBriefing(dt){
  briefT+=dt;
  ctx.fillStyle='#05080a';ctx.fillRect(0,0,W,H);
  for(let i=0;i<40;i++){const x=((i*131.3+briefT*14)%W),y=((i*97.1+briefT*7)%H);ctx.fillStyle='rgba(127,212,255,0.05)';ctx.beginPath();ctx.arc(x,y,1.3,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#7fd4ff';ctx.shadowColor='#7fd4ff';ctx.shadowBlur=14;ctx.font='bold 26px Courier New';ctx.textAlign='center';ctx.fillText('MISSION BRIEFING — '+mission.name.toUpperCase(),W/2,58);ctx.shadowBlur=0;
  ctx.fillStyle='#9bb4c4';ctx.font='13px Courier New';ctx.fillText(mission.intro,W/2,84);
  // Tactical map panel (fit the 32×32 grid)
  const pw=Math.min(W*0.6,640),sc=pw/MAP_W,ph=sc*MAP_H,px=W/2-pw/2,py=104;
  ctx.fillStyle='#0a120a';ctx.fillRect(px,py,pw,ph);ctx.strokeStyle='#2a4a2a';ctx.lineWidth=2;ctx.strokeRect(px,py,pw,ph);
  const w2p=(wx,wy)=>[px+(wx/(MAP_W*TILE))*pw,py+(wy/(MAP_H*TILE))*ph];
  for(let ty=0;ty<MAP_H;ty++)for(let tx=0;tx<MAP_W;tx++){if(worldMap[ty][tx]===1){const inB=inRect(tx,ty,buildingRect);ctx.fillStyle=inB?'#5a3a2a':'#26301f';ctx.fillRect(px+tx*sc,py+ty*sc,sc+0.6,sc+0.6);}}
  if(buildingRect){const[bx,by]=w2p(buildingRect.x*TILE,buildingRect.y*TILE);ctx.fillStyle='rgba(255,210,160,0.9)';ctx.font='bold 10px Courier New';ctx.fillText('HOUSE',bx+buildingRect.w*sc/2,by+buildingRect.h*sc/2+3);}
  cameras.forEach(c=>{const[X,Y]=w2p(c.x,c.y);ctx.fillStyle='rgba(63,169,255,0.18)';ctx.beginPath();ctx.moveTo(X,Y);ctx.arc(X,Y,18,c.angle-CAM_HALF,c.angle+CAM_HALF);ctx.closePath();ctx.fill();ctx.fillStyle='#3fa9ff';ctx.fillRect(X-3,Y-3,6,6);});
  guards.forEach(g=>{const[X,Y]=w2p(g.x,g.y);ctx.fillStyle='rgba(255,80,80,0.16)';ctx.beginPath();ctx.moveTo(X,Y);ctx.arc(X,Y,20,g.angle-VIEW_HALF,g.angle+VIEW_HALF);ctx.closePath();ctx.fill();ctx.fillStyle='#ff5555';ctx.beginPath();ctx.arc(X,Y,3.5,0,Math.PI*2);ctx.fill();});
  // Route: corner (spawn/extract) → house door → back
  const[ax,ay]=w2p(extractionZone.x,extractionZone.y),[dxp,dyp]=w2p(doorIn.x,doorIn.y);
  ctx.strokeStyle='rgba(255,215,0,0.55)';ctx.lineWidth=2;ctx.setLineDash([6,5]);ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(dxp,dyp);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ax,ay,6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.font='bold 8px Courier New';ctx.fillText('S/E',ax,ay+3);
  ctx.fillStyle='#7fd4ff';ctx.beginPath();ctx.arc(dxp,dyp,6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.fillText('D',dxp,dyp+3);
  // Animated agent tracing the plan
  const seg=BRIEF_VIDEO_DUR,p=(briefT%seg)/seg;let pos,cap;
  if(p<0.4){const t=p/0.4;pos=[ax+(dxp-ax)*t,ay+(dyp-ay)*t];cap='1. INFILTRATE — reach the house';}
  else if(p<0.6){pos=[dxp,dyp];cap='2. STEAL THE '+(mission.target==='hostage'?'HOSTAGE':'INTEL');}
  else{const t=(p-0.6)/0.4;pos=[dxp+(ax-dxp)*t,dyp+(ay-dyp)*t];cap='3. EXTRACT — return to the corner';}
  ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(pos[0],pos[1],5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#ffd700';ctx.font='bold 15px Courier New';ctx.textAlign='center';ctx.fillText(cap,W/2,py+ph+30);
  // Legend
  ctx.font='11px Courier New';
  ctx.fillStyle='#ff7777';ctx.fillText('● guards',W/2-200,py+ph+52);ctx.fillStyle='#3fa9ff';ctx.fillText('■ cameras',W/2-80,py+ph+52);ctx.fillStyle='#fff';ctx.fillText('● you (S/E)',W/2+40,py+ph+52);ctx.fillStyle='#ffd700';ctx.fillText('↦ route',W/2+170,py+ph+52);
  // Phase: looping video, then a deploy countdown

// Clickable regions are rebuilt every menu frame; the click handler walks them.
let menuRegions=[];
function mReg(x,y,w,h,action){menuRegions.push({x,y,w,h,action});}
function mHov(x,y,w,h){return mouse.x>x&&mouse.x<x+w&&mouse.y>y&&mouse.y<y+h;}

// ── Modern menu styling helpers ──────────────────────────────────────────────
const FONT="'JetBrains Mono','Courier New',monospace";
function mFont(px,weight){return (weight?weight+' ':'')+px+'px '+FONT;}
const C={
  BG0:'#0a0a0c', BG1:'#040405', PANEL:'#121214', PANEL_HI:'#1b1b1f',
  BORDER:'#2a2a30', BORDER_HI:'#454550',
  ACCENT:'#e63946', ACCENT_SOFT:'#ff8585', ACCENT_DEEP:'#7a1010',
  TEXT:'#f0f0f2', TEXT_DIM:'#9a9aa2', TEXT_FAINT:'#5a5a62',
  GOLD:'#ffd24a', GREEN:'#2ecc71', BLUE:'#3fa9ff', BLUE_SOFT:'#7fd4ff'
};
function rr(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);return;}
  r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}
function fillRR(x,y,w,h,r,fill){rr(x,y,w,h,r);ctx.fillStyle=fill;ctx.fill();}
function strokeRR(x,y,w,h,r,stroke,lw){rr(x,y,w,h,r);ctx.strokeStyle=stroke;ctx.lineWidth=lw||1;ctx.stroke();}
// rounded panel with vertical gradient + hairline border (+optional soft shadow / clip)
function panel(x,y,w,h,opts){
  opts=opts||{};const r=opts.r!=null?opts.r:8;
  const g=ctx.createLinearGradient(0,y,0,y+h);g.addColorStop(0,opts.top||C.PANEL_HI);g.addColorStop(1,opts.bottom||C.PANEL);
  if(opts.shadow){ctx.save();ctx.shadowColor=opts.shadowColor||'rgba(0,0,0,0.6)';ctx.shadowBlur=opts.shadow;ctx.shadowOffsetY=opts.shadowY!=null?opts.shadowY:3;fillRR(x,y,w,h,r,g);ctx.restore();}
  else fillRR(x,y,w,h,r,g);
  strokeRR(x,y,w,h,r,opts.border||C.BORDER,opts.lw||1);
  if(opts.clip){rr(x,y,w,h,r);ctx.save();ctx.clip();return ()=>ctx.restore();}
}
// eased hover state, keyed by a stable id (mirrors challengeFlash aging)
let menuHover={}, menuDt=0.016;
function hoverAmt(id,isHov){
  const cur=menuHover[id]||0,next=cur+((isHov?1:0)-cur)*Math.min(1,menuDt*12);
  if(next<=0.002&&!isHov){delete menuHover[id];return 0;}
  menuHover[id]=next;return next;
}
function _hx(c){c=c.replace('#','');if(c.length===3)c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];return[parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)];}
function mix(a,b,t){const A=_hx(a),B=_hx(b);return`rgb(${Math.round(A[0]+(B[0]-A[0])*t)},${Math.round(A[1]+(B[1]-A[1])*t)},${Math.round(A[2]+(B[2]-A[2])*t)})`;}
// labelled button with eased hover glow; auto-registers a click region when opts.action given
function mButton(x,y,w,h,label,opts){
  opts=opts||{};const id=opts.id||('btn_'+x+'_'+y),isHov=mHov(x,y,w,h),t=hoverAmt(id,isHov),r=opts.r!=null?opts.r:8;
  if(opts.active){
    const af=opts.activeFill||C.ACCENT;
    if(opts.glow){ctx.save();ctx.shadowColor=opts.glow;ctx.shadowBlur=16;fillRR(x,y,w,h,r,af);ctx.restore();}
    else fillRR(x,y,w,h,r,af);
    strokeRR(x,y,w,h,r,opts.activeBorder||C.ACCENT_SOFT,2);
  } else {
    const g=ctx.createLinearGradient(0,y,0,y+h);g.addColorStop(0,mix(C.PANEL_HI,C.BORDER,t*0.6));g.addColorStop(1,C.PANEL);fillRR(x,y,w,h,r,g);
    strokeRR(x,y,w,h,r,mix(C.BORDER,opts.glow||C.BORDER_HI,t),1+t);
  }
  ctx.fillStyle=opts.active?(opts.activeFg||'#fff'):mix(opts.fg||C.TEXT_DIM,C.TEXT,t);
  ctx.font=mFont(opts.fs||13,opts.weight||'bold');ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,x+w/2,y+h/2+1);ctx.textBaseline='alphabetic';
  if(opts.action)mReg(x,y,w,h,opts.action);
}

// Shared cosmetic grid used by Locker (equip) and Store (buy)
function drawCosmeticGrid(title,kind,items,owned,equippedId,topY,mode){
  ctx.fillStyle=C.TEXT_DIM;ctx.font=mFont(13,'bold');ctx.textAlign='left';ctx.fillText(title,W/2-330,topY);
  const cols=3,cw=200,ch=92,g=14,gridW=cols*cw+(cols-1)*g,gx=W/2-gridW/2;
  items.forEach((it,i)=>{
    const col=i%cols,row=Math.floor(i/cols),x=gx+col*(cw+g),y=topY+14+row*(ch+g);
    const isOwned=owned.includes(it.id),isEq=equippedId===it.id;
    const canBuy=mode==='store'&&!isOwned&&saveData.coins>=it.cost;
    const t=hoverAmt('cos_'+kind+it.id,mHov(x,y,cw,ch));
    panel(x,y,cw,ch,{r:8,top:isEq?'#16301d':mix(C.PANEL_HI,'#202028',t),bottom:isEq?'#0e2415':C.PANEL,border:isEq?C.GREEN:(isOwned?mix(C.BORDER,C.BORDER_HI,t):(canBuy?C.GOLD:C.BORDER)),lw:isEq?2:1});
    // Mini preview
    if(kind==='hat')drawCharacterPreview(x+34,y+ch/2,16,getOutfit(),it);
    else drawCharacterPreview(x+34,y+ch/2,16,it,getHat());
    // Name + status
    ctx.textAlign='left';ctx.fillStyle=C.TEXT;ctx.font=mFont(12,'bold');ctx.fillText(it.name,x+62,y+26);
    if(isEq){ctx.fillStyle=C.GREEN;ctx.font=mFont(11,'bold');ctx.fillText('✓ EQUIPPED',x+62,y+48);}
    else if(isOwned){ctx.fillStyle=C.TEXT_DIM;ctx.font=mFont(11);ctx.fillText(mode==='locker'?'CLICK TO EQUIP':'OWNED',x+62,y+48);}
    else {ctx.fillStyle=canBuy?C.GOLD:'#a06600';ctx.font=mFont(12,'bold');ctx.fillText(`🪙 ${it.cost}`,x+62,y+48);
      ctx.fillStyle=C.TEXT_FAINT;ctx.font=mFont(9);ctx.fillText(canBuy?'CLICK TO BUY':'need more coins',x+62,y+66);}
    // Region action
    mReg(x,y,cw,ch,()=>{
      if(mode==='locker'){
        if(!isOwned){menuTab='store';return;}
        if(kind==='hat')saveData.equippedHat=it.id;else saveData.equippedOutfit=it.id;writeSave();
      } else { // store
        if(isOwned||saveData.coins<it.cost)return;
        saveData.coins-=it.cost;
        if(kind==='hat'){saveData.ownedHats.push(it.id);saveData.equippedHat=it.id;}
        else{saveData.ownedOutfits.push(it.id);saveData.equippedOutfit=it.id;}
        writeSave();
      }
    });
  });
  return topY+14+Math.ceil(items.length/cols)*(ch+g);
}

  ctx.textAlign='left';ctx.fillStyle=color;ctx.font=mFont(18,'bold');ctx.fillText(title,x,y);y+=24;
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(x,y-4,w,26);
  ctx.font=mFont(13,'bold');ctx.fillStyle='#9aa0a6';
  ctx.textAlign='left';ctx.fillText('NAME',x+12,y+15);
  ctx.textAlign='right';ctx.fillText('K',x+w*0.52,y+15);ctx.fillText('D',x+w*0.64,y+15);ctx.fillText('PTS',x+w*0.82,y+15);ctx.fillText('K/D',x+w-12,y+15);
  y+=30;
  members=members.slice().sort((a,b)=>(b.points||0)-(a.points||0));
  members.forEach((m,i)=>{
    const me=(m===mpMe),kd=((m.kills||0)/Math.max(1,m.deaths||0)).toFixed(2);
    ctx.fillStyle=me?'rgba(63,169,255,0.18)':(i%2?'rgba(255,255,255,0.04)':'rgba(0,0,0,0)');ctx.fillRect(x,y-4,w,rh-4);
    ctx.font=mFont(16);ctx.textAlign='left';ctx.fillStyle=me?'#bfe6ff':'#eee';ctx.fillText((m.name||'?')+(me?' (you)':''),x+12,y+18);
    ctx.textAlign='right';ctx.fillStyle='#ddd';ctx.font=mFont(16);ctx.fillText(String(m.kills||0),x+w*0.52,y+18);ctx.fillText(String(m.deaths||0),x+w*0.64,y+18);
    ctx.fillStyle='#ffd24a';ctx.font=mFont(16,'bold');ctx.fillText(String(m.points||0),x+w*0.82,y+18);
    ctx.fillStyle='#ddd';ctx.font=mFont(16);ctx.fillText(kd,x+w-12,y+18);
    y+=rh;
  });
  return y;
}

// ── Click handling ─────────────────────────────────────────────────────────
function handleClick(e){
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  if(workshopOpen){handleWorkshopClick(mx,my);return;}
  if(buyStationOpen){handleBuyClick(mx,my);return;}
  if(bigMapOpen){bigMapOpen=false;return;}
  if(state===STATE.PLAYING&&buildMode){placeWall(mx,my);return;}
  if(state===STATE.PLAYING&&airstrikePending){const camX=player.x-W/2,camY=player.y-H/2;callAirstrike(mx+camX,my+camY);airstrikePending=false;return;}
  if(state===STATE.MENU){for(const reg of menuRegions){if(mx>reg.x&&mx<reg.x+reg.w&&my>reg.y&&my<reg.y+reg.h){reg.action();break;}}}
  else if(state===STATE.BRIEFING){if(briefRegion&&mx>briefRegion.x&&mx<briefRegion.x+briefRegion.w&&my>briefRegion.y&&my<briefRegion.y+briefRegion.h)beginMissionPlay();}
  else if(state===STATE.PAUSED){const b=PAUSE_QUIT;if(mx>b.x&&mx<b.x+b.w&&my>b.y&&my<b.y+b.h){if(gameMode==='mp')mpCommitStats(false,0);else commitRun(false);toMenu(returnView());}}
  else if(state===STATE.GAME_OVER){const by=H/2+80;if(mx>W/2-130&&mx<W/2-10&&my>by&&my<by+44)restartGame();if(mx>W/2+10&&mx<W/2+130&&my>by&&my<by+44)toMenu(returnView());}
  else if(state===STATE.WIN){const by=H/2+80;
    if(gameMode==='mp'){
      if(mx>W/2-130&&mx<W/2-10&&my>by&&my<by+44)restartGame();
      if(mx>W/2+10&&mx<W/2+130&&my>by&&my<by+44)toMenu('multiplayer');
    } else if(gameMode==='campaign'){
      const nxt=mission?nextMission(mission.id):null;
      if(mx>W/2-130&&mx<W/2-10&&my>by&&my<by+44){if(nxt)startMission(nxt.id);else toMenu('campaign');}
      if(mx>W/2+10&&mx<W/2+130&&my>by&&my<by+44)toMenu('campaign');
    } else {
      if(mx>W/2-130&&mx<W/2-10&&my>by&&my<by+44)restartGame();
      if(mx>W/2+10&&mx<W/2+130&&my>by&&my<by+44)toMenu('tiles');
    }
  }
}
function returnView(){return gameMode==='campaign'?'campaign':gameMode==='mp'?'multiplayer':'tiles';}
// Return to the menu, resetting mode so the next launch is clean
function toMenu(view){gameMode='zombies';mission=null;state=STATE.MENU;menuTab='main';menuView=view||'tiles';}

// ── MULTIPLAYER (bot PvP, team objective modes) ──────────────────────────────
const MP_BLUE='#3fa9ff', MP_RED='#e63946', MP_RESPAWN=5, MP_ZONE_R=72, MP_CAP_TIME=10;
const MP_MODES={
  tdm:{name:'TEAM DEATHMATCH',limit:50, desc:'First team to 50 kills'},
  dom:{name:'DOMINATION',     limit:200,desc:'Hold zones A/B/C to score'},
  hp: {name:'HARDPOINT',      limit:250,desc:'Hold the rotating hill'},
  ctf:{name:'CAPTURE THE FLAG',limit:3, desc:'Steal & return enemy flags'},
};
let bots=[], mpMode='tdm', mpTheme=0, mpTimer=600, mpScoreLimit=50, mpEnded=false;
let mpScore={blue:0,red:0}, mpAcc={blue:0,red:0};
let mpZones=[], mpHill=null, mpHillPts=[], mpHillIdx=0, mpHillT=0, mpFlags=null;
let blueSpawn=null, redSpawn=null, playerDownT=0;
let mpMe={name:'YOU',team:'blue',kills:0,deaths:0,points:0}; // the player's own scoreboard line
let mpCommitted=false; // guards against folding match stats into saveData twice

function buildArena(themeIdx){
  mapCfg=MAPS[themeIdx];worldMap=blankMap();coverTiles=new Set();
  const cxT=Math.floor(MAP_W/2),midY=Math.floor(MAP_H/2);
  const wall=(tx,ty)=>{if(tx<1||ty<3||tx>=MAP_W-1||ty>=MAP_H-3)return;worldMap[ty][tx]=1;coverTiles.add(ty*MAP_W+tx);};
  // hollow building: walls + a doorway gap on one side (war-torn structures)
  const building=(x,y,w,h)=>{
    for(let dx=0;dx<w;dx++){wall(x+dx,y);wall(x+dx,y+h-1);}
    for(let dy=0;dy<h;dy++){wall(x,y+dy);wall(x+w-1,y+dy);}
    const s=randInt(0,3);
    if(s===0)worldMap[y][x+(w>>1)]=0;else if(s===1)worldMap[y+h-1][x+(w>>1)]=0;
    else if(s===2)worldMap[y+(h>>1)][x]=0;else worldMap[y+(h>>1)][x+w-1]=0;
  };
  // randomly placed buildings — different layout every match
  const nB=randInt(4,7);
  for(let i=0;i<nB;i++){const w=randInt(4,6),h=randInt(4,6),x=randInt(2,MAP_W-w-2),y=randInt(4,MAP_H-h-4);
    if(Math.abs((y+h/2)-midY)<3)continue;       // don't straddle the central lane
    building(x,y,w,h);}
  // scattered rubble / sandbag cover (random amount, chunkier)
  const nC=randInt(36,56);
  for(let i=0;i<nC;i++){const x=randInt(2,MAP_W-3),y=randInt(4,MAP_H-5);
    if(Math.abs(y-midY)<2)continue;            // keep a mid corridor open
    if(Math.random()<0.5){const bw=randInt(1,2);for(let dx=0;dx<bw;dx++)wall(x+dx,y);}}
  blueSpawn={x:tcx(cxT),y:tcx(MAP_H-3)};redSpawn={x:tcx(cxT),y:tcx(3)};
  // clear the two spawn pockets
  for(const ty of [2,3,MAP_H-4,MAP_H-3])for(let dx=-1;dx<=1;dx++){worldMap[ty][cxT+dx]=0;coverTiles.delete(ty*MAP_W+(cxT+dx));}
  generateDebris();
  if(!reachable(cxT,MAP_H-3).some(([x,y])=>x===cxT&&y===3)){worldMap=blankMap();coverTiles=new Set();generateDebris();}
}
// clear a 3×3 around each objective so it can't be walled off by buildings/cover
function mpEnsureFloor(pts){pts.forEach(p=>{const tx=Math.floor(p.x/TILE),ty=Math.floor(p.y/TILE);for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const x=tx+dx,y=ty+dy;if(x>0&&y>0&&x<MAP_W-1&&y<MAP_H-1){worldMap[y][x]=0;coverTiles.delete(y*MAP_W+x);}}});}
function setupMpObjectives(){
  const cxT=Math.floor(MAP_W/2),midY=Math.floor(MAP_H/2);
  mpZones=[];mpHillPts=[];mpHill=null;mpFlags=null;
  if(mpMode==='dom'){
    // spread across the map (triangle): A top-left, B centre, C bottom-right
    mpZones=[{id:'A',x:tcx(7),y:tcx(7),owner:null,prog:0,capTeam:null},
             {id:'B',x:tcx(cxT),y:tcx(midY),owner:null,prog:0,capTeam:null},
             {id:'C',x:tcx(MAP_W-8),y:tcx(MAP_H-8),owner:null,prog:0,capTeam:null}];
    mpEnsureFloor(mpZones);
  } else if(mpMode==='hp'){
    mpHillPts=[{x:tcx(cxT),y:tcx(midY)},{x:tcx(7),y:tcx(8)},{x:tcx(MAP_W-8),y:tcx(MAP_H-9)},{x:tcx(MAP_W-8),y:tcx(8)},{x:tcx(7),y:tcx(MAP_H-9)}];
    mpEnsureFloor(mpHillPts);mpHillIdx=0;mpHillT=60;mpHill=mpHillPts[0];
  } else if(mpMode==='ctf'){
    mpFlags={blue:{home:{x:blueSpawn.x,y:blueSpawn.y},pos:{x:blueSpawn.x,y:blueSpawn.y},carrier:null,downT:0},
             red: {home:{x:redSpawn.x, y:redSpawn.y}, pos:{x:redSpawn.x, y:redSpawn.y}, carrier:null,downT:0}};
  }
}
// Random floor spawn anywhere on the map, biased away from living enemies (no spawning on top of someone)
function mpSpawnPos(team){
  let best=null,bestD=-1;
  for(let i=0;i<40;i++){
    const tx=randInt(2,MAP_W-3),ty=randInt(2,MAP_H-3);if(worldMap[ty][tx]!==0)continue;
    const x=tcx(tx),y=tcx(ty);let nd=1e9;
    for(const o of bots){if(o.alive&&o.team!==team)nd=Math.min(nd,Math.hypot(o.x-x,o.y-y));}
    if(team==='red'&&playerDownT<=0&&player&&player.x!==undefined)nd=Math.min(nd,Math.hypot(player.x-x,player.y-y));
    if(nd>320)return {x,y};
    if(nd>bestD){bestD=nd;best={x,y};}
  }
  return best||{x:tcx(Math.floor(MAP_W/2)),y:tcx(Math.floor(MAP_H/2))};
}
function makeBot(team){const s=mpSpawnPos(team);return {x:s.x,y:s.y,hp:100,maxHp:100,angle:0,team,alive:true,respawnT:0,fireCd:rand(0,1),spd:rand(150,180),role:'',carryFlag:null,stuckT:0,detourT:0,ox:rand(-46,46),oy:rand(-46,46),name:'',kills:0,deaths:0,points:0};}
function spawnBots(){
  bots=[];
  for(let i=0;i<3;i++){const b=makeBot('blue');b.name='T'+(i+1);bots.push(b);}   // T1..T3 = teammates
  for(let i=0;i<4;i++){const b=makeBot('red'); b.name='E'+(i+1);bots.push(b);}   // E1..E4 = enemies
  if(mpMode==='ctf')bots.forEach((b,i)=>b.role=(i%2===0)?'attack':'defend');
}
function respawnBot(b){const s=mpSpawnPos(b.team);b.alive=true;b.hp=b.maxHp;b.x=s.x;b.y=s.y;b.respawnT=0;b.carryFlag=null;}

function mpPlayerDown(){if(playerDownT>0)return;playerDownT=MP_RESPAWN;mpMe.deaths++;if(mpMode==='tdm')mpScore.red++;mpFlagDropFrom(player);addShake(12,0.4);addNotif('You were killed — respawning…','#ff8585',3);}
function mpRespawnPlayer(){const s=mpSpawnPos('blue');player.hp=player.maxHp;player.x=s.x;player.y=s.y;player.invincible=2;player.lastStand=false;player.dmgT=99;player.mag=player.magMax;player.reloadT=0;playerDownT=0;}
function mpStartReload(){if(player.reloadT>0||player.mag>=player.magMax)return;player.reloadT=1.4;addNotif('Reloading…','#9aa0a6',1);}
function mpMelee(w){ // knife = one-shot kill
  const range=(w.range||54)+16,arc=w.arc||1.0;
  for(const o of bots){if(!o.alive||o.team==='blue')continue;if(dist(player,o)>range)continue;if(Math.abs(angDiff(Math.atan2(o.y-player.y,o.x-player.x),player.angle))>arc)continue;spawnBlood(o.x,o.y,16);mpKill('me',o);break;}
  for(let i=0;i<7;i++){const a=player.angle+rand(-arc,arc),s=rand(3,7);particles.push({x:player.x+Math.cos(a)*range*0.6,y:player.y+Math.sin(a)*range*0.6,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.18,maxLife:0.18,r:rand(2,4),color:'#e8e8f0'});}
  addShake(3,0.08);
}

function mpNearestEnemy(b){let best=null,bd=1e9;
  for(const o of bots){if(!o.alive||o.team===b.team)continue;const d=Math.hypot(o.x-b.x,o.y-b.y);if(d<bd){bd=d;best=o;}}
  if(b.team==='red'&&playerDownT<=0){const d=Math.hypot(player.x-b.x,player.y-b.y);if(d<bd){bd=d;best=player;}}
  return {tgt:best,d:bd};
}
// Returns a {x,y} goal, or null = "nothing to do, roam freely" (sets b.roamC for biased roaming)
function mpBotGoal(b){
  b.roamC=null;
  if(mpMode==='tdm'){const e=mpNearestEnemy(b);return e.tgt?{x:e.tgt.x,y:e.tgt.y}:null;}
  if(mpMode==='dom'){ // head to a zone we DON'T own (capture/contest); once it's ours, move on
    let best=null,bd=1e9;
    for(const z of mpZones){if(z.owner===b.team)continue;const w=(z.capTeam&&z.capTeam!==b.team)?0.6:1;const d=Math.hypot(z.x-b.x,z.y-b.y)*w;if(d<bd){bd=d;best=z;}}
    return best?{x:best.x,y:best.y}:null; // all zones held → roam/patrol
  }
  if(mpMode==='hp')return mpHill;
  if(mpMode==='ctf'){const mine=mpFlags[b.team],theirs=mpFlags[b.team==='blue'?'red':'blue'];
    if(b.carryFlag)return mine.home;                              // carrying → run it home
    if(b.role==='defend'){if(mine.carrier)return {x:mine.carrier.x,y:mine.carrier.y};b.roamC=mine.home;return null;} // patrol base
    return {x:theirs.pos.x,y:theirs.pos.y};}                      // attacker → enemy flag
  return null;
}
function mpRoamPoint(b,center){
  for(let i=0;i<12;i++){let tx,ty;
    if(center){tx=Math.floor(center.x/TILE)+randInt(-4,4);ty=Math.floor(center.y/TILE)+randInt(-4,4);}
    else{tx=randInt(2,MAP_W-3);ty=randInt(3,MAP_H-4);}
    if(tx>0&&ty>0&&tx<MAP_W-1&&ty<MAP_H-1&&worldMap[ty][tx]===0)return {x:tcx(tx),y:tcx(ty)};}
  return {x:b.x+rand(-150,150),y:b.y+rand(-150,150)};
}
// Steer a bot toward (gx,gy): blends in separation from nearby allies + a detour when wedged on a wall
function mpSteer(b,gx,gy,spd,dt){
  let dirx=gx-b.x,diry=gy-b.y;const dl=Math.hypot(dirx,diry)||1;dirx/=dl;diry/=dl;
  // separation: push away from same-team bots that are too close (stops clumping/following)
  let sx=0,sy=0;
  for(const o of bots){if(o===b||!o.alive||o.team!==b.team)continue;const dx=b.x-o.x,dy=b.y-o.y,d=Math.hypot(dx,dy);if(d>0.01&&d<54){sx+=dx/d*(54-d);sy+=dy/d*(54-d);}}
  dirx+=sx*0.018;diry+=sy*0.018;
  // active detour when stuck (route around the obstacle for a moment)
  if(b.detourT>0){b.detourT-=dt;dirx=Math.cos(b.detourA);diry=Math.sin(b.detourA);}
  const nl=Math.hypot(dirx,diry)||1;dirx/=nl;diry/=nl;
  const px=b.x,py=b.y;
  moveToward(b,b.x+dirx*60,b.y+diry*60,spd,dt);
  if(Math.hypot(b.x-px,b.y-py)<spd*dt*0.35){ // barely moved → wedged
    b.stuckT=(b.stuckT||0)+dt;
    if(b.stuckT>0.4){b.detourT=0.7;b.detourA=Math.atan2(diry,dirx)+(Math.random()<0.5?1:-1)*(Math.PI/2+rand(-0.5,0.5));b.stuckT=0;b.wx=undefined;}
  } else b.stuckT=0;
  return Math.atan2(diry,dirx);
}
function updateBots(dt){
  for(const b of bots){
    if(!b.alive){b.respawnT-=dt;if(b.respawnT<=0)respawnBot(b);continue;}
    b.dmgT=(b.dmgT||0)+dt;if(b.dmgT>7&&b.hp<b.maxHp)b.hp=Math.min(b.maxHp,b.hp+25*dt); // out-of-combat health regen
    if(b.stun>0){b.stun-=dt;continue;}                                                  // flashbanged: frozen
    const e=mpNearestEnemy(b);
    let goal=mpBotGoal(b);
    if(!goal){ // roam: each bot picks its own wander point so they don't follow one another
      b.wt=(b.wt||0)-dt;
      if(b.wx===undefined||b.wt<=0||Math.hypot(b.wx-b.x,b.wy-b.y)<44){const rp=mpRoamPoint(b,b.roamC);b.wx=rp.x;b.wy=rp.y;b.wt=rand(2.5,5);}
      goal={x:b.wx,y:b.wy};
    } else {goal={x:goal.x+(b.ox||0),y:goal.y+(b.oy||0)};} // personal offset so they spread around the point
    if(e.tgt&&e.d<520&&losClear(b.x,b.y,e.tgt.x,e.tgt.y)){
      // pick a fighting position: advance if far, back off if too close, otherwise strafe
      let tx,ty;
      if(e.d>240){tx=e.tgt.x;ty=e.tgt.y;}
      else if(e.d<140){tx=b.x*2-e.tgt.x;ty=b.y*2-e.tgt.y;}
      else {if(b.strafeFlip===undefined||Math.random()<0.01)b.strafeFlip=Math.random()<0.5?1:-1;const pa=Math.atan2(e.tgt.y-b.y,e.tgt.x-b.x)+Math.PI/2*b.strafeFlip;tx=b.x+Math.cos(pa)*70;ty=b.y+Math.sin(pa)*70;}
      mpSteer(b,tx,ty,b.spd,dt);
      b.angle=Math.atan2(e.tgt.y-b.y,e.tgt.x-b.x); // always face the enemy while fighting
      b.fireCd-=dt;
      if(b.fireCd<=0&&e.d>40){const a=b.angle+rand(-0.08,0.08);bullets.push({x:b.x,y:b.y,vx:Math.cos(a)*430,vy:Math.sin(a)*430,dmg:9,life:1.6,color:b.team==='blue'?'#aee0ff':'#ffb0b0',fromPlayer:false,team:b.team,owner:b,br:4});spawnMuzzle(b.x+Math.cos(a)*16,b.y+Math.sin(a)*16,a);b.fireCd=rand(0.6,1.2);}
    } else {
      b.angle=mpSteer(b,goal.x,goal.y,b.spd,dt);
    }
  }
}
function updateMpBullets(dt){
  bullets=bullets.filter(b=>{
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||isWall(b.x,b.y)){if(b.explosive&&bteamOf(b)==='blue')mpExplode(b.x,b.y,b.blast,b.dmg);return false;}
    const bteam=bteamOf(b);
    for(const o of bots){if(!o.alive||o.team===bteam)continue;if(Math.hypot(b.x-o.x,b.y-o.y)<15+(b.br||4)){
      if(b.explosive){if(bteam==='blue')mpExplode(b.x,b.y,b.blast,b.dmg);return false;}
      if(b.pierce){if(!b.hit)b.hit=new Set();if(b.hit.has(o))continue;b.hit.add(o);o.hp-=b.dmg;o.dmgT=0;spawnBlood(o.x,o.y,6);if(o.hp<=0)mpKill(b.owner||(b.fromPlayer?'me':null),o);continue;}

// killer = 'me' (player), a bot object, or null. victim is always a bot here (player death → mpPlayerDown)
function mpKill(killer,victim){
  victim.alive=false;victim.respawnT=MP_RESPAWN;victim.deaths=(victim.deaths||0)+1;spawnBlood(victim.x,victim.y,16);
  let kt=null;
  if(killer==='me'){kt='blue';mpMe.kills++;mpMe.points+=100;sessionCoins+=2;}
  else if(killer&&killer.team){kt=killer.team;killer.kills=(killer.kills||0)+1;killer.points=(killer.points||0)+100;}
  if(kt&&mpMode==='tdm')mpScore[kt]++;
  if(victim.carryFlag)mpFlagDropFrom(victim);
}
function mpFlagDropFrom(c){if(!mpFlags)return;for(const t of ['blue','red']){const f=mpFlags[t];if(f.carrier===c){f.carrier=null;f.pos={x:c.x,y:c.y};f.downT=10;}}if(c)c.carryFlag=null;}
function mpCountIn(z,team){let n=0;for(const b of bots){if(b.alive&&b.team===team&&Math.hypot(b.x-z.x,b.y-z.y)<MP_ZONE_R)n++;}if(team==='blue'&&playerDownT<=0&&Math.hypot(player.x-z.x,player.y-z.y)<MP_ZONE_R)n++;return n;}
function mpAdd(team,dt,rate){mpAcc[team]+=dt*(rate||1);while(mpAcc[team]>=1){mpAcc[team]-=1;mpScore[team]++;}}
// Domination capture meter: ~MP_CAP_TIME secs with 1 member, faster with more (n members = n×rate)
function mpCapZone(z,team,n,dt){
  if(z.owner===team){z.prog=MP_CAP_TIME;z.capTeam=team;return;}
  if(z.capTeam!==team){z.capTeam=team;z.prog=0;}
  z.prog+=n*dt;
  if(z.prog>=MP_CAP_TIME){z.owner=team;z.prog=MP_CAP_TIME;
    for(const o of bots){if(o.alive&&o.team===team&&Math.hypot(o.x-z.x,o.y-z.y)<MP_ZONE_R)o.points=(o.points||0)+150;}
    if(team==='blue'&&playerDownT<=0&&Math.hypot(player.x-z.x,player.y-z.y)<MP_ZONE_R)mpMe.points+=150;
    addNotif('Zone '+z.id+' captured by '+(team==='blue'?'BLUE':'RED')+'!',team==='blue'?MP_BLUE:MP_RED,3);}
}
function mpCheckFlag(c,cteam){

}
function mpCheckCapture(c,cteam){
  if(!c.carryFlag)return;const mine=mpFlags[cteam],homeOk=!mine.carrier&&Math.hypot(mine.pos.x-mine.home.x,mine.pos.y-mine.home.y)<12;

function updateMpRules(dt){
  if(mpEnded)return;
  if(playerDownT>0){playerDownT-=dt;if(playerDownT<=0)mpRespawnPlayer();}
  // out-of-combat health regen (after 7s with no damage, the bar climbs back up)
  player.dmgT=(player.dmgT||0)+dt;if(playerDownT<=0&&player.dmgT>7&&player.hp<player.maxHp)player.hp=Math.min(player.maxHp,player.hp+25*dt);
  if(player.reloadT>0){player.reloadT-=dt;if(player.reloadT<=0){player.mag=player.magMax;addNotif('Reloaded','#9aa0a6',1);}}
  mpTimer-=dt;
  if(mpMode==='dom'){for(const z of mpZones){const bIn=mpCountIn(z,'blue'),rIn=mpCountIn(z,'red');if(bIn>0&&rIn===0)mpCapZone(z,'blue',bIn,dt);else if(rIn>0&&bIn===0)mpCapZone(z,'red',rIn,dt);if(z.owner)mpAdd(z.owner,dt,1);}}
  else if(mpMode==='hp'){mpHillT-=dt;if(mpHillT<=0){mpHillIdx=(mpHillIdx+1)%mpHillPts.length;mpHill=mpHillPts[mpHillIdx];mpHillT=60;addNotif('⛳ Hardpoint moved!','#ffd24a',3);}const bIn=mpCountIn(mpHill,'blue'),rIn=mpCountIn(mpHill,'red');if(bIn>0&&rIn===0)mpAdd('blue',dt,1);else if(rIn>0&&bIn===0)mpAdd('red',dt,1);}
  else if(mpMode==='ctf'){
    for(const t of ['blue','red']){const f=mpFlags[t];if(!f.carrier&&f.downT>0){f.downT-=dt;if(f.downT<=0){f.pos={x:f.home.x,y:f.home.y};addNotif((t==='blue'?'BLUE':'RED')+' flag returned','#ccc',2);}}}
    if(playerDownT<=0){mpCheckFlag(player,'blue');mpCheckCapture(player,'blue');}
    for(const b of bots)if(b.alive){mpCheckFlag(b,b.team);mpCheckCapture(b,b.team);}
    for(const t of ['blue','red']){const f=mpFlags[t];if(f.carrier){f.pos.x=f.carrier.x;f.pos.y=f.carrier.y;}}
  }
  if(mpScore.blue>=mpScoreLimit||mpScore.red>=mpScoreLimit||mpTimer<=0)mpEnd();
}
// Fold the current match's stats into the saved MP career totals (used on match end AND on quit)
function mpCommitStats(won,bonus){

  const mp=saveData.mp;

    if(startCountdown>0){
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);

  firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth(), db=firebase.firestore();

  const el=id=>document.getElementById(id);
  const acct=el('dzAcct'),info=el('dzAcctInfo'),signInBtn=el('dzSignInBtn');
  const modal=el('dzAuth'),emailEl=el('dzEmail'),statusEl=el('dzStatus'),errEl=el('dzAuthErr');
  const inEmail=el('dzInEmail'),inPass=el('dzInPass');

  // stop typing in the form from reaching the game's WASD/key handlers
  [inEmail,inPass].forEach(i=>['keydown','keyup','keypress'].forEach(ev=>i.addEventListener(ev,e=>e.stopPropagation())));

  function openModal(){errEl.textContent='';modal.style.display='flex';inEmail.focus();}
  function closeModal(){modal.style.display='none';}
  function setStatus(s,c){statusEl.textContent=s;statusEl.style.color=c||'#2ecc71';}
  signInBtn.onclick=openModal;
  el('dzAuthClose').onclick=closeModal;
  el('dzLogout').onclick=()=>auth.signOut();
  el('dzLogin').onclick=()=>doAuth('login');
  el('dzSignup').onclick=()=>doAuth('signup');
  inPass.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth('login');});

  // username modal (leaderboard display name)
  const nameModal=el('dzName'),nameIn=el('dzNameIn'),nameErr=el('dzNameErr');
  ['keydown','keyup','keypress'].forEach(ev=>nameIn.addEventListener(ev,e=>e.stopPropagation()));
  function openName(){nameErr.textContent='';nameIn.value=saveData.username||'';nameModal.style.display='flex';nameIn.focus();}
  function closeName(){nameModal.style.display='none';}
  openNameModal=openName; // expose to game-scope drawLeaderboard
  el('dzNameClose').onclick=closeName;
  el('dzNameSave').onclick=saveName;
  nameIn.addEventListener('keydown',e=>{if(e.key==='Enter')saveName();});
  function saveName(){
    const v=nameIn.value.trim();
    if(!/^[A-Za-z0-9_-]{3,16}$/.test(v)){nameErr.textContent='3–16 chars: letters, numbers, _ or - only.';return;}
    saveData.username=v;writeLocal();closeName();
    pushLeaderboardImpl();pushNow();
  }

  function doAuth(kind){
    const email=inEmail.value.trim(),pass=inPass.value;
    if(!email||!pass){errEl.textContent='Enter an email and password.';return;}
    errEl.textContent='…';
    const p=kind==='signup'?auth.createUserWithEmailAndPassword(email,pass)
                           :auth.signInWithEmailAndPassword(email,pass);
    p.then(()=>{closeModal();inPass.value='';}).catch(e=>{errEl.textContent=friendly(e.code)||e.message;});
  }
  function friendly(code){return({
    'auth/invalid-email':'That email looks invalid.',
    'auth/missing-password':'Enter a password.',
    'auth/weak-password':'Password must be at least 6 characters.',
    'auth/email-already-in-use':'That email already has an account — try LOG IN.',
    'auth/invalid-credential':'Wrong email or password.',
    'auth/wrong-password':'Wrong password.',
    'auth/user-not-found':'No account for that email — try SIGN UP.',
    'auth/network-request-failed':'Network error — check your connection.'
  })[code];}

  // merge local + cloud so neither device's progress is lost
  function mergeSave(local,cloud){
    const m=Object.assign({},SAVE_DEFAULT,local);
    if(!cloud)return m;
    const mx=(a,b)=>Math.max(a||0,b||0);
    m.coins=mx(local.coins,cloud.coins);
    m.kills=mx(local.kills,cloud.kills);
    m.deaths=mx(local.deaths,cloud.deaths);
    m.highestLevel=mx(local.highestLevel,cloud.highestLevel)||1;
    m.gamesPlayed=mx(local.gamesPlayed,cloud.gamesPlayed);
    m.bestScore=mx(local.bestScore,cloud.bestScore);
    const uni=(a,b)=>Array.from(new Set([...(a||[]),...(b||[])]));
    m.ownedHats=uni(local.ownedHats,cloud.ownedHats);
    m.ownedOutfits=uni(local.ownedOutfits,cloud.ownedOutfits);
    m.campaignDone=uni(local.campaignDone,cloud.campaignDone);
    m.equippedHat=cloud.equippedHat||local.equippedHat||'none';
    m.equippedOutfit=cloud.equippedOutfit||local.equippedOutfit||'default';
    m.username=local.username||cloud.username||'';
    m.challenges=mergeChallenges(local.challenges,cloud.challenges);
    const lm=local.mp||{},cm=cloud.mp||{},lb=lm.best||{},cb=cm.best||{};
    m.mp={kills:mx(lm.kills,cm.kills),deaths:mx(lm.deaths,cm.deaths),points:mx(lm.points,cm.points),matches:mx(lm.matches,cm.matches),wins:mx(lm.wins,cm.wins),best:{kills:mx(lb.kills,cb.kills),deaths:mx(lb.deaths,cb.deaths),points:mx(lb.points,cb.points)}};
    return m;
  }
  // reconcile challenge progress: newer period wins; same period takes max progress + union claims
  function mergeChallenges(local,cloud){
    local=local||{dailyKey:0,weeklyKey:0,progress:{},claimed:{}};
    const out={dailyKey:local.dailyKey||0,weeklyKey:local.weeklyKey||0,progress:Object.assign({},local.progress),claimed:Object.assign({},local.claimed)};
    if(!cloud)return out;
    function tier(prefix,lk,ck){
      lk=lk||0;ck=ck||0;const ids=[prefix+'_easy',prefix+'_medium',prefix+'_hard'];
      if(ck>lk){ // cloud period newer — take cloud's tier
        out[prefix+'Key']=ck;
        ids.forEach(id=>{
          if(cloud.progress&&id in cloud.progress)out.progress[id]=cloud.progress[id];else delete out.progress[id];
          if(cloud.claimed&&cloud.claimed[id])out.claimed[id]=true;else delete out.claimed[id];
        });
      } else if(ck===lk){ // same period — max progress, union claims
        ids.forEach(id=>{
          out.progress[id]=Math.max(out.progress[id]||0,(cloud.progress&&cloud.progress[id])||0);
          if(cloud.claimed&&cloud.claimed[id])out.claimed[id]=true;
        });
      } // else local newer — keep local
    }
    tier('daily',local.dailyKey,cloud.dailyKey);
    tier('weekly',local.weeklyKey,cloud.weeklyKey);
    return out;
  }

  // wrap the game's writeSave so every local save also schedules a cloud push
  const writeLocal=writeSave;
  let pushTimer=null;
  writeSave=function(){writeLocal();schedulePush();};
  function schedulePush(){if(!auth.currentUser)return;setStatus('saving…','#ffd24a');clearTimeout(pushTimer);pushTimer=setTimeout(pushNow,1200);}
  function pushNow(){
    const u=auth.currentUser;if(!u)return Promise.resolve();
    return db.collection('users').doc(u.uid).set({
      save:saveData,highScore:highScore,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true}).then(()=>{setStatus('synced ✓','#2ecc71');return pushLeaderboardImpl();})
     .catch(e=>{setStatus('sync error','#ff7676');console.error(e);});
  }

  // public leaderboard doc (separate collection, public-read / owner-write)
  function pushLeaderboardImpl(){
    const u=auth.currentUser;if(!u||!saveData.username)return Promise.resolve();
    return db.collection('leaderboard').doc(u.uid).set({
      username:saveData.username,
      bestScore:Math.max(highScore||0,saveData.bestScore||0),
      kills:saveData.kills||0,
      highestLevel:saveData.highestLevel||1,
      coins:saveData.coins||0,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true}).catch(e=>console.warn('leaderboard push failed',e));
  }
  pushLeaderboard=pushLeaderboardImpl; // expose to game scope

  // query a board; cache so the per-frame menu draw doesn't requery
  fetchLeaderboard=function(metric){
    lbCache={metric:metric,rows:[],loading:true,error:null};
    db.collection('leaderboard').orderBy(metric,'desc').limit(25).get()
      .then(snap=>{lbCache={metric:metric,rows:snap.docs.map(d=>Object.assign({uid:d.id},d.data())),loading:false,error:null};})
      .catch(e=>{console.error(e);lbCache={metric:metric,rows:[],loading:false,error:'Could not load leaderboard.'};});
  };

  auth.onAuthStateChanged(async user=>{
    if(user){
      signInBtn.style.display='none';info.style.display='flex';
      emailEl.textContent=user.email;setStatus('syncing…','#ffd24a');
      lbSignedIn=true;lbUid=user.uid;lbCache={metric:null,rows:[],loading:false,error:null};
      try{
        const snap=await db.collection('users').doc(user.uid).get();
        const data=snap.exists?snap.data():null;
        saveData=mergeSave(saveData,data&&data.save?data.save:null);
        syncChallengePeriods();
        if(data&&typeof data.highScore==='number'&&data.highScore>highScore){
          highScore=data.highScore;localStorage.setItem('dz_hs',highScore);
        }
        writeLocal();      // persist merged result locally
        await pushNow();   // and mirror it back to the cloud (incl. leaderboard)
        if(!saveData.username)openName(); // first-time players pick a name for the board
      }catch(e){setStatus('sync error','#ff7676');console.error(e);}
    }else{
      signInBtn.style.display='block';info.style.display='none';
      lbSignedIn=false;lbUid=null;closeName();
    }
  });

  // only show the account widget on the menu; never over gameplay
  (function syncVis(){
    const onMenu=(typeof state!=='undefined'&&state===STATE.MENU);
    acct.style.display=onMenu?'block':'none';
    if(!onMenu){closeModal();closeName();}
    requestAnimationFrame(syncVis);
  })();
})();

// ── Mobile / touch controls ──────────────────────────────────────────────────
// Self-contained: only wires up on touch devices, so the desktop/web build is
// unchanged at runtime. Feeds the SAME inputs the game already reads — movement
// via touchMove, aim/fire via mouse.x/y/down, actions via synthetic key events,
// and menu/shop taps via handleClick.
(function(){
  const IS_TOUCH=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  if(!IS_TOUCH)return;
  document.body.classList.add('touch');

  const css=document.createElement('style');
  css.textContent=`
  body.touch{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
  body.touch #game{touch-action:none;cursor:default;}
  #mzRotate{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#000;color:#e63946;font-family:'JetBrains Mono','Courier New',monospace;font-size:56px;}
  #mzRotate small{font-size:16px;color:#bbb;letter-spacing:3px;}
  @media(orientation:portrait){body.touch #mzRotate{display:flex;}}
  #mzStick{position:fixed;z-index:40;width:132px;height:132px;margin:-66px 0 0 -66px;border-radius:50%;border:2px solid rgba(255,255,255,.22);background:rgba(255,255,255,.05);display:none;pointer-events:none;}
  #mzKnob{position:absolute;left:50%;top:50%;width:58px;height:58px;margin:-29px 0 0 -29px;border-radius:50%;background:rgba(255,255,255,.28);border:2px solid rgba(255,255,255,.5);}
  .mzRow{position:fixed;z-index:45;display:none;gap:12px;}
  #mzActions{right:calc(18px + env(safe-area-inset-right));bottom:calc(20px + env(safe-area-inset-bottom));flex-wrap:wrap;width:178px;justify-content:flex-end;}
  #mzUtil{left:calc(16px + env(safe-area-inset-left));top:calc(14px + env(safe-area-inset-top));}
  .mzBtn{width:62px;height:62px;border-radius:50%;background:rgba(18,18,22,.55);border:2px solid rgba(230,57,70,.6);color:#fff;font-family:'JetBrains Mono','Courier New',monospace;font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.15;}
  .mzBtn b{font-size:21px;font-weight:400;}
  .mzBtn:active{background:rgba(230,57,70,.5);}
  #mzUtil .mzBtn{width:50px;height:50px;border-color:rgba(255,255,255,.32);font-size:9px;}
  #mzClose{position:fixed;z-index:50;right:calc(16px + env(safe-area-inset-right));top:calc(14px + env(safe-area-inset-top));width:56px;height:56px;border-radius:50%;background:rgba(18,18,22,.72);border:2px solid rgba(255,255,255,.5);color:#fff;font-size:24px;display:none;align-items:center;justify-content:center;}
  `;
  document.head.appendChild(css);

  const mk=(tag,id,html)=>{const e=document.createElement(tag);if(id)e.id=id;if(html!=null)e.innerHTML=html;return e;};
  document.body.appendChild(mk('div','mzRotate','📱↻<small>ROTATE TO LANDSCAPE</small>'));
  const stick=mk('div','mzStick'),knob=mk('div','mzKnob');stick.appendChild(knob);document.body.appendChild(stick);

  // synthetic key press → reuses every keyboard binding the game already has
  function pressKey(k){
    document.dispatchEvent(new KeyboardEvent('keydown',{key:k}));
    document.dispatchEvent(new KeyboardEvent('keyup',{key:k}));
  }
  const allBtns=[]; // each button declares which game modes it applies to
  function button(d,parent){
    const b=mk('div',null,'<b>'+d.ic+'</b>'+d.lbl);b.className='mzBtn';
    b.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();b.style.opacity=.6;pressKey(d.key);},{passive:false});
    b.addEventListener('touchend',e=>{e.preventDefault();b.style.opacity=1;},{passive:false});
    b._modes=d.modes;parent.appendChild(b);allBtns.push(b);
  }
  const Z='zombies',CMP='campaign',MP='mp';

  const actions=mk('div','mzActions');actions.className='mzRow';
  [{ic:'✋',lbl:'USE',key:'Enter',modes:[Z,CMP]},
   {ic:'💣',lbl:'NADE',key:'g',modes:[Z,MP]},
   {ic:'🔁',lbl:'SWAP',key:'y',modes:[Z,CMP,MP]},
   {ic:'🔄',lbl:'RELOAD',key:'r',modes:[MP]},
   {ic:'🔧',lbl:'DEPLOY',key:'f',modes:[Z]}].forEach(d=>button(d,actions));
  document.body.appendChild(actions);

  const util=mk('div','mzUtil');util.className='mzRow';
  [{ic:'🗺',lbl:'MAP',key:'m',modes:[Z]},
   {ic:'🔨',lbl:'BUILD',key:'b',modes:[Z]},
   {ic:'⚡',lbl:'STREAK',key:'e',modes:[Z]},
   {ic:'⏸',lbl:'',key:'Escape',modes:[Z,CMP,MP]}].forEach(d=>button(d,util));
  document.body.appendChild(util);

  const closeBtn=mk('div','mzClose','✕');
  closeBtn.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();pressKey('Escape');},{passive:false});
  document.body.appendChild(closeBtn);

  // ── touch → game input ──
  const tco=t=>{const r=canvas.getBoundingClientRect();return{x:(t.clientX-r.left)*(W/r.width),y:(t.clientY-r.top)*(H/r.height)};};
  const uiOpen=()=>inventoryOpen||buyStationOpen||bigMapOpen||workshopOpen;
  const freePlay=()=>state===STATE.PLAYING&&!uiOpen()&&!buildMode&&!airstrikePending;
  let moveId=null,aimId=null,ox=0,oy=0;

  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      const c=tco(t);
      if(!freePlay()){mouse.x=c.x;mouse.y=c.y;handleClick({clientX:t.clientX,clientY:t.clientY});continue;}
      if(c.x<W*0.5&&moveId===null){ // left half = move stick
        moveId=t.identifier;ox=c.x;oy=c.y;touchMove.active=true;touchMove.dx=0;touchMove.dy=0;
        stick.style.display='block';stick.style.left=t.clientX+'px';stick.style.top=t.clientY+'px';knob.style.transform='translate(0,0)';
      }else if(aimId===null){ // right half = aim + fire toward finger
        aimId=t.identifier;mouse.x=c.x;mouse.y=c.y;mouse.down=true;
      }
    }
  },{passive:false});

  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      const c=tco(t);
      if(t.identifier===moveId){
        const dx=c.x-ox,dy=c.y-oy,d=Math.hypot(dx,dy);
        if(d>6){touchMove.dx=dx/d;touchMove.dy=dy/d;}else{touchMove.dx=0;touchMove.dy=0;}
        const k=Math.min(d,46),a=Math.atan2(dy,dx);
        knob.style.transform='translate('+Math.cos(a)*k+'px,'+Math.sin(a)*k+'px)';
      }else if(t.identifier===aimId){mouse.x=c.x;mouse.y=c.y;}
    }
  },{passive:false});

  const end=e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier===moveId){moveId=null;touchMove.active=false;touchMove.dx=0;touchMove.dy=0;stick.style.display='none';}
      if(t.identifier===aimId){aimId=null;mouse.down=false;}
    }
  };
  canvas.addEventListener('touchend',end,{passive:false});
  canvas.addEventListener('touchcancel',end,{passive:false});

  // ── surface the right controls for the current screen ──
  (function sync(){
    const playing=state===STATE.PLAYING,open=uiOpen();
    const gm=(typeof gameMode!=='undefined')?gameMode:Z;
    allBtns.forEach(b=>{b.style.display=b._modes.includes(gm)?'':'none';}); // hide buttons that don't apply to this mode
    actions.style.display=freePlay()?'flex':'none';
    util.style.display=(playing&&!open)?'flex':'none';
    closeBtn.style.display=((playing&&open)||state===STATE.PAUSED)?'flex':'none';
    if(!playing&&(moveId!==null||aimId!==null)){moveId=aimId=null;touchMove.active=false;mouse.down=false;stick.style.display='none';}
    requestAnimationFrame(sync);
  })();
})();
</script>
</body>
</html>
