<!DOCTYPE html>
<html>
<head>
  <title>Dead Zone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; cursor: crosshair; position: fixed; top: 0; left: 0; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
let W=window.innerWidth,H=window.innerHeight;
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
canvas.width=W;canvas.height=H;
const fogCanvas=document.createElement('canvas');
fogCanvas.width=W;fogCanvas.height=H;
const fogCtx=fogCanvas.getContext('2d');
function resizeCanvas(){W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;fogCanvas.width=W;fogCanvas.height=H;}
window.addEventListener('resize',resizeCanvas);

const STATE={MENU:'menu',PLAYING:'playing',GAME_OVER:'gameOver',WIN:'win',PAUSED:'paused'};
const MAPS=[
  {id:'city',      name:'City Streets',      bg:'#111',    floorA:'#1e1e1e',floorB:'#222',    wallA:'#3d3d3d',wallB:'#454545',accentColor:'#e63946',fog:'rgba(0,0,0,0.87)'},
  {id:'bunker',    name:'Underground Bunker', bg:'#070d12', floorA:'#0d1a26',floorB:'#101e2c', wallA:'#1e3040',wallB:'#243850',accentColor:'#00b4d8',fog:'rgba(0,5,15,0.9)'},
  {id:'wasteland', name:'Wasteland',          bg:'#100a04', floorA:'#2a1e12',floorB:'#321f10', wallA:'#6b4a30',wallB:'#7a5535',accentColor:'#f77f00',fog:'rgba(10,5,0,0.88)'},
  {id:'graveyard', name:'Graveyard',          bg:'#060806', floorA:'#121610',floorB:'#141a12', wallA:'#2a3020',wallB:'#323828',accentColor:'#7bc67e',fog:'rgba(0,5,0,0.9)'},
  {id:'arctic',    name:'Frozen Outpost',     bg:'#070d12', floorA:'#16242e',floorB:'#1a2a35', wallA:'#3d5d70',wallB:'#496c80',accentColor:'#7fd4ff',fog:'rgba(8,18,28,0.85)'},
];
// Campaign chains MAPS[0..3]; the arctic map (index 4) is single-map only.

let state=STATE.MENU;
let globalLevel=1;
let campaignMode=true;   // true = chain MAPS[0..3]; false = stay on one map for 20 levels
let fixedMapIdx=0;       // map used in single-map mode
let score=0,currency=0;
let highScore=parseInt(localStorage.getItem('dz_hs')||'0');

// ── Persistent save (coins, all-time stats, cosmetics) ───────────────────────
const RANKS=[
  {name:'Rookie',   kills:0,    color:'#9aa0a6'},
  {name:'Survivor', kills:50,   color:'#2ecc71'},
  {name:'Fighter',  kills:150,  color:'#3498db'},
  {name:'Veteran',  kills:400,  color:'#9b59b6'},
  {name:'Elite',    kills:900,  color:'#f39c12'},
  {name:'Legend',   kills:2000, color:'#e63946'},
  {name:'God',      kills:5000, color:'#ffd700'},
];
function rankFor(kills){let r=RANKS[0];for(const x of RANKS)if(kills>=x.kills)r=x;return r;}
function nextRank(kills){for(const x of RANKS)if(kills<x.kills)return x;return null;}

const SAVE_DEFAULT={
  coins:0, kills:0, deaths:0, highestLevel:1, gamesPlayed:0, bestScore:0,
  ownedHats:['none'], ownedOutfits:['default'], equippedHat:'none', equippedOutfit:'default'
};
let saveData=loadSave();
function loadSave(){
  try{const raw=localStorage.getItem('dz_save');if(raw){return Object.assign({},SAVE_DEFAULT,JSON.parse(raw));}}catch(e){}
  return Object.assign({},SAVE_DEFAULT);
}
function writeSave(){try{localStorage.setItem('dz_save',JSON.stringify(saveData));}catch(e){}}

// Per-session counters (folded into saveData when a run ends)
let sessionCoins=0,sessionKills=0;

// ── Cosmetics (bought with persistent coins, equipped in the Locker) ─────────
const HATS=[
  {id:'none',   name:'No Hat',  cost:0,    color:null},
  {id:'cap',    name:'Cap',     cost:150,  color:'#3498db'},
  {id:'beanie', name:'Beanie',  cost:200,  color:'#9b59b6'},
  {id:'cowboy', name:'Cowboy',  cost:400,  color:'#8b5a2b'},
  {id:'helmet', name:'Helmet',  cost:600,  color:'#6a7560'},
  {id:'crown',  name:'Crown',   cost:1500, color:'#ffd700'},
];
const OUTFITS=[
  {id:'default',name:'Default', cost:0,    body:'#3a80d0',trim:'#2a60a0'},
  {id:'camo',   name:'Camo',    cost:250,  body:'#4b5320',trim:'#36401a'},
  {id:'red',    name:'Crimson', cost:300,  body:'#b03030',trim:'#7a1a1a'},
  {id:'shadow', name:'Shadow',  cost:500,  body:'#2c2c34',trim:'#15151a'},
  {id:'gold',   name:'Golden',  cost:1200, body:'#d4af37',trim:'#9a7d1f'},
  {id:'phantom',name:'Phantom', cost:2000, body:'#1a3a4a',trim:'#0a8aaa'},
];
function getHat(){return HATS.find(h=>h.id===saveData.equippedHat)||HATS[0];}
function getOutfit(){return OUTFITS.find(o=>o.id===saveData.equippedOutfit)||OUTFITS[0];}

// Draw a hat in the player's local frame (origin = head centre, +x = facing dir)
function drawHat(h,r){
  if(!h||h.id==='none')return;
  ctx.save();
  if(h.id==='cap'){
    ctx.fillStyle=h.color;ctx.beginPath();ctx.arc(0,0,r*0.72,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(r*0.45,-r*0.42,r*0.75,r*0.84);
  } else if(h.id==='beanie'){
    ctx.fillStyle=h.color;ctx.beginPath();ctx.arc(0,0,r*0.78,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,r*0.2,0,Math.PI*2);ctx.fill();
  } else if(h.id==='cowboy'){
    ctx.fillStyle=h.color;ctx.beginPath();ctx.ellipse(0,0,r*1.15,r*0.95,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6b4423';ctx.beginPath();ctx.arc(0,0,r*0.55,0,Math.PI*2);ctx.fill();
  } else if(h.id==='helmet'){
    ctx.fillStyle=h.color;ctx.beginPath();ctx.arc(0,0,r*0.82,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(-r*0.09,-r*0.8,r*0.18,r*1.6);
  } else if(h.id==='crown'){
    ctx.fillStyle=h.color;ctx.shadowColor='#ffd700';ctx.shadowBlur=8;ctx.beginPath();
    const pts=5,or_=r*0.85,ir=r*0.45;
    for(let i=0;i<pts*2;i++){const a=(i/(pts*2))*Math.PI*2-Math.PI/2,rr=i%2===0?or_:ir;ctx[i===0?'moveTo':'lineTo'](Math.cos(a)*rr,Math.sin(a)*rr);}
    ctx.closePath();ctx.fill();ctx.shadowBlur=0;
  }
  ctx.restore();
}
// Static character render for menu previews (faces upward)
function drawCharacterPreview(x,y,r,outfit,hat){
  ctx.save();ctx.translate(x,y);ctx.rotate(-Math.PI/2);
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.beginPath();ctx.ellipse(3,6,r*0.85,r*0.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=outfit.body;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=outfit.trim;ctx.beginPath();ctx.arc(0,0,r*0.65,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#555';ctx.fillRect(r*0.5,-r*0.27,r*1.5,r*0.54);ctx.fillStyle='#333';ctx.fillRect(r*1.9,-r*0.2,r*0.6,r*0.4);
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(r*0.33,-r*0.4,r*0.27,0,Math.PI*2);ctx.arc(r*0.33,r*0.4,r*0.27,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a80';ctx.beginPath();ctx.arc(r*0.48,-r*0.4,r*0.13,0,Math.PI*2);ctx.arc(r*0.48,r*0.4,r*0.13,0,Math.PI*2);ctx.fill();
  drawHat(hat,r);
  ctx.restore();
}
let waveActive=false,levelComplete=false,levelTimer=0,levelStartTimer=0;

// UI state
let bigMapOpen=false,buyStationOpen=false,inventoryOpen=false,workshopOpen=false;
let inventoryAnim=0,inventorySelected=0;
let workshopSelectedWeapon='pistol';
let weaponUpgrades={};
let activeTab='weapons';
const SHOP_TABS=['weapons','grenades','deployables','killstreaks','armour','ammo'];

// Upgrade definitions
const UPGRADE_DEFS=[
  {id:'damage',    label:'Damage',    icon:'💥',desc:'+35% damage per tier',   color:'#ff4444',maxLv:3,costs:[500,1000,2000]},
  {id:'fireSpeed', label:'Fire Speed',icon:'⚡',desc:'+30% fire rate per tier', color:'#ffaa00',maxLv:3,costs:[600,1200,2200]},
  {id:'range',     label:'Range',     icon:'🎯',desc:'+40% bullet range/tier', color:'#44aaff',maxLv:3,costs:[400,900,1600]},
  {id:'ammoBoost', label:'Ammo Cap',  icon:'📦',desc:'+50% ammo per purchase', color:'#44ff88',maxLv:3,costs:[300,700,1300]},
];
const UPGR_MULT={pistol:0.5,shotgun:1.0,rifle:1.4,sniper:1.8,machinegun:1.6};

function getWeaponStats(wid){
  const base=WEAPONS[wid],u=weaponUpgrades[wid]||{};
  return{...base,
    dmg:base.dmg*(1+(u.damage||0)*0.35),
    cd: base.cd/(1+(u.fireSpeed||0)*0.30),
    spd:base.spd*(1+(u.range||0)*0.40),
    life:1.6*(1+(u.range||0)*0.40)};
}
function getAmmoBonus(wid,base){
  const u=weaponUpgrades[wid]||{};
  return Math.round(base*(1+(u.ammoBoost||0)*0.5));
}
function resetUpgrades(){
  weaponUpgrades={};
  ALL_WEAPONS.forEach(w=>{weaponUpgrades[w]={damage:0,fireSpeed:0,range:0,ammoBoost:0};});
}

// Notifications
let notifs=[];
function addNotif(text,color='#fff',dur=4){notifs.push({text,color,timer:dur,max:dur});}
function updateNotifs(dt){notifs=notifs.filter(n=>{n.timer-=dt;return n.timer>0;});}
function drawNotifs(){
  notifs.forEach((n,i)=>{
    const a=Math.min(1,n.timer*2)*Math.min(1,(n.max-n.timer)*4+0.1);
    ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(W/2-230,90+i*40,460,32);
    ctx.strokeStyle=n.color;ctx.lineWidth=1;ctx.strokeRect(W/2-230,90+i*40,460,32);
    ctx.fillStyle=n.color;ctx.font='bold 12px Courier New';ctx.textAlign='center';
    ctx.fillText(n.text,W/2,90+i*40+21);ctx.globalAlpha=1;
  });
}

const keys={};
const mouse={x:W/2,y:H/2,down:false};

document.addEventListener('keydown',e=>{
  // Inventory arrow navigation — consume before anything else
  if(inventoryOpen&&(e.key==='ArrowUp'||e.key==='ArrowDown')){
    e.preventDefault();
    if(e.key==='ArrowUp')inventorySelected=Math.max(0,inventorySelected-1);
    if(e.key==='ArrowDown')inventorySelected=Math.min(ALL_WEAPONS.length-1,inventorySelected+1);
    return;
  }
  // Workshop arrow navigation
  if(workshopOpen&&(e.key==='ArrowLeft'||e.key==='ArrowRight')){
    e.preventDefault();
    if(e.key==='ArrowLeft')prevWorkshopWeapon();
    if(e.key==='ArrowRight')nextWorkshopWeapon();
    return;
  }
  keys[e.key]=true;

  if(e.key==='Tab'){e.preventDefault();if(state===STATE.PLAYING){inventoryOpen=!inventoryOpen;if(inventoryOpen){inventorySelected=Math.max(0,ALL_WEAPONS.indexOf(player.weapon));bigMapOpen=false;buyStationOpen=false;workshopOpen=false;}}return;}
  if(e.key==='m'||e.key==='M'){if(state===STATE.PLAYING||state===STATE.PAUSED){bigMapOpen=!bigMapOpen;if(bigMapOpen){inventoryOpen=false;buyStationOpen=false;workshopOpen=false;}}return;}
  if(e.key==='Escape'){
    if(bigMapOpen){bigMapOpen=false;return;}
    if(inventoryOpen){inventoryOpen=false;return;}
    if(buyStationOpen){buyStationOpen=false;return;}
    if(workshopOpen){workshopOpen=false;return;}
    if(state===STATE.PLAYING)state=STATE.PAUSED;
    else if(state===STATE.PAUSED)state=STATE.PLAYING;
    return;
  }
  if(e.key==='Enter'){
    if(inventoryOpen){
      const w=ALL_WEAPONS[inventorySelected];
      if(w&&player.weapons.includes(w))player.weapon=w;
      inventoryOpen=false;return;
    }
    if(workshopOpen){workshopOpen=false;return;}
    if(buyStationOpen){buyStationOpen=false;return;}
    if(state===STATE.PLAYING)handleInteract();
    return;
  }
  if((e.key==='r'||e.key==='R')&&state===STATE.GAME_OVER){restartGame();return;}

  // Workshop number keys
  if(workshopOpen){
    const n=parseInt(e.key);if(n>=1&&n<=4)buyUpgrade(UPGRADE_DEFS[n-1]);
    return;
  }

  if(state===STATE.PLAYING){
    if(e.key==='g'||e.key==='G')throwGrenade();
    if(e.key==='f'||e.key==='F')placeDeployable();
    if(e.key==='c'||e.key==='C')cycleDeployable();
    if(e.key==='e'||e.key==='E')triggerKillstreak();
    if(e.key==='v'||e.key==='V')cycleKillstreak();
    if(e.key==='q'||e.key==='Q'){if(buyStationOpen){const i=SHOP_TABS.indexOf(activeTab);activeTab=SHOP_TABS[(i+1)%SHOP_TABS.length];}else cycleGrenade();}
    if(buyStationOpen){
      if(e.key==='ArrowLeft'){const i=SHOP_TABS.indexOf(activeTab);activeTab=SHOP_TABS[(i-1+SHOP_TABS.length)%SHOP_TABS.length];}
      if(e.key==='ArrowRight'){const i=SHOP_TABS.indexOf(activeTab);activeTab=SHOP_TABS[(i+1)%SHOP_TABS.length];}
      const n=parseInt(e.key);if(n>=1&&n<=9){const items=getTabItems();if(items[n-1])buyItem(items[n-1]);}
    }
  }
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouse.x=(e.clientX-r.left)*(W/r.width);mouse.y=(e.clientY-r.top)*(H/r.height);});
canvas.addEventListener('mousedown',e=>{mouse.down=true;handleClick(e);});
canvas.addEventListener('mouseup',()=>{mouse.down=false;});

function rand(a,b){return Math.random()*(b-a)+a;}
function randInt(a,b){return Math.floor(rand(a,b+1));}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

// ── Particles ──────────────────────────────────────────────────────────────
let particles=[];
function spawnBlood(x,y,n=8,col){for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),s=rand(1.5,6);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(0.4,0.9),maxLife:rand(0.4,0.9),r:rand(2,5),color:col||`hsl(${randInt(0,18)},90%,${randInt(28,48)}%)`});}}
function spawnMuzzle(x,y,angle){for(let i=0;i<6;i++){const a=angle+rand(-0.25,0.25),s=rand(4,10);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.12,maxLife:0.12,r:rand(2,4.5),color:`hsl(${randInt(30,55)},100%,70%)`});}}
function spawnExplosion(x,y,n=20){for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),s=rand(3,12);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(0.5,1.2),maxLife:1.2,r:rand(3,8),color:`hsl(${randInt(10,45)},100%,${randInt(50,75)}%)`});}}
function updateParticles(dt){particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.9;p.vy*=0.9;p.life-=dt;return p.life>0;});}
function drawParticles(cx,cy){particles.forEach(p=>{ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x-cx,p.y-cy,p.r*(p.life/p.maxLife),0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}

// ── Screen shake ───────────────────────────────────────────────────────────
let shk={x:0,y:0,i:0,d:0};
function addShake(i,d){shk.i=Math.max(shk.i,i);shk.d=Math.max(shk.d,d);}
function updateShake(dt){if(shk.d>0){shk.d-=dt;shk.x=(Math.random()-.5)*shk.i;shk.y=(Math.random()-.5)*shk.i;shk.i*=0.88;}else{shk.x=shk.y=shk.i=0;}}

// ── World ──────────────────────────────────────────────────────────────────
const TILE=64,MAP_W=32,MAP_H=32;
let worldMap=[],mapCfg=null;
function generateMap(cfg){
  mapCfg=cfg;
  worldMap=Array.from({length:MAP_H},(_,y)=>Array.from({length:MAP_W},(_,x)=>(x===0||y===0||x===MAP_W-1||y===MAP_H-1)?1:0));
  const presets={
    city:[[4,4,6,2],[12,2,5,3],[20,5,5,2],[2,10,3,7],[9,14,2,4],[16,10,7,3],[24,12,4,5],[5,20,8,3],[18,20,5,4],[26,22,3,5],[11,26,8,2]],
    bunker:[[2,5,9,2],[15,5,9,2],[25,5,4,9],[2,12,4,9],[11,12,7,2],[21,15,4,7],[5,23,11,2],[19,23,9,2],[2,27,7,2]],
    wasteland:[[3,3,2,2],[9,6,3,2],[17,4,2,3],[23,3,4,2],[5,13,2,4],[13,12,3,3],[21,10,2,5],[27,14,2,3],[3,21,3,3],[11,23,5,2],[19,21,3,4],[26,21,3,3]],
    arctic:[[5,5,3,3],[12,3,6,2],[21,6,4,3],[3,12,2,6],[10,11,5,5],[19,13,3,6],[26,13,3,5],[5,22,5,3],[14,21,4,5],[22,23,5,3]],
    graveyard:null
  };
  if(cfg.id==='graveyard'){for(let gy=2;gy<MAP_H-2;gy+=4)for(let gx=2;gx<MAP_W-2;gx+=4)if(Math.random()>0.3){worldMap[gy][gx]=1;if(Math.random()>0.5)worldMap[gy][gx+1]=1;}}
  else{(presets[cfg.id]||[]).forEach(([x,y,w,h])=>{for(let dy=0;dy<h;dy++)for(let dx=0;dx<w;dx++)if(y+dy<MAP_H&&x+dx<MAP_W)worldMap[y+dy][x+dx]=1;});}
  setupMapObjects();
  generateDebris();
}
function isWall(wx,wy){const tx=Math.floor(wx/TILE),ty=Math.floor(wy/TILE);return tx<0||ty<0||tx>=MAP_W||ty>=MAP_H||worldMap[ty][tx]===1;}

// ── Debris / ruins (atmospheric ground clutter) ──────────────────────────────
let debris=[];
const DEBRIS_PAL={
  city:     ['#2c2c2c','#383838','#1a1a1a','#444'],
  bunker:   ['#16242e','#1e3340','#0c161e','#2a3f50'],
  wasteland:['#3a2a18','#4a3420','#241608','#5a4028'],
  graveyard:['#1a1f16','#252b1c','#10140d','#2f3722'],
  arctic:   ['#243843','#2e4756','#16242e','#3a5a6e'],
};
function generateDebris(){
  debris=[];
  for(let i=0;i<170;i++){
    const tx=randInt(1,MAP_W-2),ty=randInt(1,MAP_H-2);
    if(worldMap[ty][tx]===1)continue;
    const x=tx*TILE+rand(8,TILE-8),y=ty*TILE+rand(8,TILE-8);
    const k=randInt(0,3),pts=[];
    for(let j=0;j<4;j++)pts.push([rand(-8,8),rand(-8,8),rand(1,2.8)]);
    debris.push({x,y,k,rot:rand(0,Math.PI*2),s:rand(0.6,1.5),pts});
  }
}
function drawDebris(camX,camY){
  const pal=DEBRIS_PAL[mapCfg.id]||DEBRIS_PAL.city;
  for(const d of debris){
    const sx=d.x-camX,sy=d.y-camY;
    if(sx<-30||sx>W+30||sy<-30||sy>H+30)continue;
    ctx.save();ctx.translate(sx,sy);ctx.rotate(d.rot);ctx.scale(d.s,d.s);
    ctx.fillStyle=pal[d.k%pal.length];
    if(d.k===0){ // rubble chunk
      ctx.beginPath();ctx.moveTo(-8,-5);ctx.lineTo(6,-7);ctx.lineTo(9,4);ctx.lineTo(-3,8);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(-8,-5,14,2);
    } else if(d.k===1){ // crack line
      ctx.strokeStyle=pal[2];ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-11,1);ctx.lineTo(-3,-3);ctx.lineTo(4,2);ctx.lineTo(12,-2);ctx.stroke();
    } else if(d.k===2){ // scatter of small bits
      for(const[ox,oy,r] of d.pts){ctx.beginPath();ctx.arc(ox,oy,r,0,Math.PI*2);ctx.fill();}
    } else { // larger flat slab with shadow
      ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(-9,-6,20,14);
      ctx.fillStyle=pal[1];ctx.fillRect(-9,-7,18,12);
    }
    ctx.restore();
  }
}
function drawWorld(camX,camY){
  const sx0=Math.max(0,Math.floor(camX/TILE)),sy0=Math.max(0,Math.floor(camY/TILE));
  const sx1=Math.min(MAP_W,sx0+Math.ceil(W/TILE)+2),sy1=Math.min(MAP_H,sy0+Math.ceil(H/TILE)+2);
  for(let ty=sy0;ty<sy1;ty++)for(let tx=sx0;tx<sx1;tx++){
    const sx=tx*TILE-camX,sy=ty*TILE-camY;

// ── Safe spawn ─────────────────────────────────────────────────────────────
function findSafeSpawn(){
  const cx=Math.floor(MAP_W/2)*TILE+TILE/2,cy=Math.floor(MAP_H/2)*TILE+TILE/2;
  const clear=(x,y)=>!isWall(x,y)&&!isWall(x+16,y)&&!isWall(x-16,y)&&!isWall(x,y+16)&&!isWall(x,y-16);
  if(clear(cx,cy))return{x:cx,y:cy};
  for(let attempt=0;attempt<500;attempt++){
    const x=randInt(3,MAP_W-4)*TILE+TILE/2,y=randInt(3,MAP_H-4)*TILE+TILE/2;
    if(clear(x,y))return{x,y};
  }
  return{x:cx,y:cy};
}

let bullets=[],lastShot=0;
function shoot(){
  if(player.lastStand&&player.weapon!=='pistol')return;
  const uiOpen=inventoryOpen||buyStationOpen||bigMapOpen||workshopOpen;
  if(uiOpen)return;
  const now=performance.now()/1000;
  const w=getWeaponStats(player.weapon);
  const cd=w.cd/(perks.doubleTap?2:1);
  if(now-lastShot<cd)return;
  if(w.melee){lastShot=now;meleeAttack(w);return;}
  if(player.ammo[player.weapon]<=0)return;
  lastShot=now;
  if(player.weapon!=='pistol')player.ammo[player.weapon]--;
  for(let i=0;i<w.pellets;i++){const a=player.angle+rand(-w.spread,w.spread);bullets.push({x:player.x,y:player.y,vx:Math.cos(a)*w.spd,vy:Math.sin(a)*w.spd,dmg:w.dmg,life:w.life||1.6,color:w.color,fromPlayer:true,explosive:w.explosive,blast:w.blast,br:w.br});}
  spawnMuzzle(player.x+Math.cos(player.angle)*22,player.y+Math.sin(player.angle)*22,player.angle);
  addShake(3.5,0.1);
}
function meleeAttack(w){
  const range=w.range||50,arc=w.arc||0.8;let hit=false;
  for(const e of enemies){if(!e.alive)continue;
    if(dist(player,e)>range+e.r)continue;
    const ang=Math.atan2(e.y-player.y,e.x-player.x);
    const diff=Math.abs(((ang-player.angle+Math.PI)%(Math.PI*2)+Math.PI*2)%(Math.PI*2)-Math.PI);
    if(diff>arc)continue;
    hit=true;
    if(e.type==='boss'){e.hp-=w.dmg;spawnBlood(e.x,e.y,8);if(e.hp<=0)killEnemy(e);}
    else{spawnBlood(e.x,e.y,12);killEnemy(e);}
  }
  // slash arc effect
  for(let i=0;i<7;i++){const a=player.angle+rand(-arc,arc),s=rand(3,7);particles.push({x:player.x+Math.cos(a)*range*0.6,y:player.y+Math.sin(a)*range*0.6,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.18,maxLife:0.18,r:rand(2,4),color:'#e8e8f0'});}
  addShake(hit?4:1.5,0.08);
}

// ── Grenades ───────────────────────────────────────────────────────────────
let grenadeObjects=[],firePatches=[];
function throwGrenade(){
  if(player.lastStand)return;
  const t=player.selectedGrenade;
  if(player.grenades[t]<=0){
    const types=['frag','molotov','flashbang'];
    const next=types.find(tp=>player.grenades[tp]>0);
    if(!next){addNotif('No grenades! Buy from 🧺 Shop — [Enter] near it','#ff4444',3);return;}
    player.selectedGrenade=next;
  }
  player.grenades[player.selectedGrenade]--;
  grenadeObjects.push({x:player.x,y:player.y,vx:Math.cos(player.angle)*300,vy:Math.sin(player.angle)*300,type:player.selectedGrenade,timer:player.selectedGrenade==='flashbang'?0.6:2.0,exploded:false});
}
function updateGrenades(dt){
  grenadeObjects=grenadeObjects.filter(g=>{g.x+=g.vx*dt;g.y+=g.vy*dt;g.vx*=0.9;g.vy*=0.9;if(isWall(g.x,g.y)){g.vx*=-0.5;g.vy*=-0.5;}g.timer-=dt;if(g.timer<=0&&!g.exploded){g.exploded=true;explodeGrenade(g);return false;}return !g.exploded;});
  firePatches=firePatches.filter(f=>{f.timer-=dt;enemies.forEach(e=>{if(!e.alive)return;if(Math.hypot(e.x-f.x,e.y-f.y)<f.radius+e.r){e.hp-=20*dt;if(e.hp<=0)killEnemy(e);}});return f.timer>0;});
}
function explodeAt(x,y,radius,dmg,shake){
  spawnExplosion(x,y,Math.max(12,Math.round(radius/5)));addShake(shake||10,0.35);
  enemies.forEach(e=>{if(!e.alive)return;const d=Math.hypot(e.x-x,e.y-y);if(d<radius+e.r){e.hp-=dmg*(1-d/(radius+e.r));if(e.hp<=0)killEnemy(e);}});
}
function explodeGrenade(g){
  if(g.type==='frag'){explodeAt(g.x,g.y,120,150);}
  else if(g.type==='molotov'){spawnExplosion(g.x,g.y,10);firePatches.push({x:g.x,y:g.y,radius:70,timer:5});}
  else if(g.type==='flashbang'){spawnExplosion(g.x,g.y,8);enemies.forEach(e=>{if(!e.alive)return;if(Math.hypot(e.x-g.x,e.y-g.y)<200)e.stunned=3.0;});}
}
function drawGrenades(camX,camY){
  grenadeObjects.forEach(g=>{const sx=g.x-camX,sy=g.y-camY;ctx.fillStyle=g.type==='frag'?'#aaa':g.type==='molotov'?'#cc4400':'#aaaaff';ctx.beginPath();ctx.arc(sx,sy,5,0,Math.PI*2);ctx.fill();});
  firePatches.forEach(f=>{const sx=f.x-camX,sy=f.y-camY;for(let i=0;i<4;i++){ctx.globalAlpha=Math.min(1,f.timer/2)*0.5;ctx.fillStyle=`hsl(${randInt(10,40)},100%,55%)`;ctx.beginPath();ctx.arc(sx+rand(-f.radius*.5,f.radius*.5),sy+rand(-f.radius*.5,f.radius*.5),rand(8,20),0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;});
}

let deployables=[];
const DEPLOY_DEF={
  mine:    {arm:1.0,radius:95, dmg:220},
  claymore:{arm:1.0,range:175,arc:0.95,dmg:300},
  sentry:  {arm:0.4,hp:320,maxHp:320,range:340,fireCd:0,fireRate:0.16,dmg:32,bulletSpd:780},
};
const SENTRY_CAP=3;
function cycleDeployable(){
  const order=['mine','claymore','sentry'];
  const owned=order.filter(t=>player.deployables[t]>0);
  if(owned.length===0)return;
  const i=owned.indexOf(player.selectedDeployable);
  player.selectedDeployable=owned[(i+1)%owned.length];
}
function placeDeployable(){
  if(player.lastStand)return;
  let t=player.selectedDeployable;
  if(!player.deployables[t]||player.deployables[t]<=0){
    const next=['mine','claymore','sentry'].find(tp=>player.deployables[tp]>0);
    if(!next){addNotif('No deployables! Buy from 🧺 Shop','#ff4444',2.5);return;}
    t=player.selectedDeployable=next;
  }
  if(isWall(player.x,player.y)){addNotif('Cannot place here','#ff8800',1.5);return;}
  if(t==='sentry'&&deployables.filter(d=>d.type==='sentry').length>=SENTRY_CAP){addNotif(`Max ${SENTRY_CAP} sentries deployed`,'#ff8800',2);return;}
  player.deployables[t]--;
  const def=DEPLOY_DEF[t];
  deployables.push({type:t,x:player.x,y:player.y,angle:player.angle,arm:def.arm,...def});
  addNotif(`${t.toUpperCase()} placed`,'#ffaa00',1.5);
}
function updateDeployables(dt){
  deployables=deployables.filter(d=>{
    if(d.arm>0){d.arm-=dt;return true;}
    if(d.type==='mine'){
      for(const e of enemies){if(e.alive&&Math.hypot(e.x-d.x,e.y-d.y)<d.radius+e.r){explodeAt(d.x,d.y,d.radius,d.dmg,12);return false;}}
    } else if(d.type==='claymore'){
      for(const e of enemies){if(!e.alive)continue;const dd=Math.hypot(e.x-d.x,e.y-d.y);if(dd>d.range+e.r)continue;
        const ang=Math.atan2(e.y-d.y,e.x-d.x);const diff=Math.abs(((ang-d.angle+Math.PI)%(Math.PI*2)+Math.PI*2)%(Math.PI*2)-Math.PI);
        if(diff<d.arc){explodeAt(d.x+Math.cos(d.angle)*d.range*0.4,d.y+Math.sin(d.angle)*d.range*0.4,d.range*0.6,d.dmg,14);return false;}}
    } else if(d.type==='sentry'){
      return updateSentry(d,dt);
    }
    return true;
  });
}
function updateSentry(d,dt){
  d.fireCd-=dt;
  // zombies in melee range attack the sentry
  for(const e of enemies){if(!e.alive)continue;if(Math.hypot(e.x-d.x,e.y-d.y)<20+e.r&&e.atkCd<=0){d.hp-=e.dmg;e.atkCd=e.atkRate;spawnBlood(d.x,d.y,4,'#ffaa00');}}
  if(d.hp<=0){explodeAt(d.x,d.y,75,50,9);addNotif('Sentry destroyed','#ff6600',2);return false;}
  // target nearest live enemy in range and fire
  let tgt=null,best=d.range;
  for(const e of enemies){if(!e.alive)continue;const dd=Math.hypot(e.x-d.x,e.y-d.y);if(dd<best){best=dd;tgt=e;}}
  if(tgt){
    d.angle=Math.atan2(tgt.y-d.y,tgt.x-d.x);
    if(d.fireCd<=0){
      d.fireCd=d.fireRate;
      const a=d.angle+rand(-0.04,0.04);
      bullets.push({x:d.x+Math.cos(d.angle)*16,y:d.y+Math.sin(d.angle)*16,vx:Math.cos(a)*d.bulletSpd,vy:Math.sin(a)*d.bulletSpd,dmg:d.dmg,life:1.4,color:'#ffdd66',fromPlayer:true});
      spawnMuzzle(d.x+Math.cos(d.angle)*18,d.y+Math.sin(d.angle)*18,d.angle);
    }
  }
  return true;
}
function drawDeployables(camX,camY){
  const t=performance.now();
  deployables.forEach(d=>{const sx=d.x-camX,sy=d.y-camY,armed=d.arm<=0,blink=Math.sin(t/(armed?160:420))>0;
    if(d.type==='mine'){
      ctx.fillStyle=armed?'#7a2a2a':'#444';ctx.beginPath();ctx.arc(sx,sy,7,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#222';ctx.lineWidth=1;ctx.stroke();
      if(blink){ctx.fillStyle='#ff3300';ctx.beginPath();ctx.arc(sx,sy,2.5,0,Math.PI*2);ctx.fill();}
    } else if(d.type==='claymore'){
      ctx.save();ctx.translate(sx,sy);ctx.rotate(d.angle);
      ctx.fillStyle=armed?'#2f6b32':'#444';ctx.fillRect(-3,-9,6,18);
      ctx.fillStyle='#1b4d1f';ctx.fillRect(1,-9,3,18);
      ctx.restore();
      if(blink){ctx.fillStyle='#ff3300';ctx.beginPath();ctx.arc(sx,sy,2,0,Math.PI*2);ctx.fill();}
    } else if(d.type==='sentry'){
      ctx.save();ctx.translate(sx,sy);
      ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=armed?'#ffaa00':'#666';ctx.lineWidth=2;ctx.stroke();
      ctx.rotate(d.angle);ctx.fillStyle='#999';ctx.fillRect(0,-3,22,6);ctx.fillStyle='#555';ctx.fillRect(18,-4,4,8);
      ctx.restore();
      const ratio=Math.max(0,d.hp/d.maxHp);
      ctx.fillStyle='#300';ctx.fillRect(sx-16,sy-21,32,4);
      ctx.fillStyle=ratio>0.4?'#ffaa00':'#ff4400';ctx.fillRect(sx-16,sy-21,32*ratio,4);
    }
  });
}

// ── Killstreaks (nuke / airstrike / mortar) ──────────────────────────────────
let airBombs=[],airstrikePending=false;
let flashUntil=0,flashDur=0,flashColor='255,255,255';
function triggerFlash(rgb,dur){flashColor=rgb;flashDur=dur;flashUntil=performance.now()/1000+dur;}
function drawScreenFlash(){const now=performance.now()/1000;if(now<flashUntil){const a=(flashUntil-now)/flashDur;ctx.fillStyle=`rgba(${flashColor},${a*0.85})`;ctx.fillRect(0,0,W,H);}}
function cycleKillstreak(){
  const owned=KILLSTREAKS_DEF.map(k=>k.id).filter(t=>player.killstreaks[t]>0);
  if(!owned.length)return;
  const i=owned.indexOf(player.selectedKillstreak);
  player.selectedKillstreak=owned[(i+1)%owned.length];
}
function triggerKillstreak(){
  if(player.lastStand)return;
  let id=player.selectedKillstreak;
  if(!player.killstreaks[id]||player.killstreaks[id]<=0){
    const next=KILLSTREAKS_DEF.map(k=>k.id).find(t=>player.killstreaks[t]>0);
    if(!next){addNotif('No killstreaks! Buy from 🧺 Shop','#ff4444',2.5);return;}
    id=player.selectedKillstreak=next;
  }
  if(id==='airstrike'){airstrikePending=true;addNotif('🛩 Airstrike armed — click a target location','#ff8800',4);return;}
  player.killstreaks[id]--;
  if(id==='nuke'){triggerFlash('255,255,255',0.7);addShake(26,0.8);enemies.forEach(e=>{if(e.alive)killEnemy(e);});addNotif('☢ NUKE — area cleared!','#ffffff',3.5);}
  else if(id==='mortar')callMortar();
}
function callAirstrike(wx,wy){
  if((player.killstreaks.airstrike||0)<=0)return;
  player.killstreaks.airstrike--;
  const dir=rand(0,Math.PI*2),n=10,spacing=72;
  for(let i=0;i<n;i++){const off=(i-n/2)*spacing;airBombs.push({x:wx+Math.cos(dir)*off,y:wy+Math.sin(dir)*off,delay:0.8+i*0.11});}
  addNotif('🛩 Airstrike inbound!','#ff8800',3);
}
function callMortar(){
  for(let i=0;i<16;i++){airBombs.push({x:rand(TILE*2,(MAP_W-2)*TILE),y:rand(TILE*2,(MAP_H-2)*TILE),delay:0.3+i*0.17});}
  addNotif('💥 Mortar barrage incoming!','#ffaa33',3);
}
function updateAirBombs(dt){
  airBombs=airBombs.filter(b=>{b.delay-=dt;if(b.delay<=0){explodeAt(b.x,b.y,110,180,9);addShake(7,0.2);return false;}return true;});
}
function drawAirBombs(camX,camY){
  airBombs.forEach(b=>{const sx=b.x-camX,sy=b.y-camY,p=1-Math.min(1,b.delay/1.5);
    ctx.strokeStyle='rgba(255,90,0,0.55)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,120,0,0.22)';ctx.beginPath();ctx.arc(sx,sy,14*p,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,140,0,0.6)';ctx.beginPath();ctx.moveTo(sx-18,sy);ctx.lineTo(sx+18,sy);ctx.moveTo(sx,sy-18);ctx.lineTo(sx,sy+18);ctx.stroke();
  });
}

// ── Interact ───────────────────────────────────────────────────────────────
function handleInteract(){
  if(player.lastStand)return;
  if(lightsSwitch&&!lightsOn&&dist(player,lightsSwitch)<60){activateLights();return;}
  if(workshopPos&&dist(player,workshopPos)<70){workshopOpen=true;if(!player.weapons.includes(workshopSelectedWeapon))workshopSelectedWeapon=player.weapon;inventoryOpen=false;bigMapOpen=false;buyStationOpen=false;return;}
  if(buyStationPos&&dist(player,buyStationPos)<70){buyStationOpen=true;inventoryOpen=false;bigMapOpen=false;workshopOpen=false;return;}
  for(const pm of perkMachines){if(!pm.bought&&dist(player,pm)<55){if(currency>=pm.cost){currency-=pm.cost;pm.bought=true;applyPerk(pm.id);}else addNotif(`Need £${pm.cost-currency} more for ${pm.name}`,'#ff8800',2);return;}}
  for(const b of barricades){if(Math.hypot(player.x-b.x,player.y-b.y)<60&&b.hp<b.maxHp){if(currency>=100){currency-=100;b.hp=Math.min(b.maxHp,b.hp+50);addNotif('Barricade repaired!','#8b4513',2);}else addNotif('Need £100 to repair barricade','#ff8800',2);return;}}
}
function activateLights(){
  lightsOn=true;player.flashLen=9999;player.flashAngle=Math.PI;
  enemies.forEach(e=>{if(e.alive){e.hp-=50;if(e.hp<=0)killEnemy(e);}});
  spawnExplosion(lightsSwitch.x,lightsSwitch.y,20);addShake(14,0.4);
  addNotif('⚡ LIGHTS ON — Power surge hit all enemies!','#ffdd00',4);
  addNotif('🧺 Buy station unlocked — [Enter] near it to shop','#2ecc71',4);
}
function applyPerk(id){
  perks[id]=true;
  if(id==='juggernog'){player.maxHp*=2;player.hp=Math.min(player.hp*2,player.maxHp);}
  if(id==='speed')player.speed=Math.round(player.speed*1.3);
  const pd=PERKS_DEF.find(p=>p.id===id);
  if(pd)addNotif(`${pd.symbol} ${pd.name} active — ${pd.desc}`,pd.color,3);
}

// ── Damage / Last Stand ────────────────────────────────────────────────────
function takeDamage(dmg){
  if(player.invincible>0)return;
  if(player.armourHp>0){const abs=Math.min(player.armourHp,dmg*0.7);player.armourHp-=abs;dmg-=abs;}
  player.hp-=dmg;
  if(player.hp<=0&&!player.lastStand){
    if(perks.quickRevive&&!quickReviveUsed){quickReviveUsed=true;player.hp=30;player.invincible=1.5;addNotif('❤️ Quick Revive — back in action!','#00aaff',3);}
    else enterLastStand();
  }
}
function enterLastStand(){
  player.lastStand=true;player.lastStandTimer=10;player.hp=1;player.weapon='pistol';
  addShake(15,0.5);addNotif('YOU ARE DOWN — 10 seconds to survive! Pistol only','#e63946',4);
}

function updateBarricades(dt){

  barricades=barricades.filter(b=>b.hp>0);

// ── Enemies ────────────────────────────────────────────────────────────────
let enemies=[];
const ET={
  walker: {hp:60,  spd:52,  dmg:10,r:16,color:'#2f6a1f',val:100, atkRate:1.2},
  runner: {hp:30,  spd:115, dmg:7, r:11,color:'#3a9a2a',val:200, atkRate:0.85},
  brute:  {hp:220, spd:32,  dmg:28,r:28,color:'#143a0a',val:500, atkRate:1.8},
  spitter:{hp:45,  spd:42,  dmg:15,r:13,color:'#5a1a5a',val:350, atkRate:2.0},
  gunner: {hp:70,  spd:60,  dmg:14,r:14,color:'#2f6a1f',val:400, atkRate:1.6,ranged:true},
  boss:   {hp:900, spd:52,  dmg:32,r:42,color:'#0d0000',val:6000,atkRate:1.4},
};
function isBossLevel(){return globalLevel%5===0;}
function diffMult(){return 1+(globalLevel-1)*0.18;}
function getLevelConfig(){
  if(isBossLevel())return[{t:'boss',n:1},{t:'walker',n:globalLevel+3}];
  const lvl=globalLevel;
  const config=[{t:'walker',n:clamp(2+lvl*2,4,30)}];
  if(lvl>=4)config.push({t:'runner',n:clamp(Math.floor(lvl/3),1,10)});
  if(lvl>=8)config.push({t:'brute',n:clamp(Math.floor(lvl/7),1,5)});
  if(lvl>=6)config.push({t:'spitter',n:clamp(Math.floor(lvl/5),1,6)});
  if(lvl>=6)config.push({t:'gunner',n:clamp(Math.floor(lvl/6),1,6)});
  return config;
}
function startWave(){
  enemies=[];waveActive=true;
  getLevelConfig().forEach(({t,n})=>{for(let i=0;i<n;i++)spawnEnemy(t);});
  if(isBossLevel())addNotif(`⚠ BOSS WAVE — Level ${globalLevel}!`,'#ff3300',4);
  else addNotif(`Level ${globalLevel} — ${enemies.length} enemies`,'#e63946',2);
}
function spawnEnemy(type){
  const tmpl=ET[type];
  let ex,ey,tries=0;
  do{const s=randInt(0,3);if(s===0){ex=rand(TILE*2,(MAP_W-2)*TILE);ey=TILE*2;}else if(s===1){ex=(MAP_W-2)*TILE;ey=rand(TILE*2,(MAP_H-2)*TILE);}else if(s===2){ex=rand(TILE*2,(MAP_W-2)*TILE);ey=(MAP_H-2)*TILE;}else{ex=TILE*2;ey=rand(TILE*2,(MAP_H-2)*TILE);}tries++;}while(isWall(ex,ey)&&tries<20);
  const mult=diffMult();
  let hp=tmpl.hp*mult,r=tmpl.r;
  if(type==='boss'){const g=Math.min(Math.ceil(globalLevel/5)-1,3);hp=[900,1800,3200,5500][g];r=[42,54,66,82][g];}
  enemies.push({x:ex,y:ey,type,hp,maxHp:hp,spd:tmpl.spd*(1+(globalLevel-1)*0.03),dmg:tmpl.dmg*(1+(globalLevel-1)*0.08),r,color:tmpl.color,val:tmpl.val,atkCd:0,atkRate:tmpl.atkRate,angle:0,wobble:rand(0,Math.PI*2),alive:true,stunned:0});
}
function killEnemy(e){
  if(!e.alive)return;
  e.alive=false;score+=e.val;currency+=80+Math.floor(e.val/100)*20;
  // Persistent progression: coins + all-time kills
  sessionKills++;
  sessionCoins+=e.type==='boss'?100:(1+Math.floor(e.val/100));
  spawnBlood(e.x,e.y,14);addShake(4.5,0.15);
  // Random loot drop (drop rate itself is randomised per kill)
  if(e.type!=='boss'&&Math.random()<rand(0.10,0.25))dropRandomLoot(e.x,e.y);
  if(e.type==='gunner')dropAmmoPickup(e.x,e.y);
  // Boss rewards: a machine gun, plus a big cash drop on levels 5/10/15
  if(e.type==='boss'){
    spawnExplosion(e.x,e.y,30);addShake(12,0.5);
    if(!player.weapons.includes('machinegun'))spawnPickup('machinegun',e.x,e.y);
    const cash={5:2000,10:4000,15:8000}[globalLevel];
    if(cash)spawnPickup('cash',e.x+44,e.y,cash);
  }
}
function updateEnemies(dt){
  enemies.forEach(e=>{
    if(!e.alive)return;e.wobble+=dt*3.5;
    if(e.stunned>0){e.stunned-=dt;return;}
    const dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy);
    let mx=dx/d,my=dy/d;
    if(isWall(e.x+mx*40,e.y))mx=0;if(isWall(e.x,e.y+my*40))my=0;
    if(mx===0&&my===0){mx=dy/d;my=-dx/d;}
    const nx=e.x+mx*e.spd*dt,ny=e.y+my*e.spd*dt;
    if(!isWall(nx,e.y))e.x=nx;if(!isWall(e.x,ny))e.y=ny;
    e.angle=Math.atan2(dy,dx);e.atkCd-=dt;
    if(d<player.radius+e.r+5&&e.atkCd<=0){if(player.invincible<=0){takeDamage(e.dmg);player.invincible=0.5;addShake(8,0.28);}e.atkCd=e.atkRate;}
    if(e.type==='spitter'&&d>90&&d<320&&e.atkCd<=0){const a=Math.atan2(player.y-e.y,player.x-e.x);bullets.push({x:e.x,y:e.y,vx:Math.cos(a)*200,vy:Math.sin(a)*200,dmg:e.dmg,life:2.2,color:'#cc00ff',fromPlayer:false,br:7});e.atkCd=e.atkRate;}
    if(e.ranged&&d>70&&d<430&&e.atkCd<=0){const a=Math.atan2(player.y-e.y,player.x-e.x)+rand(-0.05,0.05);bullets.push({x:e.x,y:e.y,vx:Math.cos(a)*430,vy:Math.sin(a)*430,dmg:e.dmg,life:1.6,color:'#ffdd66',fromPlayer:false,br:4});spawnMuzzle(e.x+Math.cos(a)*16,e.y+Math.sin(a)*16,a);e.atkCd=e.atkRate;}
  });
  enemies=enemies.filter(e=>e.alive);
}

// ── Player update ──────────────────────────────────────────────────────────
function updatePlayer(dt){
  if(player.lastStand){player.lastStandTimer-=dt;if(player.lastStandTimer<=0){gameOver();return;}player.weapon='pistol';}
  const uiOpen=inventoryOpen||buyStationOpen||bigMapOpen||workshopOpen;
  let dx=0,dy=0;
  if(!uiOpen){
    if(keys['w']||keys['W']||keys['ArrowUp'])dy-=1;
    if(keys['s']||keys['S']||keys['ArrowDown'])dy+=1;
    if(keys['a']||keys['A']||keys['ArrowLeft'])dx-=1;
    if(keys['d']||keys['D']||keys['ArrowRight'])dx+=1;
  }
  const len=Math.hypot(dx,dy);if(len>0){dx/=len;dy/=len;}
  const spd=player.lastStand?80:player.speed;
  const nx=player.x+dx*spd*dt,ny=player.y+dy*spd*dt,r=player.radius-2;
  if(!isWall(nx+r,player.y)&&!isWall(nx-r,player.y)&&!isWall(nx,player.y+r)&&!isWall(nx,player.y-r))player.x=nx;
  if(!isWall(player.x+r,ny)&&!isWall(player.x-r,ny)&&!isWall(player.x,ny+r)&&!isWall(player.x,ny-r))player.y=ny;
  const camX=player.x-W/2,camY=player.y-H/2;
  player.angle=Math.atan2(mouse.y+camY-player.y,mouse.x+camX-player.x);
  if((mouse.down||keys[' '])&&!uiOpen&&!airstrikePending)shoot();
  if(player.invincible>0)player.invincible-=dt;
  if(!player.lastStand&&!uiOpen){
    for(let wi=0;wi<ALL_WEAPONS.length;wi++){if(keys[String(wi+1)]&&player.weapons.includes(ALL_WEAPONS[wi]))player.weapon=ALL_WEAPONS[wi];}
  }
}
function drawPlayer(camX,camY){
  const sx=player.x-camX,sy=player.y-camY;
  ctx.save();ctx.translate(sx,sy);ctx.rotate(player.angle);
  const flash=player.invincible>0&&Math.floor(player.invincible*12)%2===0,ls=player.lastStand;
  const ot=getOutfit();
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.beginPath();ctx.ellipse(3,6,13,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=flash?'#fff':(ls?'#662200':ot.body);ctx.beginPath();ctx.arc(0,0,player.radius*(ls?0.8:1),0,Math.PI*2);ctx.fill();
  ctx.fillStyle=flash?'#ccc':(ls?'#441100':ot.trim);ctx.beginPath();ctx.arc(0,0,player.radius*(ls?0.5:0.65),0,Math.PI*2);ctx.fill();
  if(!ls){ctx.fillStyle='#555';ctx.fillRect(8,-4,22,8);ctx.fillStyle='#333';ctx.fillRect(22,-3,10,6);}
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(5,-6,4,0,Math.PI*2);ctx.arc(5,6,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=ls?'#ff0000':'#1a1a80';ctx.beginPath();ctx.arc(7,-6,2,0,Math.PI*2);ctx.arc(7,6,2,0,Math.PI*2);ctx.fill();
  if(!ls)drawHat(getHat(),player.radius);
  if(player.armourHp>0){ctx.strokeStyle=`rgba(80,140,255,${player.armourHp/player.maxArmourHp*0.7})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,player.radius+4,0,Math.PI*2);ctx.stroke();}
  ctx.restore();
}

// ── Bullets ────────────────────────────────────────────────────────────────
function updateBullets(dt){
  bullets=bullets.filter(b=>{
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||isWall(b.x,b.y)){if(b.explosive)explodeAt(b.x,b.y,b.blast,b.dmg);else if(isWall(b.x,b.y))spawnBlood(b.x,b.y,3,'#888');return false;}
    if(b.fromPlayer){for(const e of enemies){if(!e.alive)continue;if(dist(b,e)<e.r+(b.br||4)){if(b.explosive){explodeAt(b.x,b.y,b.blast,b.dmg);}else{spawnBlood(b.x,b.y,6);e.hp-=b.dmg;if(e.hp<=0)killEnemy(e);}return false;}}}
    else{if(dist(b,player)<player.radius+(b.br||4)){if(player.invincible<=0){takeDamage(b.dmg);player.invincible=0.3;addShake(6,0.2);}spawnBlood(b.x,b.y,4,'#880088');return false;}}
    return true;
  });
}
function drawBullets(camX,camY){

// ── Pickups ────────────────────────────────────────────────────────────────
let pickups=[];
function spawnPickup(type,x,y,amount,extra){
  let px=x,py=y;if(isWall(px,py)){px=player.x+rand(-80,80);py=player.y+rand(-80,80);}
  // Boss loot (gun/cash) sticks around far longer than a health drop
  const life=(type==='machinegun'||type==='cash')?90:20;
  pickups.push({x:px,y:py,type,amount:amount||0,life,pulse:0,...(extra||{})});
}
function dropAmmoPickup(x,y){
  const pool=player.weapons.filter(w=>!WEAPONS[w].melee&&w!=='pistol');
  if(pool.length){const w=pool[randInt(0,pool.length-1)];const amt={shotgun:12,rifle:24,sniper:8,machinegun:50,rocket:2}[w]||12;spawnPickup('ammo',x,y,amt,{weapon:w});}
  else spawnPickup('cash',x,y,60);
}
function dropRandomLoot(x,y){
  const r=Math.random();
  if(r<0.30)spawnPickup('health',x,y);
  else if(r<0.50)spawnPickup('armour',x,y,Math.round(rand(20,40)));
  else if(r<0.75)dropAmmoPickup(x,y);
  else if(r<0.90)spawnPickup('grenade',x,y,1,{gtype:['frag','molotov','flashbang'][randInt(0,2)]});
  else spawnPickup('cash',x,y,100);
}
function updatePickups(dt){pickups=pickups.filter(p=>{
  p.life-=dt;p.pulse+=dt*3.5;
  if(dist(p,player)<player.radius+20){
    if(p.type==='health'){player.hp=Math.min(player.maxHp,player.hp+40);spawnBlood(p.x,p.y,6,'#22cc55');addNotif('+40 HP','#2ecc71',1.5);}
    else if(p.type==='cash'){currency+=p.amount;spawnExplosion(p.x,p.y,12);addShake(6,0.2);addNotif(`💰 +£${p.amount} cash drop!`,'#ffd700',3);}
    else if(p.type==='armour'){player.armourHp=Math.min(player.armourHp+p.amount,200);player.maxArmourHp=Math.max(player.maxArmourHp,player.armourHp);addNotif(`🛡 +${p.amount} armour`,'#4488ff',1.8);}
    else if(p.type==='ammo'){if(player.weapons.includes(p.weapon)){const n=getAmmoBonus(p.weapon,p.amount);player.ammo[p.weapon]=(player.ammo[p.weapon]||0)+n;addNotif(`+${n} ${p.weapon} ammo`,'#ffcc44',1.8);}else{currency+=40;addNotif('💰 +£40','#ffd700',1.5);}}
    else if(p.type==='grenade'){player.grenades[p.gtype]=(player.grenades[p.gtype]||0)+p.amount;addNotif(`+${p.amount} ${p.gtype}`,'#aaffaa',1.8);}
    else if(p.type==='machinegun'){
      if(!player.weapons.includes('machinegun'))player.weapons.push('machinegun');
      player.ammo.machinegun=(player.ammo.machinegun||0)+getAmmoBonus('machinegun',120);
      player.weapon='machinegun';
      addNotif('🔫 MACHINE GUN acquired! +120 ammo — press [5]','#ffcc44',4);
    }
    return false;
  }
  return p.life>0;
});}
function drawPickups(camX,camY){

// ── Enemy drawing ──────────────────────────────────────────────────────────
function drawEnemy(e,camX,camY){
  const sx=e.x-camX,sy=e.y-camY;
  ctx.save();ctx.translate(sx,sy);
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.ellipse(4,6,e.r*0.85,e.r*0.45,0,0,Math.PI*2);ctx.fill();
  ctx.rotate(e.angle+Math.PI);const wb=Math.sin(e.wobble)*2.5;
  if(e.stunned>0)ctx.globalAlpha=0.5+Math.sin(e.stunned*20)*0.3;
  if(e.type==='boss'){
    const g=Math.min(Math.ceil(globalLevel/5)-1,3);
    const bc=['#1a0000','#001a00','#00001a','#1a001a'][g],gc=['#ff0000','#00ff44','#4444ff','#ff00ff'][g];
    ctx.fillStyle=bc;ctx.beginPath();ctx.arc(0,wb,e.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=gc+'33';ctx.beginPath();ctx.arc(0,wb,e.r*0.65,0,Math.PI*2);ctx.fill();
    for(let i=0;i<9;i++){const a=(i/9)*Math.PI*2+e.wobble*0.3;ctx.fillStyle='rgba(180,0,0,0.6)';ctx.beginPath();ctx.moveTo(Math.cos(a)*e.r,Math.sin(a)*e.r+wb);ctx.lineTo(Math.cos(a+0.2)*(e.r+18),Math.sin(a+0.2)*(e.r+18)+wb);ctx.lineTo(Math.cos(a-0.2)*(e.r+18),Math.sin(a-0.2)*(e.r+18)+wb);ctx.fill();}
    ctx.fillStyle=gc;ctx.shadowColor=gc;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(-10,wb-10,7,0,Math.PI*2);ctx.arc(10,wb-10,7,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  } else if(e.type==='brute'){
    ctx.fillStyle='#143a0a';ctx.beginPath();ctx.arc(0,wb,e.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1f6a14';ctx.fillRect(-e.r*.55,wb-e.r*.7,e.r*1.1,e.r*1.4);
    ctx.fillStyle='#aaff22';ctx.beginPath();ctx.arc(-7,wb-9,5,0,Math.PI*2);ctx.arc(7,wb-9,5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#1a8a10';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-e.r,wb);ctx.lineTo(-e.r-12,wb-10);ctx.moveTo(e.r,wb);ctx.lineTo(e.r+12,wb-10);ctx.stroke();
  } else if(e.type==='spitter'){
    ctx.fillStyle='#4a1055';ctx.beginPath();ctx.arc(0,wb,e.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#8800cc';ctx.lineWidth=3;
    for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2+e.wobble;ctx.beginPath();ctx.moveTo(0,wb);ctx.quadraticCurveTo(Math.cos(a)*18,Math.sin(a)*18+wb,Math.cos(a)*e.r*1.6,Math.sin(a)*e.r*1.6+wb);ctx.stroke();}
    ctx.fillStyle='#cc44ff';ctx.beginPath();ctx.arc(-4,wb-6,4,0,Math.PI*2);ctx.arc(4,wb-6,4,0,Math.PI*2);ctx.fill();
  } else if(e.type==='runner'){
    ctx.fillStyle='#3a9a2a';ctx.beginPath();ctx.arc(0,wb,e.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#7fe04f';ctx.beginPath();ctx.arc(-4,wb-5,3,0,Math.PI*2);ctx.arc(4,wb-5,3,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#2f8020';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-e.r,wb);ctx.lineTo(-e.r-8,wb-6);ctx.moveTo(e.r,wb);ctx.lineTo(e.r+8,wb-6);ctx.stroke();
  } else if(e.type==='gunner'){
    ctx.fillStyle='#357a22';ctx.beginPath();ctx.arc(0,wb,e.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#9fe060';ctx.beginPath();ctx.arc(-4,wb-5,3,0,Math.PI*2);ctx.arc(4,wb-5,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';ctx.fillRect(-e.r-15,wb-2,17,4);ctx.fillStyle='#444';ctx.fillRect(-e.r-4,wb-4,6,8);
  } else {
    ctx.fillStyle=e.color;ctx.beginPath();ctx.arc(0,wb,e.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#9acc33';ctx.beginPath();ctx.arc(-4,wb-5,3,0,Math.PI*2);ctx.arc(4,wb-5,3,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#1a6a10';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-e.r,wb);ctx.lineTo(-e.r-10,wb-8);ctx.moveTo(e.r,wb);ctx.lineTo(e.r+10,wb-8);ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.restore();
  if(e.hp<e.maxHp){const bw=e.r*2.8,bx=sx-bw/2,by=sy-e.r-13;ctx.fillStyle='#300';ctx.fillRect(bx,by,bw,7);ctx.fillStyle=e.type==='boss'?'#ff3300':'#cc2222';ctx.fillRect(bx,by,bw*(e.hp/e.maxHp),7);ctx.strokeStyle='#111';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,7);}
  if(e.stunned>0){ctx.fillStyle='rgba(150,150,255,0.8)';ctx.font='14px Courier New';ctx.textAlign='center';ctx.fillText('*',sx,sy-e.r-18);}
}

// ── Flashlight ─────────────────────────────────────────────────────────────
function drawFlashlight(camX,camY){

// ── Objective arrow ────────────────────────────────────────────────────────
function drawObjectiveArrow(camX,camY){
  if(!lightsSwitch||lightsOn)return;
  const ssx=lightsSwitch.x-camX,ssy=lightsSwitch.y-camY;
  if(ssx>40&&ssx<W-40&&ssy>40&&ssy<H-40)return;
  const angle=Math.atan2(lightsSwitch.y-player.y,lightsSwitch.x-player.x);
  const margin=50,ax=clamp(W/2+Math.cos(angle)*(W/2),margin,W-margin),ay=clamp(H/2+Math.sin(angle)*(H/2),margin,H-margin);
  const pulse=Math.sin(performance.now()/280)*0.35+0.65;
  ctx.save();ctx.translate(ax,ay);ctx.rotate(angle);ctx.globalAlpha=pulse;
  ctx.fillStyle='#ffdd00';ctx.shadowColor='#ffdd00';ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(-10,-10);ctx.lineTo(-6,0);ctx.lineTo(-10,10);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.restore();
  ctx.fillStyle='#ffdd00';ctx.font='bold 9px Courier New';ctx.textAlign='center';
  ctx.fillText('⚡ LIGHTS',ax,ay+22);
}

function drawMinimap(){
  const mW=260,mH=260,mX=W-mW-14,mY=74;
  const scX=mW/(MAP_W*TILE),scY=mH/(MAP_H*TILE);
  // Background + border
  ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(mX-3,mY-3,mW+6,mH+6);
  ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(mX-3,mY-3,mW+6,mH+6);
  // Walls
  for(let ty=0;ty<MAP_H;ty++)for(let tx=0;tx<MAP_W;tx++)if(worldMap[ty][tx]===1){ctx.fillStyle='#3a3a3a';ctx.fillRect(mX+tx*TILE*scX,mY+ty*TILE*scY,Math.ceil(TILE*scX)+1,Math.ceil(TILE*scY)+1);}
  // Helper: draw emoji centred on a world-space position
  function icon(wx,wy,emoji,size=13){
    const sx=mX+wx*scX,sy=mY+wy*scY;
    ctx.font=`${size}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(emoji,sx,sy);
  }
  // Enemies (dots — too many for emoji)
  enemies.forEach(e=>{
    if(e.type==='boss'){
      ctx.font='13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('💀',mX+e.x*scX,mY+e.y*scY);
    } else {
      ctx.fillStyle='#dd2222';ctx.fillRect(mX+e.x*scX-2,mY+e.y*scY-2,4,4);
    }
  });
  // Perk machines
  perkMachines.forEach(pm=>{if(!pm.bought)icon(pm.x,pm.y,pm.symbol,12);});
  // Buy station
  if(buyStationPos)icon(buyStationPos.x,buyStationPos.y,'🧺',14);
  // Workshop
  if(workshopPos)icon(workshopPos.x,workshopPos.y,'🔧',14);
  // Lights switch (pulsing)
  if(lightsSwitch&&!lightsOn){
    const p=Math.sin(performance.now()/300)*0.4+0.6;
    ctx.globalAlpha=p;icon(lightsSwitch.x,lightsSwitch.y,'⚡',14);ctx.globalAlpha=1;
  }
  // Player — glowing blue dot + direction arrow
  const px=mX+player.x*scX,py=mY+player.y*scY;
  ctx.strokeStyle='#88ccff';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+Math.cos(player.angle)*9,py+Math.sin(player.angle)*9);ctx.stroke();
  ctx.fillStyle='#4a9eff';ctx.shadowColor='#4a9eff';ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  // Border + label
  ctx.textBaseline='alphabetic';
  ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(mX,mY,mW,mH);
  ctx.fillStyle='#555';ctx.font='10px Courier New';ctx.textAlign='left';ctx.fillText('[M] full map',mX,mY+mH+14);
}

// ── Game flow ───────────────────────────────────────────────────────────────
function startGame(mapIdx){
  campaignMode=(mapIdx===undefined||mapIdx===null);
  fixedMapIdx=campaignMode?0:Math.max(0,Math.min(mapIdx,MAPS.length-1));
  globalLevel=1;score=0;currency=0;
  sessionCoins=0;sessionKills=0;
  waveActive=false;levelComplete=false;levelStartTimer=2.5;levelTimer=0;
  bullets=[];particles=[];pickups=[];enemies=[];grenadeObjects=[];firePatches=[];notifs=[];deployables=[];airBombs=[];airstrikePending=false;flashUntil=0;
  lightsOn=false;buyStationOpen=false;inventoryOpen=false;bigMapOpen=false;workshopOpen=false;
  inventoryAnim=0;inventorySelected=0;workshopSelectedWeapon='pistol';
  resetUpgrades();
  generateMap(MAPS[fixedMapIdx]);
  initPlayer();
  gameStartTime=performance.now()/1000;
  state=STATE.PLAYING;
  addNotif(`DEAD ZONE — Level 1/20${campaignMode?'':' · '+MAPS[fixedMapIdx].name}`,'#e63946',3);
  addNotif('Buy weapons from 🧺 shop  ·  Upgrade at 🔧 workshop','#2ecc71',5);
}
function restartGame(){startGame(campaignMode?null:fixedMapIdx);}

// Fold the current run's earnings/stats into the persistent save
function commitRun(died){
  saveData.coins+=sessionCoins;
  saveData.kills+=sessionKills;
  if(died)saveData.deaths++;
  saveData.gamesPlayed++;
  if(globalLevel>saveData.highestLevel)saveData.highestLevel=globalLevel;
  if(score>saveData.bestScore)saveData.bestScore=score;
  writeSave();
  sessionCoins=0;sessionKills=0;
}
function gameOver(){
  state=STATE.GAME_OVER;
  if(score>highScore){highScore=score;localStorage.setItem('dz_hs',highScore);}
  commitRun(true);
}

function advanceLevel(){
  // Safety net: auto-collect any boss loot the player didn't physically reach
  pickups.forEach(p=>{
    if(p.type==='cash'){currency+=p.amount;addNotif(`💰 +£${p.amount} collected`,'#ffd700',3);}
    else if(p.type==='machinegun'&&!player.weapons.includes('machinegun')){player.weapons.push('machinegun');player.ammo.machinegun=(player.ammo.machinegun||0)+getAmmoBonus('machinegun',120);addNotif('🔫 Machine gun collected!','#ffcc44',3);}
  });
  pickups=[];
  globalLevel++;
  if(globalLevel>20){state=STATE.WIN;if(score>highScore){highScore=score;localStorage.setItem('dz_hs',highScore);}commitRun(false);return;}
  const mapIdx=Math.floor((globalLevel-1)/5);
  const newMap=campaignMode&&(globalLevel-1)%5===0;
  if(newMap){
    lightsOn=false;player.flashLen=290;player.flashAngle=Math.PI/3.8;
    generateMap(MAPS[Math.min(mapIdx,3)]);
    // Move player to a safe spawn on the new map
    const sp=findSafeSpawn();
    player.x=sp.x;player.y=sp.y;
    addNotif(`NEW AREA: ${MAPS[Math.min(mapIdx,3)].name}`,MAPS[Math.min(mapIdx,3)].accentColor,4);
    addNotif('Lights off in new area — find the ⚡ switch!','#ffdd00',5);
  } else {
    setupMapObjects();
  }
  player.lastStand=false;player.invincible=0;
  player.hp=Math.min(player.hp+20,player.maxHp);
  bullets=[];grenadeObjects=[];firePatches=[];particles=[];
  levelStartTimer=3.0;
  if(globalLevel>=2&&!lightsOn)addNotif('⚡ Lights switch available — check [M] map','#ffdd00',4);
  if(isBossLevel())addNotif('⚠ WARNING: Boss level! Use workshop to upgrade first','#ff3300',4);
  else addNotif(`Level ${globalLevel}/20 — defeat all enemies`,'#e63946',3);
}

// ── Menu ───────────────────────────────────────────────────────────────────
let menuAnim=0,menuTab='main';
const MENU_TABS=['main','locker','store','stats'];
const MENU_TAB_LABELS={main:'PLAY',locker:'LOCKER',store:'STORE',stats:'STATS'};
// Clickable regions are rebuilt every menu frame; the click handler walks them.
let menuRegions=[];
function mReg(x,y,w,h,action){menuRegions.push({x,y,w,h,action});}
function mHov(x,y,w,h){return mouse.x>x&&mouse.x<x+w&&mouse.y>y&&mouse.y<y+h;}

function drawMenu(){
  menuAnim+=0.016;menuRegions=[];
  ctx.fillStyle='#060606';ctx.fillRect(0,0,W,H);
  for(let i=0;i<60;i++){const x=((i*141.3+menuAnim*12)%W),y=((i*99.7+menuAnim*6)%H);ctx.fillStyle=`rgba(220,30,30,${0.04+Math.sin(menuAnim*1.2+i)*0.025})`;ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();}
  // Title
  ctx.shadowColor='#e63946';ctx.shadowBlur=34;ctx.fillStyle='#e63946';ctx.font='bold 60px Courier New';ctx.textAlign='center';ctx.fillText('DEAD ZONE',W/2,84);ctx.shadowBlur=0;
  // Coin balance (top-right)
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W-210,20,190,34);
  ctx.strokeStyle='#ffd700';ctx.lineWidth=1;ctx.strokeRect(W-210,20,190,34);
  ctx.fillStyle='#ffd700';ctx.font='bold 16px Courier New';ctx.textAlign='right';ctx.fillText(`🪙 ${saveData.coins} coins`,W-30,42);
  // Tab bar
  const tw=150,th=38,gap=10,total=MENU_TABS.length*tw+(MENU_TABS.length-1)*gap,x0=W/2-total/2,ty=108;
  MENU_TABS.forEach((t,i)=>{
    const x=x0+i*(tw+gap),active=menuTab===t,hov=mHov(x,ty,tw,th);
    ctx.fillStyle=active?'#e63946':(hov?'#3a1414':'#141414');ctx.fillRect(x,ty,tw,th);
    ctx.strokeStyle=active?'#ff8585':'#333';ctx.lineWidth=2;ctx.strokeRect(x,ty,tw,th);
    ctx.fillStyle=active?'#fff':'#999';ctx.font='bold 14px Courier New';ctx.textAlign='center';ctx.fillText(MENU_TAB_LABELS[t],x+tw/2,ty+24);
    mReg(x,ty,tw,th,()=>{menuTab=t;});
  });
  // Content
  if(menuTab==='main')drawMainMenu();
  else if(menuTab==='locker')drawLocker();
  else if(menuTab==='store')drawMenuShop();
  else if(menuTab==='stats')drawStats();
  ctx.fillStyle='#333';ctx.font='10px Courier New';ctx.textAlign='center';ctx.fillText('WASD:Move  Click:Shoot  Enter:Interact  G:Grenade  Tab:Inventory  M:Map',W/2,H-14);
}

function drawMainMenu(){
  const r=rankFor(saveData.kills);
  ctx.fillStyle='#666';ctx.font='14px Courier New';ctx.textAlign='center';ctx.fillText('TOP-DOWN ZOMBIE SURVIVAL',W/2,182);
  ctx.fillStyle=r.color;ctx.font='bold 13px Courier New';ctx.fillText(`RANK: ${r.name.toUpperCase()}  ·  ${saveData.kills} TOTAL KILLS`,W/2,204);
  ctx.fillStyle='#ffdd00';ctx.font='13px Courier New';ctx.fillText(`BEST SCORE: ${Math.max(highScore,saveData.bestScore)}  ·  HIGHEST LEVEL: ${saveData.highestLevel}/20`,W/2,224);
  ['20 LEVELS  ·  5 MAPS  ·  RUINS','BUY 🧺  ·  UPGRADE 🔧  ·  PERKS  ·  BOSS EVERY 5'].forEach((f,i)=>{ctx.fillStyle=`rgba(140,140,140,${0.5+Math.sin(menuAnim+i)*0.2})`;ctx.font='11px Courier New';ctx.fillText(f,W/2,248+i*16);});
  // START CAMPAIGN
  const bw=260,bh=50,bx=W/2-bw/2,by=288,hov=mHov(bx,by,bw,bh);
  ctx.fillStyle=hov?'#e63946':'#7a1010';ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle='#e63946';ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#fff';ctx.font='bold 21px Courier New';ctx.textAlign='center';ctx.fillText('START CAMPAIGN',W/2,by+33);
  ctx.fillStyle='#c98';ctx.font='10px Courier New';ctx.fillText('City → Bunker → Wasteland → Graveyard',W/2,by+47);
  mReg(bx,by,bw,bh,()=>startGame());
  // Map picker
  ctx.fillStyle='#888';ctx.font='bold 13px Courier New';ctx.fillText('— OR PLAY A SINGLE MAP (20 levels) —',W/2,by+86);
  const n=MAPS.length,mw=148,mh=104,g=12,totalW=n*mw+(n-1)*g,sx=Math.max(10,W/2-totalW/2),ty=by+102;
  MAPS.forEach((m,i)=>{
    const x=sx+i*(mw+g),mhov=mHov(x,ty,mw,mh);
    // floor swatch
    ctx.fillStyle=m.floorA;ctx.fillRect(x,ty,mw,mh);
    for(let cy=0;cy<mh;cy+=16)for(let cx=0;cx<mw;cx+=16){if((Math.floor(cx/16)+Math.floor(cy/16))%2){ctx.fillStyle=m.floorB;ctx.fillRect(x+cx,ty+cy,16,16);}}
    // wall blocks hint
    ctx.fillStyle=m.wallA;ctx.fillRect(x+12,ty+30,28,20);ctx.fillRect(x+mw-46,ty+52,30,22);ctx.fillRect(x+mw/2-8,ty+18,22,16);
    // header band
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(x,ty,mw,24);
    ctx.fillStyle=m.accentColor;ctx.font='bold 12px Courier New';ctx.textAlign='center';ctx.fillText(m.name,x+mw/2,ty+16);
    // footer band
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(x,ty+mh-22,mw,22);
    ctx.fillStyle='#bbb';ctx.font='10px Courier New';ctx.fillText(mhov?'▶ PLAY':'20 levels',x+mw/2,ty+mh-8);
    ctx.strokeStyle=mhov?m.accentColor:'#333';ctx.lineWidth=mhov?2:1;ctx.strokeRect(x,ty,mw,mh);
    if(m.id==='arctic'){ctx.fillStyle='#7fd4ff';ctx.font='bold 10px Courier New';ctx.textAlign='right';ctx.fillText('★ NEW',x+mw-6,ty+38);}
    mReg(x,ty,mw,mh,()=>startGame(i));
  });
  // Live preview of your equipped character
  const py=ty+mh+44;
  drawCharacterPreview(W/2,py,24,getOutfit(),getHat());
  ctx.fillStyle='#555';ctx.font='10px Courier New';ctx.textAlign='center';ctx.fillText('Customise in the LOCKER tab',W/2,py+38);
}

function drawStats(){
  const r=rankFor(saveData.kills),nr=nextRank(saveData.kills),cx=W/2,y0=200;
  ctx.fillStyle=r.color;ctx.shadowColor=r.color;ctx.shadowBlur=18;ctx.font='bold 30px Courier New';ctx.textAlign='center';
  ctx.fillText(`RANK: ${r.name.toUpperCase()}`,cx,y0);ctx.shadowBlur=0;
  if(nr){
    const prog=clamp((saveData.kills-r.kills)/(nr.kills-r.kills),0,1),bw=380,bx=cx-bw/2,by=y0+16;
    ctx.fillStyle='#222';ctx.fillRect(bx,by,bw,12);ctx.fillStyle=r.color;ctx.fillRect(bx,by,bw*prog,12);
    ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,12);
    ctx.fillStyle='#888';ctx.font='10px Courier New';ctx.fillText(`${saveData.kills} / ${nr.kills} kills to ${nr.name}`,cx,by+28);
  } else {ctx.fillStyle='#ffd700';ctx.font='11px Courier New';ctx.fillText('★ MAX RANK ACHIEVED ★',cx,y0+30);}
  const stats=[['ZOMBIES KILLED',saveData.kills],['DEATHS',saveData.deaths],['HIGHEST LEVEL',saveData.highestLevel+' / 20'],['GAMES PLAYED',saveData.gamesPlayed],['BEST SCORE',saveData.bestScore],['COINS',saveData.coins]];
  const cols=3,cardW=210,cardH=78,g=18,gridW=cols*cardW+(cols-1)*g,gx=cx-gridW/2,gy=y0+58;
  stats.forEach((s,i)=>{
    const col=i%cols,row=Math.floor(i/cols),x=gx+col*(cardW+g),yy=gy+row*(cardH+g);
    ctx.fillStyle='#111';ctx.fillRect(x,yy,cardW,cardH);ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(x,yy,cardW,cardH);
    ctx.fillStyle='#888';ctx.font='10px Courier New';ctx.textAlign='center';ctx.fillText(s[0],x+cardW/2,yy+24);
    ctx.fillStyle='#fff';ctx.font='bold 26px Courier New';ctx.fillText(String(s[1]),x+cardW/2,yy+58);
  });
}

// Shared cosmetic grid used by Locker (equip) and Store (buy)
function drawCosmeticGrid(title,kind,items,owned,equippedId,topY,mode){
  ctx.fillStyle='#aaa';ctx.font='bold 13px Courier New';ctx.textAlign='left';ctx.fillText(title,W/2-330,topY);
  const cols=3,cw=200,ch=92,g=14,gridW=cols*cw+(cols-1)*g,gx=W/2-gridW/2;
  items.forEach((it,i)=>{
    const col=i%cols,row=Math.floor(i/cols),x=gx+col*(cw+g),y=topY+14+row*(ch+g);
    const isOwned=owned.includes(it.id),isEq=equippedId===it.id;
    const canBuy=mode==='store'&&!isOwned&&saveData.coins>=it.cost;
    const hov=mHov(x,y,cw,ch);
    ctx.fillStyle=isEq?'#16240f':(hov?'#181818':'#101010');ctx.fillRect(x,y,cw,ch);
    ctx.strokeStyle=isEq?'#2ecc71':(isOwned?'#444':(canBuy?'#ffd700':'#2a2a2a'));ctx.lineWidth=isEq?2:1;ctx.strokeRect(x,y,cw,ch);
    // Mini preview
    if(kind==='hat')drawCharacterPreview(x+34,y+ch/2,16,getOutfit(),it);
    else drawCharacterPreview(x+34,y+ch/2,16,it,getHat());
    // Name + status
    ctx.textAlign='left';ctx.fillStyle='#fff';ctx.font='bold 12px Courier New';ctx.fillText(it.name,x+62,y+26);
    if(isEq){ctx.fillStyle='#2ecc71';ctx.font='bold 11px Courier New';ctx.fillText('✓ EQUIPPED',x+62,y+48);}
    else if(isOwned){ctx.fillStyle='#888';ctx.font='11px Courier New';ctx.fillText(mode==='locker'?'CLICK TO EQUIP':'OWNED',x+62,y+48);}
    else {ctx.fillStyle=canBuy?'#ffd700':'#a06600';ctx.font='bold 12px Courier New';ctx.fillText(`🪙 ${it.cost}`,x+62,y+48);
      ctx.fillStyle='#666';ctx.font='9px Courier New';ctx.fillText(canBuy?'CLICK TO BUY':'need more coins',x+62,y+66);}
    // Region action
    mReg(x,y,cw,ch,()=>{
      if(mode==='locker'){
        if(!isOwned){menuTab='store';return;}
        if(kind==='hat')saveData.equippedHat=it.id;else saveData.equippedOutfit=it.id;writeSave();
      } else { // store
        if(isOwned||saveData.coins<it.cost)return;
        saveData.coins-=it.cost;
        if(kind==='hat'){saveData.ownedHats.push(it.id);saveData.equippedHat=it.id;}
        else{saveData.ownedOutfits.push(it.id);saveData.equippedOutfit=it.id;}
        writeSave();
      }
    });
  });
  return topY+14+Math.ceil(items.length/cols)*(ch+g);
}

function drawLocker(){
  ctx.fillStyle='#888';ctx.font='12px Courier New';ctx.textAlign='center';ctx.fillText('Equip cosmetics you own. Locked items take you to the STORE.',W/2,176);
  // Big preview
  drawCharacterPreview(W/2,236,30,getOutfit(),getHat());
  let y=300;
  y=drawCosmeticGrid('HATS',  'hat',   HATS,   saveData.ownedHats,   saveData.equippedHat,   y,'locker');
  y+=8;
  drawCosmeticGrid('OUTFITS','outfit',OUTFITS,saveData.ownedOutfits,saveData.equippedOutfit,y,'locker');
}

function drawMenuShop(){
  ctx.fillStyle='#888';ctx.font='12px Courier New';ctx.textAlign='center';ctx.fillText(`Spend coins earned in-game. Balance: 🪙 ${saveData.coins}`,W/2,176);
  let y=210;
  y=drawCosmeticGrid('HATS',  'hat',   HATS,   saveData.ownedHats,   saveData.equippedHat,   y,'store');
  y+=8;
  drawCosmeticGrid('OUTFITS','outfit',OUTFITS,saveData.ownedOutfits,saveData.equippedOutfit,y,'store');
}

function drawOverlay(title,col,lines,b1,b2){
  ctx.fillStyle='rgba(0,0,0,0.92)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=30;ctx.font='bold 54px Courier New';ctx.textAlign='center';ctx.fillText(title,W/2,H/2-90);ctx.shadowBlur=0;
  lines.forEach((l,i)=>{ctx.fillStyle=l.col||'#ccc';ctx.font=l.font||'17px Courier New';ctx.textAlign='center';ctx.fillText(l.text,W/2,H/2-38+i*30);});
  const by=H/2+80;
  [b1,b2].forEach((b,i)=>{if(!b)return;const bx=W/2+(i===0?-130:10),hov=mouse.x>bx&&mouse.x<bx+120&&mouse.y>by&&mouse.y<by+44;ctx.fillStyle=hov?b.hov:b.col;ctx.fillRect(bx,by,120,44);ctx.strokeStyle=b.border||'#555';ctx.lineWidth=1;ctx.strokeRect(bx,by,120,44);ctx.fillStyle='#fff';ctx.font='bold 13px Courier New';ctx.textAlign='center';ctx.fillText(b.label,bx+60,by+26);});
  return by;
}
function drawGameOver(){drawOverlay('GAME OVER','#e63946',[{text:`SCORE: ${score}`,col:'#fff',font:'bold 22px Courier New'},{text:`BEST: ${highScore}`,col:'#ffdd00',font:'16px Courier New'},{text:`Level ${globalLevel}/20  ·  £${currency}`,col:'#666',font:'12px Courier New'}],{label:'RETRY',col:'#8a1010',hov:'#e63946',border:'#e63946'},{label:'MENU',col:'#111',hov:'#333'});}
function drawWin(){drawOverlay('YOU WIN!','#2ecc71',[{text:'ALL 20 LEVELS CLEARED!',col:'#888',font:'15px Courier New'},{text:`SCORE: ${score}`,col:'#fff',font:'bold 22px Courier New'},{text:score>=highScore?'NEW HIGH SCORE!':'Best: '+highScore,col:'#ffdd00',font:'16px Courier New'}],{label:'PLAY AGAIN',col:'#1a5a2a',hov:'#2ecc71',border:'#2ecc71'},{label:'MENU',col:'#111',hov:'#333'});}
function drawPaused(){ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='bold 50px Courier New';ctx.textAlign='center';ctx.fillText('PAUSED',W/2,H/2-10);ctx.fillStyle='#555';ctx.font='14px Courier New';ctx.fillText('ESC to resume',W/2,H/2+30);}

// ── Click handling ─────────────────────────────────────────────────────────
function handleClick(e){
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  if(workshopOpen){handleWorkshopClick(mx,my);return;}
  if(buyStationOpen){handleBuyClick(mx,my);return;}
  if(bigMapOpen){bigMapOpen=false;return;}
  if(state===STATE.PLAYING&&airstrikePending){const camX=player.x-W/2,camY=player.y-H/2;callAirstrike(mx+camX,my+camY);airstrikePending=false;return;}
  if(state===STATE.MENU){for(const reg of menuRegions){if(mx>reg.x&&mx<reg.x+reg.w&&my>reg.y&&my<reg.y+reg.h){reg.action();break;}}}
  else if(state===STATE.GAME_OVER){const by=H/2+80;if(mx>W/2-130&&mx<W/2-10&&my>by&&my<by+44)restartGame();if(mx>W/2+10&&mx<W/2+130&&my>by&&my<by+44){state=STATE.MENU;menuTab='main';}}
  else if(state===STATE.WIN){const by=H/2+80;if(mx>W/2-130&&mx<W/2-10&&my>by&&my<by+44)restartGame();if(mx>W/2+10&&mx<W/2+130&&my>by&&my<by+44){state=STATE.MENU;menuTab='main';}}
}

// ── Main loop ──────────────────────────────────────────────────────────────
let lastTime=performance.now();
function loop(now){
  const dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;
  ctx.save();
  if(state===STATE.PLAYING||state===STATE.PAUSED){updateShake(dt);ctx.translate(Math.round(shk.x),Math.round(shk.y));}
  if(state===STATE.MENU){drawMenu();}
  else if(state===STATE.PLAYING||state===STATE.PAUSED){
    if(state===STATE.PLAYING){
      updatePlayer(dt);updateBullets(dt);updateParticles(dt);updatePickups(dt);
      updateGrenades(dt);updateDeployables(dt);updateAirBombs(dt);updateBarricades(dt);updateInventoryAnim(dt);updateNotifs(dt);
      if(waveActive){
        updateEnemies(dt);
        if(enemies.length===0){waveActive=false;levelComplete=true;levelTimer=isBossLevel()?9.0:4.0;spawnPickup('health',player.x+rand(-120,120),player.y+rand(-120,120));if(isBossLevel())addNotif('Grab the boss loot before the next level!','#ffcc44',5);}
      }
      if(levelComplete){levelTimer-=dt;if(levelTimer<=0){levelComplete=false;advanceLevel();}}
      if(!waveActive&&!levelComplete){if(levelStartTimer>0){levelStartTimer-=dt;if(levelStartTimer<=0)startWave();}}
    }
    const camX=Math.round(player.x-W/2),camY=Math.round(player.y-H/2);
    ctx.fillStyle=mapCfg.bg;ctx.fillRect(0,0,W,H);
    drawWorld(camX,camY);drawDebris(camX,camY);drawMapObjects(camX,camY);
    drawDeployables(camX,camY);drawAirBombs(camX,camY);drawPickups(camX,camY);drawParticles(camX,camY);
    drawGrenades(camX,camY);drawBullets(camX,camY);
    enemies.forEach(e=>drawEnemy(e,camX,camY));
    drawPlayer(camX,camY);drawFlashlight(camX,camY);
    drawObjectiveArrow(camX,camY);
    drawScreenFlash();
    drawHUD();drawInventory();drawBuyStation();drawWorkshop();drawBigMap();
    if(state===STATE.PAUSED)drawPaused();
  }
  else if(state===STATE.GAME_OVER)drawGameOver();
  else if(state===STATE.WIN)drawWin();
  ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
